rev:'<p><span class="lbl why">Por qué</span> Lecho granulado bien vascularizado + defecto amplio = injerto de espesor parcial (epidermis + dermis parcial). Si hubiera hueso/tendón SIN periostio/paratenón expuesto → colgajo. <b>[P.E. ×8]</b></p><p><span class="lbl dis">Distractores</span> Espesor total: para cara/zonas pequeñas (menos contracción secundaria, mejor color). Colgajo: solo si el lecho no nutre. La diferencia injerto/colgajo es la VASCULARIDAD [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>Injerto = INquilino</b>: vive de la casa que lo recibe. <b>Colgajo = COn su despensa</b>: trae su propia arteria.</p><p><span class="lbl ana">Analogía</span> El injerto es pasto trasplantado: pega si el suelo está fértil; en concreto (hueso sin periostio) no agarra.</p><p><span class="lbl key">Dato que distingue</span> Contracción PRIMARIA mayor en TOTAL (más dermis elástica); contracción SECUNDARIA (cicatricial) mayor en PARCIAL... ¡ojo! el banco lo preguntó al revés de como suena: respondieron "la contracción secundaria es mayor en el injerto de espesor total" — revisa la sub-pregunta 6.</p>',
anki:'injertos::espesor-parcial',
subs:[
{q:'Primera fase de integración de un injerto cutáneo:',opts:['Inosculación','Imbibición plasmática','Revascularización','Maduración'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Día 0–2: el injerto "bebe" plasma del lecho por difusión (también la llaman inhibición plasmática en el banco). Orden: imbibición → inosculación → revascularización.</p><p><span class="lbl mne">Mnemotecnia</span> <b>I-I-R: "Inicia Imbibiendo, Remata Revascularizando"</b>. Imbibición = beber.</p><p><span class="lbl reg">Regla</span> Si veo primera fase del injerto, marco <b>imbibición plasmática</b>.</p>'},
{q:'Fase en la que el injerto sobrevive por DIFUSIÓN de O2 y glucosa:',opts:['Revascularización','Inosculación','Imbibición/inhibición plasmática','Remodelación'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Mientras no hay vasos conectados, todo llega por difusión = imbibición. El banco la nombra "inhibición plasmática" en varios exámenes: es la misma respuesta.</p><p><span class="lbl reg">Regla</span> Si veo difusión de nutrientes, marco <b>imbibición (inhibición) plasmática</b>.</p>'},
{q:'[Mayo 2026] A las 48 h del injerto, los vasos del lecho y del injerto comienzan a alinearse y reconectar ("capillary kissing"). Esa fase es:',opts:['Imbibición','Inosculación','Contracción','Epitelización'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Inosculación = beso capilar: yemas vasculares del lecho se encuentran con los capilares del injerto (~48 h). Mayo 2026 lo preguntó doble: "48 horas" y "proceso en el que los vasos comienzan a reconectar".</p><p><span class="lbl mne">Mnemotecnia</span> <b>inOSCULación = ÓSCULO = beso</b> (beso de capilares).</p><p><span class="lbl dis">🔎 Ojo banco</span> Una pregunta vieja marcó como FALSO que el capillary kissing ocurre en la inosculación (la maestra lo situó en revascularización). El estándar es inosculación; si tu profe lo dijo distinto, manda lo del profe.</p><p><span class="lbl reg">Regla</span> Si veo 48 h / yemas vasculares / beso capilar, marco <b>inosculación</b>.</p>'},
{q:'Causa MÁS frecuente de pérdida/fallo de un injerto:',opts:['Seroma','Infección','Hematoma','Movilización'],c:2,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El hematoma se interpone entre lecho e injerto y bloquea la imbibición: el injerto se muere de hambre. (Si la opción es "todas las anteriores" con hematoma+seroma+infección, esa también la han puesto.)</p><p><span class="lbl ana">Analogía</span> Un charco de sangre entre el pasto y la tierra: las raíces nunca tocan suelo.</p><p><span class="lbl reg">Regla</span> Si veo causa #1 de fallo del injerto, marco <b>hematoma</b>.</p>'},
{q:'Sobre la contracción de los injertos, lo que el banco marcó como correcto:',opts:['La contracción secundaria es mayor en el injerto de espesor TOTAL','La contracción no existe en injertos','El espesor parcial no se contrae','La primaria es cicatricial'],c:0,pe:2,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Así vino la respuesta del banco ×2: "la contracción secundaria es mayor en el de espesor total". El estándar de los libros dice lo contrario (secundaria mayor en PARCIAL; primaria mayor en total).</p><p><span class="lbl dis">🔎 VERIFICAR</span> Para TU examen: responde como el banco. Pero entiende el estándar por si reformulan: parcial deja más herida activa → cicatriza contrayéndose más (secundaria); total tiene más dermis elástica → se encoge más al cortarlo (primaria).</p><p><span class="lbl reg">Regla</span> Si la pregunta es idéntica a la del banco, marco <b>secundaria mayor en total</b>; si piden el concepto de libro, secundaria mayor en parcial.</p>'},
{q:'Injerto de piel CADAVÉRICA: ¿cómo se llama y para qué sirve?',opts:['Xenoinjerto · cobertura definitiva','Aloinjerto (homoinjerto) · cobertura TEMPORAL que mejora el estado general mientras se da tratamiento definitivo','Autoinjerto · definitivo','Isoinjerto · temporal'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Misma especie = ALOinjerto = HOMOinjerto. Nunca se integra (se rechaza): es un apósito biológico temporal.</p><p><span class="lbl mne">Mnemotecnia</span> <b>ALO = ALguien más (humano) · XENO = eXtranjero (cerdo) · AUTO = yo · ISO = gemelo idéntico</b> (el isoinjerto es el que más dura sin rechazo).</p><p><span class="lbl reg">Regla</span> Si veo cadáver, marco <b>aloinjerto/homoinjerto</b>; si veo cerdo, <b>xenoinjerto</b>.</p>'},
{q:'Injerto porcino (piel de cerdo en quemadura de mano):',opts:['Aloinjerto','Autoinjerto','Xenoinjerto','Isoinjerto'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Otra especie = xenoinjerto. El banco lo usó en quemadura 2.° superficial de mano: injerto de cerdo + parche + epiteliza 7–14 días.</p><p><span class="lbl reg">Regla</span> Si veo piel de cerdo, marco <b>xenoinjerto</b>.</p>'},
{q:'¿De dónde se toma clásicamente el injerto de espesor TOTAL para cara/nariz?',opts:['Muslo anterior','Región retroauricular (o supraclavicular)','Abdomen','Planta del pie'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Piel parecida a la de la cara, zona oculta y se cierra PRIMARIAMENTE (eso también lo preguntan: el sitio donador del total se cierra de primera intención).</p><p><span class="lbl reg">Regla</span> Si veo injerto nasal/facial total, marco <b>retroauricular/supraclavicular</b>.</p>'},
{q:'La zona donadora de espesor parcial reepiteliza gracias a:',opts:['Fibroblastos de la dermis','Los ANEXOS cutáneos preservados (y epidermis de la periferia)','Macrófagos de la dermis reticular','Tejido celular subcutáneo'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Quedan folículos y glándulas con queratinocitos: de ahí brota el epitelio nuevo. Por eso se cubre con hidrocoloide/plata: proteger esos anexos.</p><p><span class="lbl key">Dato que distingue</span> Mientras MÁS anexos se preserven, mejor reepiteliza. Mayo 2026 trajo "capilares dérmicos, lechos" como respuesta de este bloque 🔎 verifica el enunciado exacto con tu grupo.</p><p><span class="lbl reg">Regla</span> Si veo reepitelización de zona donadora, marco <b>anexos</b>.</p>'},
{q:'¿Para qué se MALLA un injerto?',opts:['Para que se vea estético','Para abarcar MAYOR superficie (y drenar)','Para que no se contraiga','Para acelerar la imbibición'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> El mallado expande el injerto (1:1.5, 1:3...) y deja escapar fluidos. Costo: peor estética.</p><p><span class="lbl reg">Regla</span> Si veo mallado, marco <b>mayor superficie</b>.</p>'},
{q:'Tejidos que se pueden injertar — el banco preguntó la EXCEPCIÓN:',opts:['Piel','Tendón (palmar menor, plantar delgado)','Nervio (sural) y hueso','Músculo / uña'],c:3,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El banco marcó MÚSCULO como lo que no se injerta (sin su pedículo muere) y también dejó claro que la UÑA no se injerta. Tendón, nervio, hueso, cartílago, grasa y piel sí.</p><p><span class="lbl key">Dato que distingue</span> [Mayo 2026] "Los injertos de GRASA se absorben" — parcialmente impredecible, por eso se sobrecorrige.</p><p><span class="lbl reg">Regla</span> Si veo "no se injerta", marco <b>músculo/uña</b>.</p>'},
{q:'Manejo de la herida del dorso de mano con tendones extensores expuestos CON paratenón vs tendón SIN paratenón:',opts:['Ambas con injerto','Con paratenón → injerto · sin paratenón (o hueso sin periostio) → COLGAJO','Ambas con colgajo','Cierre directo siempre'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El paratenón nutre: sobre él un injerto pega. Tendón pelado o hueso sin periostio = lecho avascular = colgajo. El banco lo preguntó en mano (injerto) y en muslo sin paratenón (colgajo).</p><p><span class="lbl reg">Regla</span> Si veo estructura noble SIN su envoltura nutricia, marco <b>colgajo</b>; con ella, <b>injerto</b>.</p>'}
]},

/* ============ CASO 10 — COLGAJOS ============ */
{
id:'colgajos', fc:'injertos-colgajos', tema:'Colgajos', temaKey:'injertos', prio:'ALTA', pe:6,
resp:'Colgajo frontal (paramediano)',
alias:['colgajo frontal','colgajo frontal paramediano','colgajo paramediano de frente','colgajo de frente','colgajo mediofrontal'],
vineta:'Masculino de 65 años con carcinoma espinocelular del dorso nasal. La resección dejó expuestos <b>hueso y cartílagos nasales</b>. Se reconstruye con un colgajo tomado de la frente, levantado en dos tiempos.',
pistas:[
'El defecto tiene cartílago expuesto: un injerto NO prendería.',
'El colgajo baja desde la frente girando sobre su pedículo.',
'Su arteria viene del sistema de la carótida interna (a través de la órbita).',
'Sushruta ya lo usaba en la India para reconstruir narices.',
'Según su irrigación es AXIAL: tiene arteria con nombre y apellido.'],
opciones:['Colgajo frontal (paramediano)','Colgajo nasogeniano','Injerto de espesor total','Colgajo bilobulado'],
rev:'<p><span class="lbl why">Por qué</span> Cartílago/hueso expuesto = necesito tejido CON circulación propia → colgajo frontal, el clásico para nariz (desde Sushruta, colgajo axial de la frente). <b>[P.E. ×6]</b></p><p><span class="lbl dis">Distractores</span> Sin exposición de cartílago la respuesta del banco era INJERTO DE ESPESOR TOTAL (paciente cardiópata, cirugía menor). Nasogeniano sirve para defectos alares pequeños.</p><p><span class="lbl mne">Mnemotecnia</span> <b>FRENTE para la NARIZ</b>: el vecino de arriba le presta techo al de abajo.</p><p><span class="lbl ana">Analogía</span> Colgajo = mudanza con todo y tubería conectada; injerto = mudarse esperando que la casa nueva tenga agua.</p><p><span class="lbl key">Dato que distingue</span> Movimiento: el banco lo clasificó como ROTACIÓN (gira sobre su base hacia el defecto); por vascularidad: AXIAL (supraorbitaria y supratroclear).</p>',
anki:'colgajos::frontal-paramediano',
subs:[
{q:'¿En qué arterias se basa el colgajo frontal?',opts:['Temporal superficial y facial','Supraorbitaria y supratroclear','Etmoidales anteriores','Angular y dorsal nasal'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El paramediano vive de la supratroclear (y supraorbitaria). Ojo trampa histórica del banco: el colgajo "de frente/indio" clásico descrito con la TEMPORAL SUPERFICIAL también apareció en preguntas viejas — si te dan "colgajo frontal arteria temporal superficial" en formato historia, esa era su respuesta.</p><p><span class="lbl reg">Regla</span> Si veo colgajo frontal moderno, marco <b>supraorbitaria + supratroclear</b>.</p>'},
{q:'Según su VASCULARIDAD, el colgajo frontal es:',opts:['Aleatorio (random)','Axial','De perforantes','Libre'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Tiene arteria nominada corriendo a lo largo = axial. Los axiales pueden ser más largos que los randomizados y no requieren delay.</p><p><span class="lbl mne">Mnemotecnia</span> <b>AXIAL = con EJE (arteria) propio</b>.</p><p><span class="lbl reg">Regla</span> Si veo arteria con nombre dentro del colgajo, marco <b>axial</b>.</p>'},
{q:'Colgajos cutáneos AXIALES clásicos del banco son, EXCEPTO:',opts:['Deltopectoral','Inguinal','Frontonasal/mediofrontal','Temporal'],c:3,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco listó deltopectoral, inguinal y frontonasal-mediofrontal como axiales; el TEMPORAL fue su "no es axial".</p><p><span class="lbl reg">Regla</span> Si veo esa lista, el intruso es <b>temporal</b>.</p>'},
{q:'La Z-plastia, según su irrigación, es un colgajo:',opts:['Axial','Aleatorio (random)','De perforantes','Libre'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La Z vive del plexo subdérmico, sin arteria nominada = aleatorio. El banco marcó como INCORRECTA la frase "son colgajos axiales la mayoría de las veces". Es además colgajo de TRANSPOSICIÓN (dos triángulos que se intercambian).</p><p><span class="lbl reg">Regla</span> Si veo Z-plastia + irrigación, marco <b>aleatorio</b>.</p>'},
{q:'Todos son colgajos de TRANSPOSICIÓN, excepto:',opts:['Limberg','Z-plastia','Mustardé','V-Y'],c:3,pe:2,
fb:'<p><span class="lbl why">Por qué</span> V-Y es de AVANCE (el más frecuente de los de avance según el banco). Limberg/romboidal, Z y Mustardé transponen.</p><p><span class="lbl mne">Mnemotecnia</span> <b>V-Y aVanza</b>.</p><p><span class="lbl reg">Regla</span> Si veo V-Y entre transposiciones, ese es el <b>intruso (avance)</b>.</p>'},
{q:'Colgajos A DISTANCIA: el banco preguntó la EXCEPCIÓN:',opts:['Colgajo inguinal a mano','Colgajo cross-leg','Colgajo FRONTAL para defectos de nariz','Colgajo abdominal a antebrazo'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El frontal está JUNTO a la nariz: es colgajo LOCAL/regional, no a distancia.</p><p><span class="lbl reg">Regla</span> Si veo "a distancia excepto", marco <b>frontal</b>.</p>'},
{q:'Colgajo de músculo pectoral para cubrir dehiscencia esternal post-bypass: según su irrigación es:',opts:['Aleatorio','Axial','Libre','A distancia'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Pedículo dominante = toracoacromial → AXIAL. Y antes de cubrir: desbridar hasta tejido viable + terapia de presión negativa (VAC) si no hay exposición visceral [P.E. ×2].</p><p><span class="lbl reg">Regla</span> Si veo colgajo muscular con pedículo nominado, marco <b>axial</b>.</p>'},
{q:'Tiempo en que un colgajo forma circulación propia con el lecho (autonomía):',opts:['3–5 días','7–10 días','18–21 días','40 días'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> 18–21 días: por eso el fenómeno de DELAY (retardo vascular) también se maneja con ~21 días [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>3 semanas para independizarse</b>.</p><p><span class="lbl reg">Regla</span> Si veo autonomía del colgajo o delay, marco <b>~21 días</b>.</p>'},
{q:'Microcirugía — datos históricos que el banco recicla. Señala lo CORRECTO:',opts:['Padre de la microcirugía: Alexis Carrel (primeras anastomosis vasculares); animales de práctica: ratas; primera microcirugía clínica: oído medio; postoperatorio antiagregante: Dextran','La primera microcirugía fue en mano','El padre de la microcirugía fue Sushruta','Se practica en conejos exclusivamente'],c:0,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Combo histórico del banco: Carrel + ratas + oído medio + Dextran (evita coágulos/agregación). Y lo que impide una microcirugía adecuada: el hematoma.</p><p><span class="lbl reg">Regla</span> Si veo historia de microcirugía, marco <b>Carrel/ratas/oído medio/Dextran</b>.</p>'},
{q:'Protocolo de orden de reparación de estructuras en trauma complejo de mano:',opts:['Nervio→arteria→hueso','Hueso→tendón→arteria→nervio→vena','Arteria→vena→hueso','Tendón→hueso→nervio'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Primero el esqueleto (estabilidad), luego motor (tendón), luego riego (arteria), cableado (nervio) y drenaje (vena).</p><p><span class="lbl mne">Mnemotecnia</span> <b>"HuTeArNeVe"</b> — hueso, tendón, arteria, nervio, vena.</p><p><span class="lbl reg">Regla</span> Si veo orden de reparación, marco <b>hueso primero</b>.</p>'}
]},

/* ============ CASO 11 — CICATRIZACIÓN / QUELOIDE ============ */
{
id:'queloide', fc:'cicatrizacion', tema:'Cicatrización', temaKey:'cicatrizacion', prio:'MUY ALTA', pe:6,
resp:'Cicatriz queloide',
alias:['cicatriz queloide','queloide','cicatrizacion queloide'],
vineta:'Femenino de 28 años con <b>2 tumoraciones en los lóbulos de las orejas</b> (tras perforaciones), de crecimiento progresivo, acompañadas de prurito. Las lesiones <b>rebasan los límites</b> de la herida original.',
pistas:[
'Crecen más allá de los bordes de la herida e invaden piel sana.',
'Hay prurito y crecimiento progresivo sin tendencia a regresar.',
'Sitios típicos: lóbulos, deltoides, preesternal.',
'Tras resecarlas solas, RECURREN (50–80%).',
'La hipertrófica, en cambio, respeta los bordes y regresa con el tiempo.'],
opciones:['Cicatriz queloide','Cicatriz hipertrófica','Dermatofibroma','Granuloma piógeno'],
rev:'<p><span class="lbl why">Por qué</span> Cuando veo que la cicatriz SE SALIÓ de la herida, invadió piel sana y no regresa → queloide. La hipertrófica es el niño obediente que se queda dentro de la cancha y se calma; el queloide se sale y reincide. <b>[P.E. ×4]</b></p><p><span class="lbl dis">Distractores</span> Hipertrófica: dentro de los límites, puede regresar sola (la frase "crece más allá de los bordes" fue la INCORRECTA sobre hipertrófica en el banco ×3).</p><p><span class="lbl mne">Mnemotecnia</span> <b>queLOIDE = se LIÓ de más</b> (se salió). HIPERtrófica = HIPERobediente.</p><p><span class="lbl ana">Analogía</span> Dos niños en una cancha: uno respeta la línea (hipertrófica), el otro invade al vecino y aunque lo regañes vuelve (queloide).</p><p><span class="lbl key">Dato que distingue</span> Rebasa bordes + recurre tras resección = queloide. Recurrencia tras resección sola: 50–80% (el banco aceptó ">15%").</p>',
anki:'cicatrizacion::queloide',
subs:[
{q:'Mejor tratamiento del queloide (banco):',opts:['Resección únicamente','Resección + reconstrucción + triamcinolona (esteroide intralesional)','Radioterapia + toxina botulínica','Solo parches de silicón'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Resecar solo = volverá. Se combina cirugía + esteroide intralesional (± silicón, compresión). El banco también aceptó como tratamientos: compresión extrínseca, silicón, esteroides, variedades de TGF-beta.</p><p><span class="lbl reg">Regla</span> Si veo tx de queloide, marco <b>resección + triamcinolona</b>.</p>'},
{q:'Sobre la cicatriz HIPERTRÓFICA, la aseveración INCORRECTA es:',opts:['Respeta los límites de la herida','Puede regresar espontáneamente','Crece más allá de los bordes','Mejora con presión y silicón'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> "Crecer más allá de los bordes" es del QUELOIDE. El banco usa exactamente esta trampa.</p><p><span class="lbl reg">Regla</span> Si veo hipertrófica + "rebasa bordes", esa es la <b>incorrecta</b>.</p>'},
{q:'Células predominantes de la fase PROLIFERATIVA:',opts:['Neutrófilos','Fibroblastos y células endoteliales','Macrófagos','Queratinocitos'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Día 4–21: fibroblastos fabrican colágeno y los endotelios hacen angiogénesis. La matriz de colágeno crece en esta fase [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>PROLIFERAR = FIBRO + ENDO fabricando</b>.</p><p><span class="lbl reg">Regla</span> Si veo fase proliferativa, marco <b>fibroblastos + endoteliales</b>.</p>'},
{q:'Fase de la cicatrización que REMUEVE tejido desvitalizado y previene infección:',opts:['Hemostasia','Inflamatoria','Proliferativa','Remodelación'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La inflamatoria (0–4 días) limpia: neutrófilos y macrófagos barren detritus y bacterias. La PRIMERA respuesta vascular a la lesión es la VASOCONSTRICCIÓN [P.E.].</p><p><span class="lbl reg">Regla</span> Si veo limpieza/antiinfección, marco <b>inflamatoria</b>.</p>'},
{q:'Fase prolongada (semanas a años) que maximiza la RESISTENCIA de la herida:',opts:['Proliferativa','Inflamatoria','Remodelación (maduración)','Imbibición'],c:2,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Remodelación: el colágeno III se cambia por I y la fuerza tensil sube (hasta ~80% de la original). El niño quemado con cicatrices retráctiles a meses del evento está en REMODELACIÓN [P.E. ×2]. En el día 21 conviven proliferación y remodelación (Junio 2023 dio ambas por buenas).</p><p><span class="lbl reg">Regla</span> Si veo cicatriz madurando a meses, marco <b>remodelación</b>.</p>'},
{q:'🔎 [Mayo 2026] ¿Cuándo aparecen los fibroblastos / inicia la proliferación franca?',opts:['Primeras 2 horas','Entre el 3.er y 5.° día','Día 15','Mes 3'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Mayo 2026 trajo "entre el 3.er y 5.º día" como respuesta — encaja con la entrada en escena de los fibroblastos/proliferación. (Una versión vieja del banco decía "12 h, respuesta celular inflamatoria"; el dato nuevo manda.)</p><p><span class="lbl dis">🔎 VERIFICAR</span> Enunciado reconstruido; confirma a qué se refería exactamente.</p>'},
{q:'🔎 [Mayo 2026] El proceso de maduración/remodelación de una cicatriz se evalúa para revisión en:',opts:['1 semana','1 mes','3–6 meses','5 años'],c:2,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Mayo 2026 incluyó "3-6 meses". El proceso cicatrizal "dura" ~3 meses según el banco viejo, y la cicatriz se revalora a los 3–6 meses antes de decidir revisiones.</p><p><span class="lbl dis">🔎 VERIFICAR</span> Pregunta reconstruida desde la pura respuesta.</p>'},
{q:'Una herida se considera CONTAMINADA después de:',opts:['1 hora','3–6 horas','12 horas','24 horas'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Pasadas ~6 h las bacterias ya se multiplicaron: cambia el manejo (no cierre primario directo). La cavidad ORAL se considera contaminada de entrada [P.E.]. Herida COMPLICADA = afecta varias estructuras [P.E. ×2].</p><p><span class="lbl reg">Regla</span> Si veo herida contaminada, marco <b>3–6 h</b>.</p>'},
{q:'Herida injertada 3 semanas después del trauma, tras preparar el lecho. Tipo de cierre:',opts:['Primera intención','Segunda intención','Tercera intención (cierre primario diferido)','Cuarta intención'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Se dejó abierta, se preparó y LUEGO se cerró activamente (sutura/injerto/colgajo) = tercera intención. El quemado que se fue de alta con apósitos y epitelizó solo = SEGUNDA intención [P.E. ×2]. La zona donadora de espesor total se cierra de PRIMERA [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>1.ª = ya · 2.ª = sola · 3.ª = después</b>.</p><p><span class="lbl reg">Regla</span> Si veo "se dejó abierta y luego se injertó/suturó", marco <b>tercera intención</b>.</p>'},
{q:'Cicatriz retráctil en muñeca post-quemadura que limita la extensión. Tratamiento correcto:',opts:['Esteroide oral','Incisión de la contractura + Z-plastia (o + injerto)','Solo fisioterapia','Resección y cierre directo a tensión'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La contractura se LIBERA y el defecto se cubre: Z-plastia (alarga y reorienta) o injerto. El banco dio ambas por correctas.</p><p><span class="lbl reg">Regla</span> Si veo contractura cicatricial, marco <b>liberar + Z-plastia/injerto</b>.</p>'},
{q:'Úlcera crónica de 9 años sobre cicatriz de quemadura antigua en hueco poplíteo. Diagnóstico probable:',opts:['Úlcera varicosa','Úlcera por presión','Úlcera de Marjolin (carcinoma espinocelular)','Cicatriz hipertrófica'],c:2,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Cicatriz de quemadura vieja + úlcera crónica que no cura = Marjolin = transformación a CA ESPINOCELULAR (la úlcera crónica tiende a convertirse en carcinoma epidermoide [P.E. ×2]). Herida crónica = >3 meses [P.E.].</p><p><span class="lbl mne">Mnemotecnia</span> <b>MARjolin = MARca vieja que MALigniza</b>.</p><p><span class="lbl reg">Regla</span> Si veo úlcera sobre quemadura antigua, marco <b>Marjolin → espinocelular</b>.</p>'},
{q:'Vitamina cuya deficiencia altera la cicatrización (hidroxilación del colágeno):',opts:['Vitamina A','Vitamina C','Vitamina D','Vitamina K'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Sin vitamina C no se hidroxilan prolina/lisina → colágeno débil (escorbuto).</p><p><span class="lbl reg">Regla</span> Si veo vitamina y cicatrización, marco <b>C</b>.</p>'}
]},

/* ============ CASO 12 — FISURA LABIOPALATINA / CRANEOFACIAL PEDI ============ */
{
id:'fisura', tema:'Craneofacial · Fisuras y DOM', temaKey:'craneofacial', prio:'ALTA', pe:7,
resp:'Labio y paladar hendido',
alias:['labio y paladar hendido','labio hendido','paladar hendido','fisura labiopalatina','labio leporino','fisura labial y palatina'],
vineta:'Lactante de 1 mes, hijo de madre diabética de 40 años, con defecto congénito que abarca el labio superior derecho y se continúa hacia el paladar. La madre pregunta <b>cuándo se opera</b>.',
pistas:[
'El defecto cruza una estructura anatómica que sirve de frontera entre "labio" y "paladar".',
'El labio se repara primero; el paladar después (12–18 meses).',
'La cirugía del paladar busca que el niño hable bien (esfínter velofaríngeo).',
'Mayo 2026 preguntó el objetivo: restaurar la función velofaríngea.',
'Regla de los 10 para operar el labio: ~10 semanas.'],
opciones:['Labio y paladar hendido','Secuencia de Pierre Robin','Microsomía hemifacial','Síndrome de Treacher Collins'],
rev:'<p><span class="lbl why">Por qué</span> Defecto labial que se continúa al paladar = fisura labiopalatina. El labio se cierra a los <b>3–4 meses</b> (el banco aceptó "3 meses, entre más pronto mejor") y el paladar después, buscando UNA cosa: que el esfínter velofaríngeo funcione para el habla. <b>[P.E. ×7]</b></p><p><span class="lbl dis">Distractores</span> Pierre Robin = micrognatia + glosoptosis + obstrucción respiratoria + paladar hendido (secuencia mecánica). Microsomía = asimetría facial, no fisura. Treacher Collins = disostosis mandibulofacial.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"LABIO a los 3, PALADAR al año"</b>.</p><p><span class="lbl ana">Analogía</span> El velo del paladar es la puerta entre nariz y boca: si no cierra, el aire se escapa por la nariz al hablar (voz nasal).</p><p><span class="lbl key">Dato que distingue</span> La frontera labio/paladar es el AGUJERO (fosa) INCISIVO.</p>',
anki:'craneofacial::fisura-labiopalatina',
subs:[
{q:'Estructura anatómica que divide labio hendido de paladar hendido:',opts:['Espina nasal anterior','Agujero (fosa) incisivo','Sutura palatina media','Vómer'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Adelante del agujero incisivo = paladar primario (labio + alvéolo); atrás = paladar secundario. Cae TODOS los años.</p><p><span class="lbl mne">Mnemotecnia</span> <b>el INCISIVO hace la INCISIÓN divisoria</b>.</p><p><span class="lbl reg">Regla</span> Si veo frontera labio/paladar, marco <b>agujero incisivo</b>.</p>'},
{q:'Edad recomendada para el cierre del LABIO hendido:',opts:['Al nacer','3–4 meses','8–9 meses','2 años'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Regla de los 10 (10 semanas, 10 libras, Hb 10): ~3 meses. El banco ha aceptado "3 meses" y "3 a 4 meses".</p><p><span class="lbl reg">Regla</span> Si veo cierre de labio, marco <b>3–4 meses</b>.</p>'},
{q:'[Mayo 2026] Objetivo principal de la palatoplastia / cirugía del paladar:',opts:['Estética del arco dental','Restaurar la función velofaríngea (habla)','Evitar caries','Permitir la lactancia inmediata'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Sin esfínter velofaríngeo no hay fonación normal: ese es EL objetivo. El músculo clave del cierre faríngeo: ELEVADOR DEL VELO [P.E.].</p><p><span class="lbl reg">Regla</span> Si veo objetivo de palatoplastia, marco <b>función velofaríngea</b>.</p>'},
{q:'Edad promedio para realizar una FARINGOPLASTIA (insuficiencia velofaríngea residual):',opts:['3 meses','1 año','3–5 años','12 años'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Se espera a evaluar el habla: 3–5 años (el banco también aceptó "4 años").</p><p><span class="lbl reg">Regla</span> Si veo faringoplastia, marco <b>3–5 años</b>.</p>'},
{q:'La secuencia de Pierre Robin incluye, EXCEPTO:',opts:['Micrognatia','Glosoptosis','Obstrucción respiratoria + paladar hendido','Esclerodermia en coup de sabre'],c:3,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La tríada/tétrada es micrognatia → glosoptosis → obstrucción (+ paladar hendido). El coup de sabre es la excepción que usó el banco.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"mandíbula chica, lengua que cae, aire que falta"</b> — cadena mecánica.</p><p><span class="lbl reg">Regla</span> Si veo Pierre Robin, marco la <b>cadena mandíbula-lengua-vía aérea</b>.</p>'},
{q:'Microsomía hemifacial: señala lo CORRECTO:',opts:['Es la malformación craneofacial más frecuente','Es la SEGUNDA anomalía craneofacial congénita más frecuente y NO afecta solo hueso','Solo afecta tejido óseo','Es más frecuente que la fisura labiopalatina'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> #1 es la fisura labiopalatina; la microsomía hemifacial es #2 y afecta hueso Y tejidos blandos (la opción "solo afecta tejido óseo" fue la INCORRECTA del banco ×2).</p><p><span class="lbl reg">Regla</span> Si veo microsomía hemifacial, marco <b>2.ª más frecuente</b>.</p>'},
{q:'Tratamiento de la microsomía hemifacial con hipoplasia mandibular:',opts:['Prótesis','Distracción osteogénica mandibular (DOM)','Esperar a la adultez siempre','Injerto de grasa'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La DOM alarga la mandíbula hipoplásica de forma gradual.</p><p><span class="lbl reg">Regla</span> Si veo hipoplasia mandibular en niño, marco <b>DOM</b>.</p>'},
{q:'Edad recomendada para iniciar la distracción osteogénica mandibular (DOM):',opts:['Recién nacido','4–6 años','10–12 años','18 años'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El banco lo fijó en 4–6 años (también aceptó "4 años").</p><p><span class="lbl reg">Regla</span> Si veo edad de DOM, marco <b>4–6 años</b>.</p>'},
{q:'Etapas de la DOM: el intervalo entre la corticotomía y el inicio de la distracción se llama:',opts:['Consolidación','Latencia','Activación','Retención'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> 3 etapas: LATENCIA (esperar callo blando) → DISTRACCIÓN/activación (1 mm/día) → CONSOLIDACIÓN (se dejan los distractores 2–4 meses hasta la simetría deseada).</p><p><span class="lbl mne">Mnemotecnia</span> <b>"LA-DI-CO": LAtencia, DIstracción, COnsolidación</b>.</p><p><span class="lbl reg">Regla</span> Si veo "intervalo antes de distraer", marco <b>latencia</b>; si veo "se dejan 2–4 meses", <b>consolidación</b>.</p>'},
{q:'[Mayo 2026] La distracción osteogénica SUPERAGUDA se refiere a:',opts:['1 mm','5 mm','10 mm','15 mm'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Superaguda = 5 mm (ritmo acelerado). Cayó en 2023 ×2 y volvió en Mayo 2026 como "5 mm".</p><p><span class="lbl reg">Regla</span> Si veo DOM superaguda, marco <b>5 mm</b>.</p>'},
{q:'Arcos branquiales — lo que el banco pregunta:',opts:['El 1.er arco da el proceso maxilar y su nervio es el TRIGÉMINO; el LÓBULO de la oreja viene del 2.° arco','La oreja completa viene del 3.er arco','El nervio del 1.er arco es el facial','El maxilar viene del 2.° arco'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> 1.er arco: maxilar/mandíbula + V par. 2.° arco: facial + parte inferior del pabellón (lóbulo). Parte superior de la oreja = 1.er arco.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Primero mastico (V), luego sonrío (VII)"</b>.</p><p><span class="lbl reg">Regla</span> Si veo lóbulo de oreja, marco <b>2.° arco</b>; proceso maxilar, <b>1.er arco/trigémino</b>.</p>'}
]},
/* ============ CASO 13 — CRANEOSINOSTOSIS ============ */
{
id:'craneo', tema:'Craneofacial · Craneosinostosis', temaKey:'craneofacial', prio:'ALTA', pe:5,
resp:'Craneosinostosis',
alias:['craneosinostosis','cranosinostosis','sinostosis craneal','escafocefalia','craneosinostosis sagital'],
vineta:'Lactante de 6 meses llevado por deformidad del cráneo. A la exploración: <b>diámetro anteroposterior AUMENTADO</b> y transversal disminuido (cráneo alargado "en barco").',
pistas:[
'Una sutura craneal se cerró antes de tiempo.',
'El cráneo crece PARALELO a la sutura fusionada (ley de Virchow).',
'Cráneo largo y angosto = escafocefalia.',
'Puede ser aislada (no sindromática) o parte de síndromes (Crouzon, Apert).',
'El tratamiento es quirúrgico: remodelación.'],
opciones:['Craneosinostosis (sagital)','Plagiocefalia posicional','Hidrocefalia','Microcefalia'],
rev:'<p><span class="lbl why">Por qué</span> Deformidad craneal por cierre PREMATURO de una sutura. AP aumentado = escafocefalia = sutura SAGITAL (la más frecuente). Crece paralelo a la sutura cerrada y se frena perpendicular a ella. <b>[P.E. ×5]</b></p><p><span class="lbl dis">Distractores</span> Plagiocefalia posicional no tiene sutura fusionada (se moldea por apoyo); hidrocefalia agranda TODO el cráneo con fontanela tensa.</p><p><span class="lbl mne">Mnemotecnia</span> <b>eScafocefalia = Sagital = barco (eSquife)</b> · <b>BRAquicefalia = BIcoronal = cabeza BReve/ancha</b> · <b>TRIgonocefalia = meTÓPica = frente TRIangular</b> · <b>PLAgiocefalia = una coronal (o lambdoidea) = cabeza PLAna de un lado</b> · <b>OXIcefalia = torre</b>.</p><p><span class="lbl ana">Analogía</span> El cráneo es un globo entre rieles: si un riel se suelda, el globo solo puede crecer a lo largo de ese riel.</p><p><span class="lbl key">Dato que distingue</span> AP aumentado→sagital; transversal aumentado (AP corto)→coronal BILATERAL.</p>',
anki:'craneofacial::craneosinostosis',
subs:[
{q:'Lactante con diámetro AP de cabeza AUMENTADO. Sutura afectada:',opts:['Coronal bilateral','Sagital','Metópica','Lambdoidea'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Sagital cerrada → no crece a lo ancho → crece a lo largo = escafocefalia.</p><p><span class="lbl reg">Regla</span> Si veo cráneo largo, marco <b>sagital</b>.</p>'},
{q:'Lactante con diámetro TRANSVERSAL aumentado y AP disminuido. Sutura afectada:',opts:['Sagital','Metópica','Coronal BILATERAL','Escamosa'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Ambas coronales cerradas → no crece hacia adelante-atrás → se ensancha = braquicefalia. Así vino el caso del banco 2021.</p><p><span class="lbl reg">Regla</span> Si veo cráneo ancho y corto, marco <b>coronal bilateral</b>.</p>'},
{q:'Tratamiento de la craneosinostosis:',opts:['Casco ortopédico siempre','Es autolimitada','Quirúrgico: remodelación (y avance fronto-orbitario según el caso)','Solo observación'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Sutura fusionada no se "desfusiona" sola: se recomienda tratamiento QUIRÚRGICO (remodelación y avance fronto-orbitario en coronales). El casco es para la plagiocefalia POSICIONAL.</p><p><span class="lbl reg">Regla</span> Si veo tx de craneosinostosis, marco <b>quirúrgico/remodelación</b>.</p>'},
{q:'Sobre las craneosinostosis, señala lo CORRECTO:',opts:['Siempre son sindromáticas','Pueden presentarse aisladas o formar parte de síndromes craneofaciales','Nunca afectan el desarrollo','Son adquiridas en la adolescencia'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> "Conjunto de anomalías": aisladas (no sindromáticas, las más comunes) o sindromáticas (Crouzon, Apert, Pfeiffer...).</p><p><span class="lbl reg">Regla</span> Si veo enunciado conciliador "pueden ser aisladas o sindromáticas", ese es el <b>correcto</b>.</p>'},
{q:'Síndrome craneofacial SIN afectación de extremidades:',opts:['Apert','Crouzon','Pfeiffer','Saethre-Chotzen'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Crouzon = cara + cráneo, manos LIBRES. Apert = lo mismo + SINDACTILIA (compleja/complicada — así la preguntó el banco para Apert).</p><p><span class="lbl mne">Mnemotecnia</span> <b>CROUZon = Cero manos afectadas · APERt = APREtados los dedos</b>.</p><p><span class="lbl reg">Regla</span> Si veo craneofacial sin extremidades, marco <b>Crouzon</b>; con sindactilia, <b>Apert</b>.</p>'},
{q:'Son craneosinostosis SINDRÓMICAS, excepto:',opts:['Crouzon','Apert','Treacher Collins','Pfeiffer'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Treacher Collins es disostosis mandibulofacial (hipoplasia malar-mandibular, coloboma palpebral): NO es craneosinostosis.</p><p><span class="lbl reg">Regla</span> Si veo Treacher Collins entre craneosinostosis, ese es el <b>intruso</b>.</p>'}
]},

/* ============ CASO 14 — TRAUMA FACIAL ============ */
{
id:'fxfacial', fc:'fx-faciales', tema:'Fracturas faciales', temaKey:'fxfaciales', prio:'ALTA', pe:7,
resp:'Fractura de mandíbula',
alias:['fractura de mandibula','fractura mandibular','fx de mandibula','fractura de la mandibula'],
vineta:'Masculino de 48 años, caída de su propia altura con golpe en el mentón. Presenta dolor a la masticación, <b>halitosis</b>, mordida abierta e <b>imposibilidad para la oclusión dental</b> completa.',
pistas:[
'El signo más constante es la MALOCLUSIÓN.',
'Busca equimosis en el piso de la boca: es muy sugestiva.',
'El golpe en el mentón transmite fuerza a los CÓNDILOS.',
'Hay un estudio radiológico panorámico que la retrata completa.',
'Puede ser bifocal: ángulo de un lado + parasínfisis del otro.'],
opciones:['Fractura de mandíbula','Fractura Le Fort II','Fractura del arco cigomático','Luxación temporomandibular'],
rev:'<p><span class="lbl why">Por qué</span> Maloclusión + dolor al masticar + halitosis (no puede asearse/comer) = mandíbula rota. Caída sobre el mentón = pienso en CÓNDILOS. La mandíbula es un anillo: suele romperse en DOS puntos (ángulo izq + parasínfisis der, como lo puso el banco). <b>[P.E. ×7]</b></p><p><span class="lbl dis">Distractores</span> Le Fort = tercio medio (maxilar), también da maloclusión pero con movilidad del paladar; cigomático = depresión malar y trismus.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Mandíbula = dona"</b>: muerde un punto y se rompe en dos.</p><p><span class="lbl ana">Analogía</span> Si doblas un aro de pretzel por un lado, truena también del otro.</p><p><span class="lbl key">Dato que distingue</span> Signo clínico más común: MALA OCLUSIÓN. Equimosis del piso de la boca = casi patognomónica.</p>',
anki:'fxfaciales::mandibula',
subs:[
{q:'Mejor estudio radiológico inicial / de elección para fractura de mandíbula:',opts:['Waters','Ortopantomografía (panorámica)','Lateral de cráneo','Towne'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La panorámica muestra TODA la mandíbula en una placa. El banco también aceptó TAC de macizo facial como "primer estudio/definitivo" en politrauma — si el contexto es politrauma con más fracturas, marco TAC; si es mandíbula aislada, ortopantomografía.</p><p><span class="lbl reg">Regla</span> Si veo mandíbula aislada, marco <b>ortopantomografía</b>; politrauma facial, <b>TAC</b>.</p>'},
{q:'Caída sobre el mentón: localización típica de la fractura en la radiografía:',opts:['Cóndilos','Apófisis coronoides','Solo sínfisis','Reborde orbitario'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El mentón es el parachoques: la energía viaja y truena los cóndilos. Del tx de cóndilo, el banco marcó EXCEPTO: plasma rico en plaquetas.</p><p><span class="lbl reg">Regla</span> Si veo golpe en mentón, marco <b>cóndilos</b>.</p>'},
{q:'Cuidados preoperatorios de la fractura mandibular, EXCEPTO:',opts:['Cabeza elevada','Aseo dental correcto','AYUNO TOTAL por imposibilidad de masticar','Antibioticoterapia'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> No se deja en ayuno total: dieta líquida/blanda. Lo demás sí (es fractura abierta a boca → antibiótico + higiene).</p><p><span class="lbl reg">Regla</span> Si veo "excepto" en cuidados de mandíbula, marco <b>ayuno total</b>.</p>'},
{q:'Fractura cuyo trazo va desde la apófisis ascendente del maxilar/incisivos hasta las apófisis pterigoides, HORIZONTAL sobre los dientes:',opts:['Le Fort I','Le Fort II','Le Fort III','NOE'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Le Fort I = paladar flotante (horizontal). II = piramidal, cruza nariz y rebordes infraorbitarios (huesos: nasal, unguis/lagrimal, maxilar... el banco agregó esfenoides). III = disyunción craneofacial: nasofrontal + pared orbitaria lateral + arco cigomático, "la más larga".</p><p><span class="lbl mne">Mnemotecnia</span> <b>I = bigote · II = pirámide nasal · III = máscara completa</b>.</p><p><span class="lbl reg">Regla</span> Si veo paladar móvil, marco <b>Le Fort I</b>; trazo nasofrontal + arco cigomático, <b>Le Fort III</b>.</p>'},
{q:'Trauma orbitario con edema bipalpebral, enoftalmos y DIPLOPÍA persistente. Diagnóstico:',opts:['Fractura del techo orbitario','Fractura del piso de la órbita (blow-out)','Fractura nasal simple','Hematoma retrobulbar'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> El piso es el punto débil: estalla hacia el seno maxilar, atrapa grasa/recto inferior → diplopía + enoftalmos (Mayo 2026 lo trajo como "enoftalmos y diplopía"). Si el defecto es pared medial + piso = blow-out PURO. Tx: reducción abierta + malla de piso orbitario. Estudio: TAC helicoidal de cráneo y macizo facial.</p><p><span class="lbl key">Dato que distingue</span> Hipoestesia de mejilla = nervio INFRAORBITARIO atrapado. Fx del tercio medio acompañante típica: piso orbitario + seno maxilar.</p><p><span class="lbl reg">Regla</span> Si veo diplopía + enoftalmos tras trauma, marco <b>blow-out del piso</b>.</p>'},
{q:'Fractura de piso de órbita: ¿qué nervio se afecta dando hipoestesia de mejilla y labio superior?',opts:['Supraorbitario','Infraorbitario','Mentoniano','Facial rama bucal'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El infraorbitario corre por el piso de la órbita. El MENTONIANO es el del labio INFERIOR en fracturas de mandíbula (Junio 2023).</p><p><span class="lbl reg">Regla</span> Si veo mejilla dormida, marco <b>infraorbitario</b>; labio inferior dormido, <b>mentoniano</b>.</p>'},
{q:'Paciente con probable fractura nasal y EPISTAXIS activa. Conducta inmediata:',opts:['Reducción cerrada inmediata','Taponamiento nasal con gasas','TAC urgente antes de todo','Cauterización'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Primero detengo el sangrado: taponamiento. Las proyecciones para fractura nasal: LATERAL (perfilograma) y WATERS [P.E.]. Si hay rinorrea clara tras trauma nasoetmoidal → pienso en fractura NOE con fístula de LCR [P.E. ×2].</p><p><span class="lbl reg">Regla</span> Si veo epistaxis activa, marco <b>taponamiento con gasas</b>.</p>'},
{q:'Herida profunda en región supraciliar/frontotemporal por botella. ¿Qué descartas primero y cómo?',opts:['Lesión del nervio supraorbitario · pedir que eleve las cejas y explorar sensibilidad frontal','Fractura de mandíbula · ortopantomografía','Lesión del conducto parotídeo','Lesión del nervio mentoniano'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> En la ceja viven la rama frontal del facial (motor: elevar cejas) y los nervios supraorbitario/supratroclear del trigémino (sensitivos: frente). Exploro AMBOS: que eleve las cejas + sensibilidad frontal comparativa. Luego: reparar y referir.</p><p><span class="lbl reg">Regla</span> Si veo herida supraciliar, marco <b>explorar supraorbitario + rama frontal del facial</b>.</p>'},
{q:'Fractura del arco cigomático: ¿qué rama MOTORA está en riesgo?',opts:['Rama temporal del nervio facial','Rama bucal','Nervio infraorbitario','Nervio auriculotemporal'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La rama temporal (frontal) del facial cruza el arco cigomático: su lesión = no eleva la ceja. (El banco la etiquetó "rama temporal del V par" — error de transcripción: es del VII; el V da sensibilidad.) 🔎 verifica cómo la redacten.</p><p><span class="lbl reg">Regla</span> Si veo arco cigomático + parálisis de ceja, marco <b>rama temporal del facial</b>.</p>'},
{q:'Parálisis de Bell antigua con sincinesias (la comisura se retrae al cerrar el ojo). Diagnóstico y tratamiento del banco:',opts:['Disquinesia del facial por reinervación anómala · injerto de nervio SURAL','Espasmo hemifacial · toxina','Miastenia · piridostigmina','Tic facial · psicoterapia'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Axones que se equivocaron de rama al regenerar = sincinesia/disquinesia. El banco usó el caso para preguntar el INJERTO de sural como conductor.</p><p><span class="lbl reg">Regla</span> Si veo movimientos cruzados post-Bell, marco <b>reinervación anómala</b>.</p>'},
{q:'Herida por proyectil de arma de fuego en mejilla. Manejo INICIAL:',opts:['Reconstrucción inmediata','Control de la VÍA AÉREA','Antibiótico y alta','TAC antes que nada'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> ABC primero: en trauma facial la vía aérea es la prioridad (sangre + edema + fragmentos la comprometen).</p><p><span class="lbl reg">Regla</span> Si veo trauma facial grave, marco <b>vía aérea primero</b>.</p>'},
{q:'La irrigación de la cara — aseveración correcta del banco:',opts:['Solo carótida externa','Ramas de la carótida EXTERNA e INTERNA','Solo carótida interna','Vertebrales'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Externa (facial, temporal superficial, maxilar) + interna (oftálmica → supraorbitaria/supratroclear). Por eso el colgajo frontal vive de la interna.</p><p><span class="lbl reg">Regla</span> Si veo irrigación facial, marco <b>ambas carótidas</b>.</p>'}
]},

/* ============ CASO 15 — RECONSTRUCCIÓN MAMARIA ============ */
{
id:'mama', tema:'Reconstrucción de mama', temaKey:'mama', prio:'ALTA', pe:6,
resp:'Reconstrucción con colgajo DIEP',
alias:['reconstruccion con colgajo diep','colgajo diep','diep','reconstruccion mamaria con diep','reconstruccion mamaria autologa'],
vineta:'Femenina de 58 años, mastectomía radical modificada + radioterapia hace 2 años, en remisión. Pide reconstrucción. Tiene <b>buen tejido abdominal</b>, sin cirugías abdominales previas. Busca la opción autóloga que <b>NO sacrifique función</b> de la pared abdominal.',
pistas:[
'Tras RADIOTERAPIA conviene tejido AUTÓLOGO, no implante solo.',
'El colgajo ideal aquí viene del abdomen.',
'Queremos perforantes: piel y grasa SIN llevarse el músculo recto.',
'Su pedículo perfora el recto abdominal desde abajo.',
'Las siglas del colgajo describen su arteria.'],
opciones:['Reconstrucción con colgajo DIEP','Colgajo TRAM pediculado','Implante + expansor solamente','Colgajo dorsal ancho sin implante'],
rev:'<p><span class="lbl why">Por qué</span> Radioterapia previa → autólogo. Abdomen disponible + preservar función = <b>DIEP</b>: colgajo de perforantes que deja el músculo en su lugar. <b>[P.E. ×6]</b></p><p><span class="lbl dis">Distractores</span> TRAM se lleva el RECTO → su gran desventaja: déficit funcional de pared + hernias [P.E. ×2]. Implante solo en piel radiada falla. Dorsal ancho es plan B (paciente delgada o abdomen no disponible) y suele llevar implante.</p><p><span class="lbl mne">Mnemotecnia</span> <b>DIEP = Deep Inferior Epigastric Perforator</b>: la sigla ES la respuesta de su arteria. <b>TRAM pediculado = Tira de la epigástrica SUPERIOR</b> (gira hacia arriba); TRAM LIBRE = epigástrica INFERIOR.</p><p><span class="lbl ana">Analogía</span> TRAM = llevarse la pared con todo y viga; DIEP = sacar solo el cableado por un barreno, dejando la viga.</p><p><span class="lbl key">Dato que distingue</span> Paciente DELGADA sin tejido abdominal → se descartan DIEP y TRAM → dorsal ancho + expansor/implante [P.E. ×2].</p>',
anki:'mama::diep-tram',
subs:[
{q:'El colgajo DIEP basa su circulación en:',opts:['Arteria epigástrica superior','Perforantes de la arteria epigástrica inferior profunda','Arteria toracodorsal','Circunfleja ilíaca superficial'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Lo dicen sus siglas: Deep Inferior Epigastric Perforator.</p><p><span class="lbl reg">Regla</span> Si veo DIEP, marco <b>perforantes de la epigástrica inferior profunda</b>.</p>'},
{q:'El colgajo TRAM PEDICULADO basa su pedículo en:',opts:['Epigástrica inferior profunda','Epigástrica SUPERIOR','Toracodorsal','Mamaria interna'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El pediculado queda colgado de ARRIBA (epigástrica superior, continuación de la mamaria interna). El TRAM LIBRE se anastomosa con la epigástrica INFERIOR (su pedículo dominante) [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>Pediculado = Para arriba (superior) · Libre = la inferior</b>.</p><p><span class="lbl reg">Regla</span> Si veo TRAM pediculado, marco <b>epigástrica superior</b>; TRAM libre, <b>inferior</b>.</p>'},
{q:'Principal DESVENTAJA del colgajo TRAM:',opts:['Mal color','Déficit funcional de la pared abdominal con riesgo de hernias','No sirve tras radioterapia','Pedículo corto'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Se lleva el músculo recto: pared débil → hernias/abultamiento.</p><p><span class="lbl reg">Regla</span> Si veo desventaja del TRAM, marco <b>pared abdominal/hernias</b>.</p>'},
{q:'Arteria del colgajo DORSAL ANCHO:',opts:['Toracodorsal','Torácica larga','Epigástrica superior','Subescapular directa'],c:0,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Dorsal ancho = arteria TORACODORSAL (rama de la subescapular). Es la opción en paciente delgada (+ expansor/implante) o tras radioterapia con reconstrucción tardía [P.E. ×2].</p><p><span class="lbl mne">Mnemotecnia</span> <b>DORSAL ancho ↔ toracoDORSAL</b>: comparten apellido.</p><p><span class="lbl reg">Regla</span> Si veo dorsal ancho, marco <b>toracodorsal</b>.</p>'},
{q:'Colgajo históricamente MÁS utilizado para reconstrucción mamaria (banco viejo):',opts:['DIEP','Recto del abdomen (TRAM)','Glúteo','Gracilis'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco viejo respondía "recto de abdomen"; post-radiación también: "colgajo musculocutáneo de recto del abdomen".</p><p><span class="lbl reg">Regla</span> Si veo colgajo más usado en mama (pregunta clásica), marco <b>recto del abdomen/TRAM</b>.</p>'},
{q:'Sobre el complejo areola-pezón en la reconstrucción:',opts:['No se reconstruye','Se reconstruye con injerto contralateral (o colgajos locales + tatuaje)','Siempre con prótesis','Se trasplanta del abdomen'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco respondió: injerto del pezón contralateral (técnica de compartir pezón).</p><p><span class="lbl reg">Regla</span> Si veo areola-pezón, marco <b>injerto contralateral</b>.</p>'},
{q:'Complicación MÁS frecuente de los implantes mamarios:',opts:['Infección','Contractura capsular (cápsula periprotésica)','Ruptura','Linfoma'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La cápsula periprotésica que se contrae es la complicación #1. El implante LISO es el que más se asocia a contractura; el MACROTEXTURIZADO al linfoma anaplásico (BIA-ALCL); el de POLIURETANO es el de mayor fijación a tejidos [P.E. ×2 cada uno].</p><p><span class="lbl reg">Regla</span> Si veo complicación de implante, marco <b>contractura capsular</b>; si veo linfoma, <b>macrotexturizado</b>.</p>'},
{q:'Vías de colocación de implantes mamarios — el banco preguntó la que NO se usa (con silicón):',opts:['Submamaria','Periareolar','Transaxilar','Transumbilical'],c:3,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La transumbilical (TUBA) solo sirvió para implantes SALINOS, ya en desuso. Para mastopexia, el abordaje que NO se usa: AXILAR [P.E.].</p><p><span class="lbl reg">Regla</span> Si veo vía de implante de silicón "excepto", marco <b>transumbilical</b>.</p>'},
{q:'Mama con pezón 2 cm POR DEBAJO del surco mamario: grado de ptosis:',opts:['Grado 1','Grado 2','Grado 3','Pseudoptosis'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Regnault: G1 = pezón AL nivel del surco; G2 = debajo del surco pero mirando al frente; G3 = debajo y apuntando al piso. 2 cm debajo sin apuntar abajo = G2 (así lo calificó el banco).</p><p><span class="lbl reg">Regla</span> Si veo pezón bajo el surco pero no apunta abajo, marco <b>grado 2</b>.</p>'}
]},

/* ============ CASO 16 — ONCOLOGÍA CUTÁNEA ============ */
{
id:'capiel', tema:'Oncología cutánea', temaKey:'oncopiel', prio:'ALTA', pe:6,
resp:'Carcinoma espinocelular',
alias:['carcinoma espinocelular','ca espinocelular','carcinoma epidermoide','carcinoma de celulas escamosas','espinocelular','carcinoma escamoso'],
vineta:'Femenina de 54 años con antecedente de radioterapia en cuello. Hace años desarrolló una placa tipo "lija" en la nariz (queratosis actínica). Desde hace 6 meses: <b>ulceración, crecimiento rápido y sangrado ocasional</b>.',
pistas:[
'Nació sobre una queratosis actínica (lesión precursora).',
'Crece RÁPIDO, se ulcera y sangra — más agresivo que su primo de crecimiento lento.',
'La radioterapia y el ARSÉNICO son factores de riesgo conocidos.',
'Puede dar metástasis ganglionares (a diferencia del basocelular, casi nunca).',
'La úlcera de Marjolin termina en este mismo diagnóstico.'],
opciones:['Carcinoma espinocelular','Carcinoma basocelular','Melanoma','Queratosis actínica'],
rev:'<p><span class="lbl why">Por qué</span> Queratosis actínica + radioterapia + ulceración y crecimiento rápido = ESPINOCELULAR. El basocelular es perlado, lento, de años, casi nunca metastatiza (el del banco: 8 años de evolución, no fijo a planos = basocelular). <b>[P.E. ×6]</b></p><p><span class="lbl dis">Distractores</span> Melanoma = lesión PIGMENTADA con ABCDE (asimetría, bordes irregulares, colores múltiples, diámetro >6 mm, evolución — Mayo 2026: "bordes irregulares, colores múltiples"). Queratosis actínica era la precursora: ya cambió.</p><p><span class="lbl mne">Mnemotecnia</span> <b>ESPINO = ESPINA que crece rápido y pica (ulcera/sangra) · BASO = BOBO lento perlado</b>. Tumor arsenical = espinocelular: <b>ARSénico ARde la ESpina</b>.</p><p><span class="lbl ana">Analogía</span> Basocelular = ladrón de casa que nunca sale del barrio; espinocelular = ladrón que sí toma carretera (ganglios).</p><p><span class="lbl key">Dato que distingue</span> Rápido + ulcerado + sobre lesión previa (queratosis, úlcera crónica, quemadura) = espinocelular.</p>',
anki:'oncopiel::espinocelular',
subs:[
{q:'Abordaje diagnóstico inicial de la lesión sospechosa:',opts:['Resecarla completa de inmediato','Biopsia (incisional/sacabocado) incluyendo margen de tejido sano','Solo observación','Crioterapia empírica'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Primero confirmo histología: biopsia incisional con zona de piel sana (así lo respondió el banco, aunque anotaron la controversia con excisional en lesiones pequeñas).</p><p><span class="lbl reg">Regla</span> Si veo lesión sospechosa de CA de piel, marco <b>biopsia incisional con margen sano</b>.</p>'},
{q:'Biopsia reporta espinocelular con bordes positivos. Conducta:',opts:['Cirugía inmediata sin más estudios','Estudios de extensión (TAC contrastada de cabeza y cuello) y DESPUÉS cirugía','Radioterapia paliativa','Quimioterapia neoadyuvante siempre'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El espinocelular puede dar metástasis: primero estadifico (TAC), luego opero.</p><p><span class="lbl reg">Regla</span> Si veo espinocelular confirmado, marco <b>extensión antes de cirugía</b>.</p>'},
{q:'Mejor método quirúrgico para resecar con control de márgenes:',opts:['Electrodesecación','Cirugía de Mohs','Curetaje','Criocirugía'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Mohs = cortar y mapear cada margen al microscopio en el momento: máximo control, mínimo sacrificio de tejido (ideal en cara/nariz).</p><p><span class="lbl mne">Mnemotecnia</span> <b>MOHS = Margen Observado Hasta Sanar</b>.</p><p><span class="lbl reg">Regla</span> Si veo CA de piel facial + mejor técnica, marco <b>Mohs</b>.</p>'},
{q:'[Mayo 2026] Criterios clínicos de sospecha de MELANOMA:',opts:['Bordes regulares y color uniforme','Bordes irregulares y colores múltiples (ABCDE)','Lesión perlada con telangiectasias','Placa tipo lija'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> ABCDE: Asimetría, Bordes irregulares, Color múltiple, Diámetro >6 mm, Evolución. Mayo 2026 lo puso como "bordes irregulares, colores múltiples".</p><p><span class="lbl reg">Regla</span> Si veo lesión pigmentada cambiante, marco <b>melanoma/ABCDE</b>.</p>'},
{q:'Lesión en cara de crecimiento LENTO (8 años), exofítica, ulcerada, NO fija a planos. Impresión diagnóstica:',opts:['Espinocelular','Basocelular','Melanoma amelánico','Queratoacantoma'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Años de evolución + no invade planos = basocelular (el más FRECUENTE de los CA de piel). El dx diferencial del banco excluía QUISTE DERMOIDE como opción que no va.</p><p><span class="lbl key">Dato que distingue</span> Lento/local = baso; rápido/ulcerado/precursor = espino. Si la herida en cara está FIJA a planos profundos sin úlcera, el banco la marcó como espinocelular.</p><p><span class="lbl reg">Regla</span> Si veo años de evolución sin invasión, marco <b>basocelular</b>.</p>'},
{q:'Lugar más común de la LEUCOPLASIA (lesión premaligna):',opts:['Piel del dorso','Mucosas (oral)','Palmas','Cuero cabelludo'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Leucoplasia = placa blanca de MUCOSAS que no se desprende; premaligna para espinocelular. El px del banco: tabaco + alcohol + labio inferior ulcerado + adenopatías = CA escamoso de labio.</p><p><span class="lbl reg">Regla</span> Si veo leucoplasia, marco <b>mucosas</b>.</p>'},
{q:'Tras resecar un espinocelular nasal SIN exponer cartílago, y siendo la paciente cardiópata, la mejor reconstrucción es:',opts:['Colgajo libre radial','Injerto de espesor TOTAL (supraclavicular/retroauricular)','Injerto de espesor parcial','Colgajo de mejilla'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Sin lecho avascular expuesto + paciente frágil = lo simple: injerto de espesor total (mejor color y menos contracción que el parcial en cara). Zona donadora se cierra por planos.</p><p><span class="lbl reg">Regla</span> Si veo defecto nasal superficial en paciente de riesgo, marco <b>injerto de espesor total</b>.</p>'},
{q:'Defecto nasal de 1.5×1.5 cm CON exposición de cartílago. Manejo:',opts:['Injerto de espesor parcial','Colgajo local','Cierre por segunda intención','Cicatrización dirigida'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Cartílago expuesto = lecho que no nutre injertos → COLGAJO local (o frontal si es grande).</p><p><span class="lbl reg">Regla</span> Si veo cartílago expuesto en nariz, marco <b>colgajo</b>.</p>'}
]},

/* ============ CASO 17 — ESTÉTICA ============ */
{
id:'estetica', tema:'Cirugía estética', temaKey:'estetica', prio:'MEDIA', pe:4,
resp:'Abdominoplastía',
alias:['abdominoplastia','abdominoplastia con malla','dermolipectomia abdominal','abdominoplastia mas malla de polipropileno'],
vineta:'Femenina de 23 años, 2 cesáreas (una gemelar). Lipodistrofia abdominal con <b>piel que sobrepasa la cicatriz</b> de cesárea, ombligo deformado con mamelones, diástasis con dolor de espalda al ejercicio y grasa en abdomen y flancos.',
pistas:[
'Hay exceso de PIEL colgante, no solo grasa: la liposucción sola no basta.',
'La pared está debilitada (dolor de espalda, diástasis post-gemelar).',
'El banco agregó refuerzo protésico de la pared a la respuesta.',
'Se reseca el delantal dermograso y se reposiciona el ombligo.',
'Respuesta del banco: cirugía + malla.'],
opciones:['Abdominoplastía (+ malla de polipropileno)','Liposucción sola','Mini-abdominoplastía','Dieta y ejercicio únicamente'],
rev:'<p><span class="lbl why">Por qué</span> Piel redundante + ombligo deformado + pared débil = ABDOMINOPLASTÍA; el banco sumó MALLA de polipropileno por el defecto de pared. <b>[P.E. ×2]</b></p><p><span class="lbl dis">Distractores</span> Liposucción solo quita grasa, no piel ni repara pared; mini-abdominoplastía no alcanza con este exceso.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Piel que cuelga = bisturí; grasa sola = cánula"</b>.</p><p><span class="lbl key">Dato que distingue</span> El factor que decide abdominoplastía vs lipo es el EXCESO DE PIEL y el estado de la pared.</p>',
anki:'estetica::abdominoplastia',
subs:[
{q:'Complicación postquirúrgica MÁS TEMIDA de la liposucción:',opts:['Seroma','Tromboembolismo graso','Irregularidades','Infección'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La grasa liberada puede embolizar: tromboembolismo graso = la complicación letal temida.</p><p><span class="lbl reg">Regla</span> Si veo complicación temida de lipo, marco <b>embolismo graso</b>.</p>'},
{q:'En la BLEFAROPLASTIA se puede abordar lo siguiente, EXCEPTO:',opts:['Bolsas grasas','Exceso de piel palpebral','Piso de la órbita','Músculo orbicular redundante'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La blefaroplastia trabaja párpado (piel, orbicular, bolsas). El PISO de la órbita es territorio de trauma/reconstrucción, no de la blefa estética.</p><p><span class="lbl reg">Regla</span> Si veo blefaroplastia "excepto", marco <b>piso de la órbita</b>.</p>'},
{q:'Procedimiento estético NO quirúrgico #1 en frecuencia:',opts:['Rellenos','Toxina botulínica (Botox)','Peeling','Láser'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Botox manda; actúa sobre la CONTRACCIÓN MUSCULAR (eso preguntó el banco). En líneas de marioneta/periorales fue la conducta MENOS recomendada (ahí van rellenos) y la caída de tejidos = PTOSIS [P.E. ×2].</p><p><span class="lbl reg">Regla</span> Si veo no-quirúrgico más frecuente, marco <b>botox</b>; arrugas dinámicas botox, surcos estáticos relleno.</p>'},
{q:'Tercera cirugía estética más común (banco 2023):',opts:['Lipoescultura','Rinoplastia','Mamoplastia','Ritidectomía'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> El banco la puso directa: 3.° = rinoplastia. Y el paso MÁS complicado de la rinoplastia: el moldeado de la PUNTA [P.E.].</p><p><span class="lbl reg">Regla</span> Si veo lo más difícil de la rinoplastia, marco <b>la punta</b>.</p>'},
{q:'¿Qué es la mastopexia y qué abordaje NO se usa?',opts:['Elevar la glándula mamaria · NO se usa abordaje axilar','Aumentar la mama · NO periareolar','Reducir la mama · NO vertical','Reconstruir el pezón · NO inframamario'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Mastopexia = levantar la mama ptósica. El banco preguntó el abordaje que NO se usa: axilar (desde la axila no puedes resecar piel ni reposicionar pezón).</p><p><span class="lbl reg">Regla</span> Si veo mastopexia, marco <b>elevación</b>; abordaje que no va: <b>axilar</b>.</p>'},
{q:'Sobre implantes GLÚTEOS, lo correcto según el banco:',opts:['Nunca se acompañan de liposucción (esa fue la INCORRECTA)','El plano es DENTRO del glúteo medio','Sí pueden acompañarse de liposucción; el plano intramuscular es el preferido','Subcutáneo es el plano ideal'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco marcó como INCORRECTO "nunca se deben acompañar de liposucción". El plano EXCEPTO (que no se usa): dentro del glúteo MEDIO; el subcutáneo se ha hecho aunque queda mal (controversia anotada por tus compañeros).</p><p><span class="lbl dis">🔎 Ojo</span> Pregunta con controversia histórica en el banco: lee con calma las opciones reales.</p><p><span class="lbl reg">Regla</span> Si veo prótesis glútea + plano prohibido, marco <b>glúteo medio</b>.</p>'},
{q:'Paciente con ulceración + sangrado en lesión antigua... pero si lo que ves es lipodistrofia SIN exceso de piel, el tratamiento es:',opts:['Abdominoplastía','Liposucción','Malla','Ritidectomía'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Grasa localizada con piel de buena calidad = liposucción. El par a discriminar de este tema: piel colgante→abdominoplastía; solo grasa→lipo.</p><p><span class="lbl reg">Regla</span> Si veo buena piel + grasa localizada, marco <b>liposucción</b>.</p>'}
]},

/* ============ CASO 18 — BASES: SUTURAS Y HERIDAS ============ */
{
id:'suturas', tema:'Bases · Suturas y heridas', temaKey:'bases', prio:'ALTA', pe:7,
resp:'Cierre por planos: vicryl en músculo/TCS y nylon en piel',
alias:['cierre por planos: vicryl en musculo/tcs y nylon en piel','cierre por planos','vicryl y nylon','puntos invertidos de vicryl y nylon en piel','cierre por planos con vicryl y nylon'],
vineta:'Niño de 9 años, 30 kg, con herida supraciliar izquierda de 4 cm que lesiona piel, TCS y músculo frontal (íntegro en profundidad). ¿Cuál es el mejor método para <b>reparar la herida</b>?',
pistas:[
'La herida tiene VARIOS planos: cada plano se repara con lo suyo.',
'En el plano profundo quiero una sutura que desaparezca sola.',
'En la piel de la cara quiero un monofilamento fino que casi no reaccione.',
'Los puntos del plano profundo van INVERTIDOS (nudo enterrado).',
'En cara, los puntos de piel se retiran a los 5 días.'],
opciones:['Cierre por planos: vicryl en músculo/TCS y nylon en piel','Cierre en un solo plano con seda','Cierre con grapas','Dejar abierta y cierre por segunda intención'],
rev:'<p><span class="lbl why">Por qué</span> Herida limpia multiplanos = cierre POR PLANOS: puntos invertidos de VICRYL 4-0 (absorbible) en músculo y TCS; piel con NYLON 5-0 (no absorbible, poca reacción), retirar a los 5 días. <b>[P.E. ×4]</b></p><p><span class="lbl dis">Distractores</span> Seda en cara = reacción tisular y marcas; un solo plano deja espacio muerto; segunda intención en cara = cicatriz fea sin necesidad.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"VIcryl por dentro (se Va solo), NYlon por fuera (NItido)"</b>.</p><p><span class="lbl key">Dato que distingue</span> El factor #1 para que la herida quede estética: suturar SIN TENSIÓN los bordes [P.E. ×2].</p>',
anki:'bases::suturas',
subs:[
{q:'Dosis máxima de lidocaína CON epinefrina:',opts:['3 mg/kg','7 mg/kg','10 mg/kg','15 mg/kg'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Con epinefrina: 7 mg/kg (sin epi: ~4.5). El cálculo estrella del banco: niño de 30 kg → 7×30 = 210 mg; lidocaína al 1% = 10 mg/ml → 21 ml [P.E. ×2]. En el quiz: 15 kg al 2% (20 mg/ml) → 105 mg / 20 = 5.2 ml.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"con EPI, 7 vidas"</b>. Al 1%: ml máximos = (7 × kg)/10.</p><p><span class="lbl reg">Regla</span> Si veo dosis de lido con epi, marco <b>7 mg/kg</b> y hago la división con calma.</p>'},
{q:'¿Cuántos ml necesitas para INFILTRAR una herida de 4 cm (ambos labios)?',opts:['4 ml','8 ml','12 ml','16 ml'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> ~1 ml por cm por labio: 4 cm × 2 labios = 8 ml. En herida de 5 cm el banco aceptó: 5 cc de lido diluidos en 5 cc de salina.</p><p><span class="lbl reg">Regla</span> Si veo ml para infiltrar, marco <b>cm × 2</b>.</p>'},
{q:'Suturas ABSORBIBLES son:',opts:['Seda, nylon, prolene','Catgut, vicryl, dexon, PDS','Mersilene y prolene','Acero y seda'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Absorbibles: catgut (natural), vicryl/poliglactina, dexon, PDS (sintéticas — se degradan por HIDRÓLISIS). No absorbibles: seda (natural, multifilamento, fuerza tensil ~1 año), prolene (sintética monofilamento), mersilene, acero.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"CAT VIcioso DEXtruye PDoS"</b> = catgut, vicryl, dexon, PDS se destruyen solos.</p><p><span class="lbl reg">Regla</span> Si veo absorbible natural→catgut; absorbible sintética→vicryl; no absorbible natural→seda; no absorbible sintética→prolene.</p>'},
{q:'Sutura para MUCOSAS / labio (bermellón):',opts:['Prolene','Vicryl (o crómico en bermellón)','Acero','Nylon'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> En mucosa no quieres retirar puntos: absorbible. Labio rojo: crómico; mucosas: vicryl. Y datos sueltos: catgut simple pierde fuerza en 7–15 días; crómico ~21 días.</p><p><span class="lbl reg">Regla</span> Si veo mucosa, marco <b>absorbible (vicryl/crómico)</b>.</p>'},
{q:'Sutura para reparar la FASCIA abdominal y por qué:',opts:['Crómico, porque se absorbe rápido','Monofilamento no absorbible (prolene): mantiene fuerza tensil mientras la fascia cicatriza lento','Seda por su fuerza','Vicryl porque no se retira'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La fascia tarda meses en recuperar fuerza: necesito sutura que no se degrade y reaccione poco = prolene.</p><p><span class="lbl reg">Regla</span> Si veo fascia, marco <b>monofilamento no absorbible</b>.</p>'},
{q:'Hilo ideal para sutura VASCULAR:',opts:['Multifilamento absorbible','Punta roma... monofilamento no absorbible con aguja ahusada','Catgut con aguja cortante','Seda trenzada'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Vasos: monofilamento no absorbible (prolene) con aguja AHUSADA/roma que no desgarra. La aguja CORTANTE es para PIEL [P.E.]. Ojo de aguja más común: ensamblado.</p><p><span class="lbl reg">Regla</span> Si veo sutura vascular, marco <b>monofilamento no absorbible</b>; aguja cortante = piel.</p>'},
{q:'Herida suturada hace 10 días con dolor local progresivo SIN fiebre ni colecciones palpables. Conducta:',opts:['Retirar TODOS los puntos','Retirar SOLO una parte de la sutura y evidenciar colecciones; curaciones c/12 h y cierre por segunda intención','Antibiótico IV empírico','Ultrasonido urgente'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Exploración dirigida mínimamente invasiva: abro una parte, busco colección. Si no hay pus ni dehiscencia → seguimiento semanal SIN antibiótico. Y si tú hubieras cerrado: puntos separados (Sarnoff) con no absorbible.</p><p><span class="lbl reg">Regla</span> Si veo sospecha de colección en herida suturada, marco <b>retiro parcial de puntos</b>.</p>'},
{q:'¿Por qué describir los bordes de una herida CONTUSA?',opts:['No es necesario','Porque tienen vasos lastimados y predisponen a DEHISCENCIA','Porque cicatrizan mejor','Para elegir el color del hilo'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Bordes machacados = mal irrigados = desbridar antes de cerrar, o la herida se abre.</p><p><span class="lbl reg">Regla</span> Si veo herida contusa, marco <b>bordes con vasos dañados → dehiscencia</b>.</p>'},
{q:'Historia de la plástica — combo que el banco recicla. Lo CORRECTO:',opts:['Primera ciudad con cirugía plástica en México: Monterrey (HU: 1954); primer hospital de quemados: Edimburgo, Escocia (1848); tenazas de hormiga: civilización hindú; Sushruta: colgajo de frente para nariz','La plástica mexicana nació en CDMX','El primer hospital de quemados fue en París','Sushruta reconstruía orejas con injertos libres'],c:0,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Perlas históricas del banco: Monterrey + HU 1954 + Edimburgo 1848 + hindúes (hormigas) + Sushruta (colgajo axial de frente). Otros: asepsia=Lister; Underhill 1930=choque del quemado por pérdida de líquidos; Baxter 1948=electrolitos; anatomista=Vesalio; primera reconstrucción nasal en cx plástica=Mandely(banco).</p><p><span class="lbl reg">Regla</span> Si veo historia, recuerdo el combo <b>Monterrey-1954-Edimburgo-Sushruta-Carrel</b>.</p>'},
{q:'Avulsión TOTAL del cuero cabelludo: primera opción de tratamiento (banco viejo):',opts:['Colgajo libre','Injerto de pelo','Expansores','Cierre directo'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> El banco viejo respondió "injerto de pelo". 🔎 El estándar moderno sería REIMPLANTE microquirúrgico si la pieza está disponible — verifica cómo lo enseñe tu profesor actual.</p><p><span class="lbl reg">Regla</span> Si la pregunta es del banco viejo literal, marco <b>injerto de pelo</b>.</p>'}
]},
/* ============ CASO 19 — MANO I · ANATOMÍA (rama motora del mediano) ============ */
{
id:'manoanat', tema:'Mano I · Anatomía', temaKey:'mano', prio:'MUY ALTA', pe:4, fc:'mano-I',
resp:'Lesión de la rama motora recurrente del nervio mediano',
alias:['rama motora recurrente del nervio mediano','rama recurrente del mediano','rama tenar del mediano','rama motora del mediano','lesion de la rama recurrente del mediano'],
vineta:'Herida penetrante en la base de la eminencia tenar. El paciente <b>no puede oponer el pulgar</b> (no toca el meñique) pero conserva la sensibilidad de los pulpejos y mueve bien el resto de los dedos.',
pistas:[
'La sensibilidad de la mano está intacta: el daño es puramente MOTOR.',
'Solo falla la oposición y abducción palmar del pulgar (músculos tenares).',
'La rama que se lesiona es superficial y se llama "del millón de dólares" por su importancia.',
'El tronco principal del mediano sigue íntegro (por eso hay sensibilidad).',
'La eminencia que se atrofia es la TENAR.'],
opciones:['Lesión de la rama motora recurrente del nervio mediano','Lesión del nervio cubital','Lesión del nervio radial','Síndrome del túnel del carpo'],
rev:'<p><span class="lbl why">Por qué</span> Pierde la OPOSICIÓN del pulgar pero conserva sensibilidad → el tronco del mediano está bien, lo que se cortó es su rama motora recurrente (tenar), que es superficial y se daña con heridas de la base de la palma. <b>[P.E. — anatomía de mano, tu refuerzo]</b></p><p><span class="lbl dis">Distractores</span> El cubital daría garra e hipotenar, no pérdida de oposición. El radial no extiende. El STC comprime el tronco entero → SÍ habría parestesias (aquí no hay).</p><p><span class="lbl mne">Mnemotecnia</span> <b>OPONER = mediaNO</b>: el oponente del pulgar lo manda el mediano. La rama recurrente "regresa" sobre sí misma hacia la tenar.</p><p><span class="lbl ana">Analogía</span> El tronco del mediano es la avenida; la rama recurrente es la callecita que entra a la cochera (tenar): puedes bloquear la cochera sin tocar la avenida.</p><p><span class="lbl key">Dato que distingue</span> Déficit MOTOR aislado del pulgar con sensibilidad intacta = rama recurrente; déficit motor + sensitivo = tronco del mediano.</p>',
anki:'mano-I::anatomia',
subs:[
{q:'El nervio mediano inerva, en la mano, a:',opts:['Todos los interóseos','Los músculos tenares (salvo aductor) y los lumbricales 1.° y 2.°','La eminencia hipotenar','El aductor del pulgar'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Mediano = oponente, abductor corto y flexor corto (cabeza superficial) del pulgar + lumbricales 1 y 2. El ADUCTOR del pulgar es del cubital.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"LOAF": Lumbricales 1-2, Oponente, Abductor corto, Flexor corto</b>.</p><p><span class="lbl reg">Regla</span> Si veo tenar (menos aductor) o lumbricales 1-2, marco <b>mediano</b>.</p>'},
{q:'El arco palmar SUPERFICIAL proviene principalmente de la arteria:',opts:['Radial','Cubital','Interósea','Mediana'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Superficial = cubital; profundo = radial. La prueba de Allen valora ambos antes de canalizar la radial.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Superficial=Súper cUbital · Profundo=Radial"</b> (la radial se mete profundo por la tabaquera).</p><p><span class="lbl reg">Regla</span> Si veo arco superficial, marco <b>cubital</b>; profundo, <b>radial</b>.</p>'},
{q:'En el canal de Guyon pasan:',opts:['Nervio mediano y arteria radial','Nervio y arteria cubital','Tendones flexores','Nervio radial superficial'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Guyon = túnel del CUBITAL en la muñeca (nervio + arteria cubital), POR ENCIMA del retináculo flexor. Por eso el cubital NO se afecta en el túnel del carpo.</p><p><span class="lbl reg">Regla</span> Si veo Guyon, marco <b>cubital</b>.</p>'},
{q:'Los músculos INTERÓSEOS de la mano realizan y dependen de:',opts:['Flexión de muñeca · mediano','Abducción/aducción de los dedos · nervio cubital','Oposición del pulgar · mediano','Extensión de dedos · radial'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Interóseos = separar/juntar dedos (DAB = Dorsales ABducen; PAD = Palmares ADucen), todos del cubital. Mayo 2026 los preguntó directo: "Interóseos".</p><p><span class="lbl mne">Mnemotecnia</span> <b>DAB y PAD</b>.</p><p><span class="lbl reg">Regla</span> Si veo abrir/cerrar dedos, marco <b>interóseos (cubital)</b>.</p>'},
{q:'Los bordes de la TABAQUERA anatómica son:',opts:['Extensor largo del pulgar (cubital) y abductor largo + extensor corto del pulgar (radial)','Flexor largo y palmar mayor','Extensores radiales del carpo','Extensor común y propio del índice'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Borde cubital = EPL (3.er compartimento); borde radial = APL + EPB (1.er compartimento). Piso = escafoides; dentro corre la arteria radial.</p><p><span class="lbl reg">Regla</span> Si veo bordes de la tabaquera, marco <b>EPL vs APL+EPB</b>; piso = escafoides.</p>'},
{q:'Los lumbricales de la mano:',opts:['Flexionan las MCF y extienden las IF (posición intrínseco-plus)','Solo flexionan las IF','Extienden la muñeca','Aducen el pulgar'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Intrínsecos → flexión MCF + extensión IF = posición "intrínseco-plus" (la de seguridad para ferulizar). Su pérdida (cubital) da garra = intrínseco-minus.</p><p><span class="lbl mne">Mnemotecnia</span> <b>Lumbricales: "doblo nudillos, estiro dedos"</b>.</p><p><span class="lbl reg">Regla</span> Si veo posición de seguridad de la mano, marco <b>intrínseco-plus (MCF flexión, IF extensión)</b>.</p>'},
{q:'Existen espacios virtuales palmares profundos; los principales son:',opts:['Tenar y mediopalmar','Subungueal y pulpejo','Dorsal y volar','Tabaquera y Guyon'],c:0,pe:1,
fb:'<p><span class="lbl why">Por qué</span> El banco los nombra: espacio TENAR y espacio MEDIOPALMAR (separados por el tabique del 3.er metacarpiano). Importan en infecciones profundas (absceso en botón de camisa).</p><p><span class="lbl reg">Regla</span> Si veo espacios profundos de la palma, marco <b>tenar y mediopalmar</b>.</p>'},
{q:'⚠️ Los 6 compartimentos extensores dorsales (radial→cubital) son:',opts:['1:APL+EPB · 2:ECRL+ECRB · 3:EPL · 4:ED+EIP · 5:EDM · 6:ECU','1:EPL · 2:APL+EPB · 3:ECRL · 4:ED · 5:ECU · 6:EDM','1:ECRL+ECRB · 2:APL · 3:EPL · 4:ED · 5:EDM · 6:ECU','1:APL · 2:EPL · 3:ECRB · 4:EIP · 5:EDM · 6:ECU'],c:0,pe:0,lag:true,
fb:'<p><span class="lbl why">Por qué</span> 1: abductor largo + extensor corto del pulgar · 2: radiales largo y corto del carpo · 3: extensor largo del pulgar · 4: extensor común + propio del índice · 5: propio del meñique · 6: cubital posterior.</p><p><span class="lbl mne">Mnemotecnia</span> <b>2-2-1-2-1-1</b> tendones por compartimento.</p><p><span class="lbl dis">⚠️ LAGUNA</span> La lista completa NO está en tus notas ni en el banco — confírmala en Netter/Complete Anatomy. La pongo porque es tu punto débil declarado.</p>'}
]},

/* ============ CASO 20 — MANO II · TENDONES (zona II flexora) ============ */
{
id:'tendones', tema:'Mano II · Tendones', temaKey:'mano', prio:'MUY ALTA', pe:4, fc:'mano-II',
resp:'Lesión de tendones flexores en zona II',
alias:['lesion de tendones flexores en zona ii','zona ii flexora','tierra de nadie','lesion flexora zona 2','lesion de flexores en tierra de nadie'],
vineta:'Joven con herida cortante en la cara palmar del dedo, a nivel de la falange proximal. <b>No flexiona la IFP ni la IFD</b>. La herida queda en la zona que los cirujanos apodan "tierra de nadie".',
pistas:[
'En esa zona corren JUNTOS el flexor superficial y el profundo dentro de una vaina estrecha.',
'Las adherencias post-reparación son frecuentes: por eso le dicen "tierra de nadie".',
'Va de la polea A1 hasta la inserción del flexor superficial.',
'Es la zona II de la clasificación de Verdan (flexores).',
'La reparación necesita técnica fina y rehabilitación temprana.'],
opciones:['Lesión de tendones flexores en zona II','Dedo en martillo','Lesión del extensor en zona I','Tenosinovitis de De Quervain'],
