<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastidle — Casos clínicos Cx Plástica</title>
<style>
:root{
  --ink:#FFFFFF; --ink2:rgba(255,255,255,.62);
  --blue:#3B82F6; --purple:#8B5CF6;
  --grad:linear-gradient(135deg,#2E6BFF,#8B5CF6);
  --glass:rgba(255,255,255,.055);
  --glassb:rgba(255,255,255,.14);
  --ok:#7BE8A6; --bad:#FF7A8A; --warn:#FFD9B8;
  --text:#FFFFFF; --sec:rgba(255,255,255,.62);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:-apple-system,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  font-weight:400; letter-spacing:-0.01em; color:var(--ink);
  background:#06070C; position:relative; padding:34px 18px 64px;
  font-size:15.5px; line-height:1.5; overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:-12%;z-index:0;pointer-events:none;
  background:
    radial-gradient(60% 45% at 22% 14%, rgba(46,107,255,.55), transparent 60%),
    radial-gradient(55% 40% at 86% 22%, rgba(139,92,246,.42), transparent 60%),
    radial-gradient(70% 55% at 78% 92%, rgba(240,196,168,.40), transparent 62%),
    radial-gradient(60% 50% at 12% 88%, rgba(59,130,246,.30), transparent 60%);
  animation:bgDrift 30s ease-in-out infinite alternate;
}
@keyframes bgDrift{
  0%{transform:translate3d(0,0,0) scale(1);}
  50%{transform:translate3d(2.2%,-1.6%,0) scale(1.05);}
  100%{transform:translate3d(-1.8%,1.4%,0) scale(1.03);}
}
::selection{background:rgba(139,92,246,.55);color:#fff;}
body>*{position:relative;z-index:1}
b,strong{font-weight:700}
.wrap{max-width:680px;margin:0 auto;}
header{margin-bottom:14px;}
.kicker{font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,.72);margin-bottom:9px}
.logo{font-size:clamp(30px,6vw,40px);font-weight:700;letter-spacing:-0.03em;line-height:1.05;
  cursor:pointer;display:inline-block;user-select:none;-webkit-user-select:none;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.logo:hover{transform:rotate(-1.2deg) scale(1.02);}
.logo:active{transform:scale(.97);}
.logo.wob{animation:wob .5s;}
@keyframes wob{0%{transform:rotate(0)}25%{transform:rotate(-2.5deg) scale(1.04)}60%{transform:rotate(2deg)}100%{transform:rotate(0)}}
.logo .grad{background:linear-gradient(135deg,#fff,#4F8DFF,#8B5CF6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.tagline{color:var(--ink2);font-size:14px;margin-top:9px;}
.tagline b{color:#fff;font-weight:600}

.pill{
  display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.07em;
  text-transform:uppercase;border-radius:999px;padding:4px 11px;
  border:1px solid var(--glassb);color:rgba(255,255,255,.82);background:rgba(255,255,255,.10);
  vertical-align:middle;
}
.pill.grad,.pill.pe{background:var(--grad);color:#fff;border:none;font-weight:700;
  box-shadow:0 4px 14px rgba(80,90,255,.40);}
.pill.warn{background:rgba(240,196,168,.14);color:#FFD9B8;border:1px solid rgba(240,196,168,.30);}
.pill.ver{background:rgba(59,130,246,.16);color:#BFD2FF;border:1px solid rgba(111,160,255,.35);}
.pill.prio-muyalta{background:rgba(255,122,138,.16);color:#FFA9B5;border:1px solid rgba(255,122,138,.38);}
.pill.prio-alta{background:rgba(59,130,246,.16);color:#9DBEFF;border:1px solid rgba(111,160,255,.35);}
.pill.prio-media{background:rgba(255,255,255,.08);color:rgba(255,255,255,.62);border:1px solid var(--glassb);}

.card{
  background:var(--glass);border:1px solid var(--glassb);border-radius:24px;
  box-shadow:0 24px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  padding:24px;margin-bottom:16px;
}
/* ---------- barra superior ---------- */
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat{
  flex:1;min-width:88px;background:var(--glass);border:1px solid var(--glassb);
  border-radius:16px;backdrop-filter:blur(8px);
  padding:10px 14px;font-size:11.5px;color:var(--ink2);text-align:center;font-weight:500;
}
.stat b{display:block;font-size:20px;color:#fff;letter-spacing:-0.02em;font-weight:700;}
.progressbar{height:6px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin:4px 0 0;}
.progressbar i{display:block;height:100%;background:var(--grad);border-radius:999px;
  transition:width .5s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;}
.progressbar i::after{content:"";position:absolute;inset:0;
  background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.5) 50%,transparent 80%);
  transform:translateX(-100%);animation:shimmer 2.4s ease-in-out infinite;}
@keyframes shimmer{60%,100%{transform:translateX(100%);}}
/* ---------- filtros ---------- */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.chip{
  font-size:11.5px;font-weight:500;padding:6px 13px;border-radius:999px;cursor:pointer;
  border:1px solid var(--glassb);background:var(--glass);color:rgba(255,255,255,.78);
  user-select:none;backdrop-filter:blur(8px);
  transition:background .2s, color .2s, transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
}
.chip:hover{background:rgba(255,255,255,.10);transform:translateY(-2px);}
.chip:active{transform:scale(.9);}
.chip.on{background:var(--grad);color:#fff;border-color:transparent;font-weight:600;
  transform:scale(1.06);box-shadow:0 6px 18px rgba(80,90,255,.35);}
/* ---------- grid de casos ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:13px;}
.casecard{
  background:var(--glass);border:1px solid var(--glassb);border-radius:20px;
  box-shadow:0 14px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(14px);padding:17px;
  cursor:pointer;position:relative;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), background .2s, box-shadow .25s, border-color .25s;
  display:flex;flex-direction:column;gap:8px;
  animation:cardIn .55s var(--d,0s) cubic-bezier(.22,1,.36,1) backwards;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96);}to{opacity:1;transform:none;}}
.casecard:hover{transform:translateY(-4px) scale(1.015);background:rgba(255,255,255,.09);
  box-shadow:0 18px 50px rgba(46,107,255,.26);border-color:rgba(111,160,255,.35);}
.casecard:active{transform:translateY(-1px) scale(.985);}
.casecard.done{border-color:rgba(123,232,166,.40);}
.casecard .title{font-weight:600;font-size:15px;letter-spacing:-0.01em;line-height:1.3;color:#fff;}
.casecard .meta{display:flex;gap:6px;flex-wrap:wrap;}
.casecard .foot{color:var(--ink2);font-size:12px;margin-top:auto;}
.checkmark{position:absolute;top:12px;right:14px;color:var(--ok);font-size:16px;font-weight:700;}
.bigbtn{
  display:inline-block;border:none;cursor:pointer;font-family:inherit;
  background:var(--grad);color:#fff;font-size:14px;font-weight:600;
  border-radius:15px;padding:14px 26px;letter-spacing:-0.01em;
  box-shadow:0 10px 26px rgba(80,90,255,.36);
  position:relative;overflow:hidden;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
}
.bigbtn::after{
  content:"";position:absolute;top:-4px;bottom:-4px;left:0;width:55%;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.38) 50%,transparent);
  transform:translateX(-130%) skewX(-18deg);transition:transform .55s ease;
}
.bigbtn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(80,90,255,.5);}
.bigbtn:hover::after{transform:translateX(280%) skewX(-18deg);}
.bigbtn:active{transform:translateY(0) scale(.95);}
.ghostbtn{
  display:inline-block;cursor:pointer;font-family:inherit;
  background:var(--glass);border:1px solid var(--glassb);color:#fff;font-size:13.5px;font-weight:600;
  border-radius:15px;padding:13px 20px;backdrop-filter:blur(8px);
  transition:background .2s, transform .25s cubic-bezier(.34,1.56,.64,1), border-color .2s;
}
.ghostbtn:hover{background:rgba(255,255,255,.10);transform:translateY(-1px);border-color:rgba(255,255,255,.28);}
.ghostbtn:active{transform:scale(.95);}
.center{text-align:center;}
/* ---------- vista de caso ---------- */
.backlink{color:#9DBEFF;cursor:pointer;font-weight:600;font-size:13.5px;margin-bottom:14px;display:inline-block;}
.backlink:hover{color:#fff;}
.casehead{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
.vineta{font-size:17px;line-height:1.68;font-weight:400;letter-spacing:-0.01em;color:rgba(255,255,255,.96);}
.vineta b{font-weight:700;color:#fff;}
.hint{
  background:rgba(255,255,255,.07);border-left:3px solid #6FA0FF;border-radius:12px;
  padding:12px 15px;margin-top:11px;font-size:13.5px;line-height:1.5;color:#fff;animation:pop .25s;
}
.hint b{color:#9DBEFF;font-weight:700;}
.hint .lockic{display:inline-block;margin-right:7px;font-size:13px;}
.hint.fresh{animation:unlockIn .5s cubic-bezier(.34,1.56,.64,1) backwards;}
.hint.fresh .lockic{animation:lockPop .65s .12s cubic-bezier(.34,1.56,.64,1) backwards;}
@keyframes unlockIn{from{opacity:0;transform:translateY(10px) scale(.96);}to{opacity:1;transform:none;}}
@keyframes lockPop{0%{transform:scale(0) rotate(-90deg);}55%{transform:scale(1.35) rotate(10deg);}100%{transform:scale(1) rotate(0);}}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.guessrow{position:relative;margin-top:15px;}
.guessinput{
  width:100%;font-family:inherit;font-size:15.5px;padding:14px 16px;color:#fff;
  border-radius:15px;border:1px solid var(--glassb);outline:none;
  background:rgba(255,255,255,.06);transition:.15s;backdrop-filter:blur(8px);
}
.guessinput::placeholder{color:rgba(255,255,255,.40);}
.guessinput:focus{border-color:rgba(111,160,255,.65);box-shadow:0 0 0 4px rgba(46,107,255,.18);}
.guessinput.shake{animation:shakeX .45s;border-color:rgba(255,122,138,.75) !important;
  box-shadow:0 0 0 4px rgba(255,122,138,.16) !important;}
@keyframes shakeX{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(5px);}
  30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
.guessinput.glowok{animation:okPulse .5s;border-color:rgba(123,232,166,.85) !important;
  box-shadow:0 0 0 6px rgba(123,232,166,.22) !important;}
@keyframes okPulse{0%{transform:scale(1);}40%{transform:scale(1.018);}100%{transform:scale(1);}}
.suggest{
  position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;
  background:rgba(15,18,30,.97);border-radius:15px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  max-height:240px;overflow:auto;border:1px solid var(--glassb);
}
.suggest div{padding:11px 16px;cursor:pointer;font-size:14.5px;color:rgba(255,255,255,.85);}
.suggest div:hover,.suggest div.sel{background:rgba(59,130,246,.22);color:#fff;}
.guessbtns{display:flex;gap:10px;margin-top:13px;flex-wrap:wrap;}
.attempts{color:var(--ink2);font-size:12.5px;margin-top:11px;font-weight:500;}
.attempts .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16);margin-right:4px;}
.attempts .dot.used{background:var(--bad);}
.wrongflash{color:var(--bad);font-weight:600;font-size:13.5px;margin-top:9px;animation:pop .2s;}
/* ---------- opciones ---------- */
.optlist{display:flex;flex-direction:column;gap:9px;margin-top:13px;}
.optbtn{
  font-family:inherit;text-align:left;font-size:14.5px;padding:14px 16px;cursor:pointer;
  border-radius:14px;border:1px solid var(--glassb);background:rgba(255,255,255,.05);color:#fff;
  line-height:1.4;
  transition:background .18s, border-color .18s, transform .25s cubic-bezier(.34,1.56,.64,1);
  animation:optIn .45s var(--d,0s) cubic-bezier(.22,1,.36,1) backwards;
}
@keyframes optIn{from{opacity:0;transform:translateY(12px) scale(.97);}to{opacity:1;transform:none;}}
.optbtn:hover:not(:disabled){background:rgba(255,255,255,.10);transform:translateX(4px);
  border-color:rgba(111,160,255,.4);}
.optbtn:active:not(:disabled){transform:scale(.98);}
.optbtn.ok{background:rgba(123,232,166,.18);border-color:rgba(123,232,166,.55);font-weight:600;
  animation:okPop .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes okPop{0%{transform:scale(1);}40%{transform:scale(1.03);box-shadow:0 0 24px rgba(123,232,166,.4);}100%{transform:scale(1);}}
.optbtn.bad{background:rgba(255,122,138,.16);border-color:rgba(255,122,138,.5);opacity:.85;
  animation:shakeX .4s;}
.optbtn:disabled{cursor:default;}
/* ---------- revelación ---------- */
.reveal{
  background:linear-gradient(150deg, rgba(46,107,255,.20), rgba(139,92,246,.14) 55%, rgba(240,196,168,.12));
  border:1px solid rgba(255,255,255,.20);
  animation:revealIn .6s cubic-bezier(.22,1,.36,1), revealGlow 1.4s ease-out;
  transform-origin:50% 18%;
}
@keyframes revealIn{
  0%{opacity:0;transform:perspective(900px) rotateX(16deg) translateY(22px) scale(.94);}
  60%{opacity:1;}
  100%{opacity:1;transform:none;}
}
@keyframes revealGlow{
  0%{box-shadow:0 24px 60px rgba(0,0,0,.45);}
  45%{box-shadow:0 24px 80px rgba(46,107,255,.55), 0 0 40px rgba(139,92,246,.35);}
  100%{box-shadow:0 24px 60px rgba(0,0,0,.45);}
}
.reveal h3{font-size:20px;letter-spacing:-0.02em;margin-bottom:4px;font-weight:700;line-height:1.25;}
.reveal h3 .grad{
  background:linear-gradient(120deg,#fff,#4F8DFF 30%,#B79CFF 55%,#FFD9B8 75%,#fff);
  background-size:250% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:gradFlow 3.2s linear infinite;
}
@keyframes gradFlow{from{background-position:0% 50%;}to{background-position:250% 50%;}}
.fb{margin-top:10px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.92);}
.fb p{margin:9px 0;}
.fb b{color:#fff;}
.fb .lbl{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  border-radius:999px;padding:2px 10px;margin-right:6px;vertical-align:1px;border:1px solid transparent;
}
.lbl.why{background:rgba(123,232,166,.14);color:#9CF0BE;border-color:rgba(123,232,166,.30);}
.lbl.dis{background:rgba(255,122,138,.14);color:#FFA9B5;border-color:rgba(255,122,138,.32);}
.lbl.mne{background:rgba(139,92,246,.18);color:#D9C9FF;border-color:rgba(139,92,246,.38);}
.lbl.ana{background:rgba(240,196,168,.14);color:#FFD9B8;border-color:rgba(240,196,168,.30);}
.lbl.key{background:rgba(59,130,246,.16);color:#9DBEFF;border-color:rgba(111,160,255,.35);}
.lbl.reg{background:var(--grad);color:#fff;}
.regla{
  background:rgba(255,255,255,.08);border-left:3px solid #6FA0FF;color:#fff;
  border-radius:12px;padding:12px 15px;margin-top:13px;
  font-size:14px;font-weight:500;line-height:1.45;
}
.regla .grad{background:linear-gradient(135deg,#fff,#4F8DFF,#B79CFF);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700;}
/* ---------- subpreguntas ---------- */
.subhead{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.subhead b{color:#fff;}
.subcount{color:var(--ink2);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.subq{font-size:17px;font-weight:600;letter-spacing:-0.015em;margin:10px 0 4px;line-height:1.4;color:#fff;}
.subprog{display:flex;gap:4px;margin:12px 0 10px;flex-wrap:wrap;}
.subprog i{width:16px;height:5px;border-radius:3px;background:rgba(255,255,255,.16);
  transition:background .3s, transform .3s;}
.subprog i.ok{background:var(--ok);}
.subprog i.bad{background:var(--bad);}
.subprog i.cur{background:var(--grad);position:relative;overflow:hidden;animation:curPulse 1.4s ease-in-out infinite;}
@keyframes curPulse{0%,100%{transform:scaleY(1);opacity:1;}50%{transform:scaleY(1.5);opacity:.8;}}
.subcard{animation:subIn .38s cubic-bezier(.22,1,.36,1) backwards;}
@keyframes subIn{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:none;}}
.subfbwrap{animation:pop .3s backwards;}
/* ---------- resumen ---------- */
.sharegrid{font-size:21px;letter-spacing:2px;line-height:1.45;word-break:break-all;}
.sharegrid .cell{display:inline-block;
  animation:cellIn .4s var(--d,0s) cubic-bezier(.34,1.56,.64,1) backwards;}
@keyframes cellIn{from{opacity:0;transform:scale(0) rotate(-20deg);}to{opacity:1;transform:none;}}
.summary h2{font-size:23px;letter-spacing:-0.02em;font-weight:700;}
.summary{animation:revealIn .55s cubic-bezier(.22,1,.36,1);}
.scorebig{font-size:46px;font-weight:700;letter-spacing:-0.03em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.scoremsg{font-size:15px;font-weight:600;color:#fff;margin:4px 0 12px;
  animation:pop .4s .5s backwards;}
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px) scale(.94);
  background:rgba(15,18,30,.95);border:1px solid var(--glassb);color:#fff;
  padding:11px 22px;border-radius:999px;font-size:13.5px;font-weight:600;
  opacity:0;pointer-events:none;z-index:99;backdrop-filter:blur(10px);
  transition:opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
/* ---------- racha con personalidad ---------- */
.streakfx{
  position:fixed;top:16px;right:74px;z-index:120;pointer-events:none;
  background:rgba(15,18,30,.92);border:1px solid var(--glassb);border-radius:999px;
  padding:9px 16px;font-size:14px;font-weight:700;color:#fff;backdrop-filter:blur(10px);
  opacity:0;transform:translateY(-14px) scale(.8);
  transition:opacity .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
}
.streakfx.show{opacity:1;transform:translateY(0) scale(1);}
.streakfx.show.big{transform:translateY(0) scale(1.15);}
.streakfx.up{border-color:rgba(255,170,80,.55);box-shadow:0 8px 26px rgba(255,140,40,.3);}
.streakfx.out{border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.6);}
.streakfx.out .fl{filter:grayscale(1);}
.streakfx .fl{display:inline-block;animation:flick .7s ease-in-out 3;}
@keyframes flick{0%,100%{transform:scale(1) rotate(0);}30%{transform:scale(1.3) rotate(-8deg);}
  60%{transform:scale(1.15) rotate(6deg);}}
.streakfx.out .fl{animation:fizzle .8s ease-out;}
@keyframes fizzle{0%{transform:scale(1.2);}40%{transform:scale(.9) rotate(-12deg);}
  70%{transform:scale(1.05) rotate(8deg);opacity:.7;}100%{transform:scale(1);opacity:1;}}
.stat .flame{display:inline-block;font-size:15px;animation:flick 1.8s ease-in-out infinite;}
.stat{animation:cardIn .5s backwards;}
.topbar .stat:nth-child(1){animation-delay:.02s}
.topbar .stat:nth-child(2){animation-delay:.07s}
.topbar .stat:nth-child(3){animation-delay:.12s}
.topbar .stat:nth-child(4){animation-delay:.17s}
.confetti-cv{position:fixed;inset:0;z-index:200;pointer-events:none;}
.notice{font-size:12px;color:rgba(255,255,255,.55);background:var(--glass);
  border:1px solid var(--glassb);border-radius:14px;padding:11px 14px;margin-top:10px;line-height:1.55;}
.notice b{color:rgba(255,255,255,.85);}
@media (max-width:560px){
  body{padding:22px 12px 56px;}
  .card{padding:18px;}
  .grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:400px){ .grid{grid-template-columns:1fr;} }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;animation-iteration-count:1 !important;
    transition-duration:.01ms !important;
  }
}

/* ===== AJUSTES: letra más grande (legibilidad) ===== */
body{font-size:17.5px;}
.kicker{font-size:12.5px;}
.tagline{font-size:16px;}
.vineta{font-size:19px;line-height:1.7;}
.hint{font-size:15.5px;line-height:1.55;}
.subq{font-size:20px;line-height:1.45;}
.optbtn{font-size:16.5px;padding:15px 17px;line-height:1.5;}
.guessinput{font-size:17.5px;padding:15px 17px;}
.suggest div{font-size:16.5px;padding:13px 17px;}
.fb{font-size:16px;line-height:1.62;}
.fb .lbl{font-size:11px;}

  animation:hsPulse 2.6s ease-in-out infinite;}

  transition:transform .25s cubic-bezier(.34,1.56,.64,1);transform-box:fill-box;transform-origin:center;}

.hs.active .halo{fill:var(--ok);opacity:.5;animation:none;transform:scale(1.45);}

<script>
const CASES = [
/* ============ CASO 1 — SÍNDROME DEL TÚNEL DEL CARPO ============ */
{
id:'stc', fc:'mano-I', tema:'Mano · Nervios compresivos', temaKey:'mano', prio:'MUY ALTA', pe:5,
resp:'Síndrome del túnel del carpo',
alias:['sindrome del tunel del carpo','tunel del carpo','tunel carpiano','sindrome del tunel carpiano','stc'],
vineta:'Femenino de 65 años, maestra, con DM de reciente diagnóstico. Refiere 5 meses con dolor y parestesias en los dedos índice y medio de la mano derecha, de predominio <b>nocturno</b>, que se exacerba al trabajar.',
pistas:[
'Exploración: las parestesias siguen el territorio del 1.°–3.er dedo y mitad radial del 4.°.',
'Hay torpeza para tomar objetos pequeños y debilidad de la pinza.',
'En fases avanzadas se observa atrofia de la eminencia TENAR.',
'Las maniobras de provocación en la muñeca reproducen los síntomas.',
'Es el trastorno compresivo MÁS frecuente del miembro superior.'],
opciones:['Síndrome del túnel del carpo','Tenosinovitis de De Quervain','Síndrome del pronador','Compresión del nervio cubital en el canal de Guyon'],
rev:'<p><span class="lbl why">Por qué</span> Cuando veo <b>dolor nocturno + parestesias en índice y medio + paciente que usa las manos (maestra, secretaria) + DM</b>, pienso: el nervio mediano está siendo aplastado dentro del túnel del carpo. La DM y el embarazo inflaman/retienen líquido → menos espacio en un túnel que ya es inextensible. <b>[P.E. ×5 — cayó también en Mayo 2026 como "respuesta doble"]</b></p><p><span class="lbl dis">Distractores</span> De Quervain duele en la BASE DEL PULGAR con Finkelstein, no da parestesias nocturnas de dedos. El pronador también comprime al mediano pero duele en antebrazo proximal y NO respeta el horario nocturno clásico. Guyon es cubital → meñique.</p><p><span class="lbl mne">Mnemotecnia</span> <b>MEDIANO = MEDIA NOCHE</b>: el mediano despierta a la paciente a media noche.</p><p><span class="lbl ana">Analogía</span> El túnel del carpo es un túnel de tráfico con 10 carriles: 9 tendones + 1 nervio. Si hay edema, el único que sufre el embotellamiento es el nervio.</p><p><span class="lbl key">Dato que distingue</span> Atrofia TENAR = mediano. Atrofia HIPOTENAR = cubital.</p>',
anki:'mano::tunel-del-carpo',
subs:[
{q:'¿Cuál es el nervio comprimido en este síndrome?',opts:['Nervio cubital','Nervio mediano','Nervio radial','Nervio interóseo posterior'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El túnel del carpo solo deja pasar UN nervio: el mediano. Dolor nocturno 1.°–3.er dedo = mediano.</p><p><span class="lbl dis">Distractores</span> Cubital pasa por Guyon (encima del retináculo); radial ni entra a la muñeca volar.</p><p><span class="lbl reg">Regla</span> Si veo parestesias nocturnas de índice y medio, marco <b>mediano</b>.</p>'},
{q:'Maniobras físicas para el diagnóstico:',opts:['Solo Tinel','Solo Phalen','Tinel, Phalen y Durkan (todas son correctas)','Finkelstein'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Las tres provocan al mediano: Tinel (percuto), Phalen (flexiono muñecas 60 s), Durkan (compresión directa del carpo).</p><p><span class="lbl dis">Distractores</span> Finkelstein es el intruso: es de De Quervain, no de STC.</p><p><span class="lbl mne">Mnemotecnia</span> <b>T-P-D: Toco, Plego, aprieto Duro</b>.</p><p><span class="lbl reg">Regla</span> Si en STC me ofrecen "todas las anteriores" con Tinel/Phalen/Durkan, marco <b>todas</b>.</p>'},
{q:'Tratamiento de elección inicial:',opts:['Liberación quirúrgica inmediata','Férula nocturna (manejo conservador)','Esteroide sistémico','Inmovilización con yeso 6 semanas'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Primero lo conservador: férula nocturna en posición neutra (la muñeca flexionada al dormir es lo que dispara el dolor). La cirugía es para casos refractarios o con atrofia.</p><p><span class="lbl reg">Regla</span> Si el STC es de diagnóstico reciente y sin atrofia, marco <b>férula nocturna</b>.</p>'},
{q:'¿Qué contiene el túnel del carpo?',opts:['Tendones extensores y nervio radial','9 tendones flexores y el nervio mediano','Tendones flexores, nervio mediano y nervio cubital','Arteria radial y nervio mediano'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> 9 tendones flexores (4 superficiales + 4 profundos + flexor largo del pulgar) + nervio mediano = 10 estructuras.</p><p><span class="lbl dis">Distractores</span> El cubital NO pasa por el túnel (va por Guyon); la arteria radial tampoco.</p><p><span class="lbl mne">Mnemotecnia</span> <b>9 + 1</b>: nueve cuerdas y un cable eléctrico.</p><p><span class="lbl reg">Regla</span> Si veo "contenido del túnel del carpo", marco <b>flexores + mediano</b> (sin cubital).</p>'},
{q:'[Mayo 2026] Tratamiento quirúrgico definitivo del STC:',opts:['Liberar el retináculo flexor (descompresión del mediano)','Tenólisis de los flexores','Artrodesis de muñeca','Transposición del nervio'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El techo del túnel es el retináculo flexor (ligamento transverso del carpo): lo corto y el mediano respira. Así vino en Mayo 2026: "Nervio mediano – liberar el retináculo".</p><p><span class="lbl reg">Regla</span> Si veo STC quirúrgico, marco <b>sección del retináculo flexor</b>.</p>'},
{q:'El síndrome del pronador comprime a:',opts:['Nervio cubital','Nervio radial','Nervio mediano','Nervio interóseo posterior'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El mediano pasa ENTRE las dos cabezas del pronador redondo en el antebrazo proximal. Mismo nervio que el STC, otro piso del edificio.</p><p><span class="lbl key">Dato que distingue</span> Pronador = dolor en antebrazo proximal volar; STC = nocturno en muñeca/dedos.</p><p><span class="lbl reg">Regla</span> Si veo "síndrome del pronador", marco <b>mediano</b>.</p>'},
{q:'La arcada de Struthers comprime a:',opts:['Nervio mediano','Nervio cubital','Nervio radial','Nervio musculocutáneo'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La ARCADA de Struthers (banda miofascial del tríceps medial) atrapa al CUBITAL arriba del codo. Ojo: el LIGAMENTO de Struthers (supracondíleo) atrapa al mediano — el banco pregunta la ARCADA.</p><p><span class="lbl mne">Mnemotecnia</span> <b>ARCada = cUbital</b> (las dos llevan U... y la arcada abraza el codo, donde vive el cubital).</p><p><span class="lbl reg">Regla</span> Si veo "arcada de Struthers", marco <b>cubital</b>.</p>'},
{q:'Paciente DM de 15 años de evolución con parestesias de 4.° y 5.° dedo y atrofia de eminencia hipotenar. Nervio afectado:',opts:['Mediano','Radial','Cubital','Interóseo anterior'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Meñique + mitad cubital del anular + eminencia HIPOtenar = territorio cubital.</p><p><span class="lbl key">Dato que distingue</span> Tenar→mediano; hipotenar→cubital. La eminencia que se atrofia delata al culpable.</p><p><span class="lbl reg">Regla</span> Si veo parestesias 4.°–5.° dedo, marco <b>cubital</b>.</p>'},
{q:'Paciente que no puede flexionar el pulgar ni los dedos (puño imposible). Lesión de:',opts:['Nervio cubital','Nervio radial','Nervio mediano (alto)','Nervio interóseo posterior'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El mediano alto mueve casi todos los flexores (superficiales, profundos radiales, flexor largo del pulgar). Sin él, la mano queda en "mano de predicador" al intentar el puño.</p><p><span class="lbl dis">Distractores</span> Radial = no EXTIENDE. Cubital = garra y pérdida de intrínsecos, pero sí flexiona índice/medio.</p><p><span class="lbl reg">Regla</span> Si veo "no puede flexionar pulgar ni dedos", marco <b>mediano</b>.</p>'}
]},

/* ============ CASO 2 — DE QUERVAIN ============ */
{
id:'quervain', fc:'mano-II', tema:'Mano · Tendones', temaKey:'mano', prio:'MUY ALTA', pe:5,
resp:'Tenosinovitis de De Quervain',
alias:['tenosinovitis de de quervain','de quervain','dequervain','tenosinovitis de quervain','tenosinovitis estenosante de de quervain'],
vineta:'Femenina de 25 años, embarazada, acude por <b>dolor y debilidad en la base del pulgar</b> que aumenta a la prensión y al cargar objetos. Se palpa engrosamiento sobre la estiloides radial.',
pistas:[
'El dolor se reproduce al desviar la muñeca hacia cubital con el pulgar empuñado.',
'Es típica de embarazadas y de quienes cargan bebés o usan mucho el celular.',
'La maniobra diagnóstica lleva apellido: Finkelstein.',
'El problema vive en el PRIMER compartimento extensor dorsal.',
'Mayo 2026 la describió como: dolor en la base del pulgar y a la prensión.'],
opciones:['Tenosinovitis de De Quervain','Síndrome del túnel del carpo','Rizartrosis del pulgar','Dedo en gatillo del pulgar'],
rev:'<p><span class="lbl why">Por qué</span> Dolor en la BASE DEL PULGAR + prensión dolorosa + Finkelstein positivo = el primer compartimento extensor está inflamado y estrecho. <b>[P.E. ×5 — Mayo 2026 la preguntó dos veces: Finkelstein y "dolor en la base del pulgar y a la prensión"]</b></p><p><span class="lbl dis">Distractores</span> STC = parestesias nocturnas, no dolor mecánico de base de pulgar. Rizartrosis = desgaste articular trapecio-metacarpiano en mayores. Gatillo = bloqueo en flexión por la polea A1, no estiloides radial.</p><p><span class="lbl mne">Mnemotecnia</span> <b>QuerVAIN = duele la VAINA</b> (la vaina del 1.er compartimento).</p><p><span class="lbl ana">Analogía</span> Es una cuerda gruesa pasando por un ojal que se encogió: cada movimiento del pulgar raspa.</p><p><span class="lbl key">Dato que distingue</span> De Quervain duele; STC adormece.</p>',
anki:'mano::de-quervain',
subs:[
{q:'¿Qué tendones están afectados en De Quervain?',opts:['Extensor largo y abductor corto del pulgar','Extensor corto y abductor largo del pulgar','Extensor largo y aductor del pulgar','Flexor largo del pulgar y palmar menor'],c:1,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Primer compartimento extensor = <b>Abductor Pollicis Longus + Extensor Pollicis Brevis</b>. El banco la repite muchísimo y siempre con el mismo truco de invertir largo/corto.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"ABajo-LArgo, EXtra-CORTO"</b>: ABductor LARGO + EXtensor CORTO. O en inglés: APL + EPB = "APLe, Eat Pie Bro".</p><p><span class="lbl key">Dato que distingue</span> El extensor LARGO del pulgar va en el TERCER compartimento (borde cubital de la tabaquera), no en el primero.</p><p><span class="lbl reg">Regla</span> Si veo De Quervain, marco <b>extensor corto + abductor largo</b>.</p>'},
{q:'[Mayo 2026] Maniobra diagnóstica de De Quervain:',opts:['Phalen','Finkelstein','Froment','Durkan'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Pulgar dentro del puño + desviación cubital = estiro APL/EPB sobre la estiloides → dolor eléctrico.</p><p><span class="lbl mne">Mnemotecnia</span> <b>FINKELstein = FINca el pulgar y dobla</b>.</p><p><span class="lbl reg">Regla</span> Si veo dolor de base del pulgar, marco <b>Finkelstein</b>.</p>'},
{q:'Estructuras que pasan por el PRIMER compartimento extensor dorsal:',opts:['Extensor largo del pulgar','Abductor largo y extensor corto del pulgar','Extensores radiales del carpo','Extensor del índice'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Mismo dato, otra máscara: 1.er compartimento = APL + EPB. Por eso ahí se inflama De Quervain.</p><p><span class="lbl reg">Regla</span> Si veo "primer compartimento extensor", marco <b>APL + EPB</b>.</p>'},
{q:'⚠️ ¿Cuáles son los 6 compartimentos extensores dorsales (de radial a cubital)?',opts:['1: APL+EPB · 2: ECRL+ECRB · 3: EPL · 4: ED+EIP · 5: EDM · 6: ECU','1: EPL · 2: APL+EPB · 3: ECRL+ECRB · 4: ED · 5: ECU · 6: EDM','1: APL+EPB · 2: EPL · 3: ECRL+ECRB · 4: ED · 5: EDM · 6: ECU','1: ECRL+ECRB · 2: APL+EPB · 3: EPL · 4: ED · 5: EDM · 6: ECU'],c:0,pe:0,lag:true,
fb:'<p><span class="lbl why">Por qué</span> 1: abductor largo + extensor corto del pulgar · 2: radiales largo y corto · 3: extensor largo del pulgar · 4: extensor común + propio del índice · 5: propio del meñique · 6: cubital posterior.</p><p><span class="lbl mne">Mnemotecnia</span> <b>2-2-1-2-1-1</b> (número de tendones por compartimento).</p><p><span class="lbl dis">⚠️ LAGUNA</span> La lista completa NO está en tus notas ni en el banco (tu plan ya lo marcó): confírmala en Netter/Complete Anatomy. La incluyo porque es tu punto débil declarado.</p>'},
{q:'Secretaria con dolor del pulgar, chasquido y bloqueo en flexión. Diagnóstico:',opts:['De Quervain','Dedo en gatillo (tenosinovitis de la 1.ª polea A1)','Dupuytren','Dedo en martillo'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Bloqueo/resalte al flexionar = el tendón flexor se atora en la polea A1. El banco lo puso como "tenosinovitis de 1.ª polea".</p><p><span class="lbl key">Dato que distingue</span> Gatillo = polea A1 VOLAR y bloqueo; De Quervain = 1.er compartimento DORSAL y dolor con Finkelstein.</p><p><span class="lbl reg">Regla</span> Si veo chasquido/bloqueo, marco <b>gatillo (A1)</b>.</p>'},
{q:'Sobre el dedo en gatillo, señala la aseveración INCORRECTA:',opts:['Se atora en la polea A1','Produce resalte doloroso','Es lo mismo que el Jersey finger','Puede tratarse con esteroide local'],c:2,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Jersey finger es OTRA cosa: avulsión del flexor profundo al jalar una camiseta (no puede flexionar la IFD). El banco usó "Jersey finger" como la incorrecta del dedo en gatillo.</p><p><span class="lbl reg">Regla</span> Si veo dedo en gatillo + opción "Jersey finger", esa es la <b>incorrecta</b>.</p>'}
]},

/* ============ CASO 3 — NERVIO RADIAL Y NERVIOS PERIFÉRICOS ============ */
{
id:'radial', fc:'mano-I', tema:'Mano · Nervios periféricos', temaKey:'mano', prio:'MUY ALTA', pe:5,
resp:'Neuropraxia del nervio radial',
alias:['neuropraxia del nervio radial','neuropraxia radial','paralisis del nervio radial','lesion del nervio radial','mano pendula','paralisis del sabado por la noche','neuroapraxia radial'],
vineta:'Femenina que tras una reunión con alcohol se quedó dormida con el brazo colgado sobre el respaldo de una silla. Al despertar presenta <b>mano péndula</b>: no puede extender la muñeca ni los dedos. Sin heridas ni traumas.',
pistas:[
'Hay hipoestesia en el dorso radial de la mano.',
'La compresión fue prolongada pero el nervio está macroscópicamente íntegro.',
'Le llaman "parálisis del sábado por la noche".',
'El déficit es de EXTENSIÓN (muñeca y dedos caídos).',
'Clasificación de Seddon: es el grado MÁS leve.'],
opciones:['Neuropraxia del nervio radial','Lesión del nervio mediano','Lesión del nervio cubital','Axonotmesis del plexo braquial'],
rev:'<p><span class="lbl why">Por qué</span> Mano péndula = radial. Sin herida + compresión por dormir = <b>neuropraxia</b> (bloqueo funcional, axón íntegro, se recupera solo). <b>[P.E. ×4]</b></p><p><span class="lbl dis">Distractores</span> Mediano = no flexiona; cubital = garra; axonotmesis implica daño axonal con degeneración walleriana, no aplica a una compresión leve por dormir.</p><p><span class="lbl mne">Mnemotecnia</span> Seddon de leve a grave: <b>NEUropraxia-AXOnotmesis-NEUROTmesis = "Ni Aguanta Nada"</b>. Neuropraxia = la siesta del nervio.</p><p><span class="lbl ana">Analogía</span> Es como una manguera pisada: no está rota, solo aplastada; al quitar el pie, vuelve el flujo.</p><p><span class="lbl key">Dato que distingue</span> RADIAL extiende. Si no extiende muñeca/dedos → radial. Si no flexiona → mediano. Garra → cubital.</p>',
anki:'mano::nervio-radial',
subs:[
{q:'[Mayo 2026] Sección completa del nervio (axón + vainas). Según Seddon es:',opts:['Neuropraxia','Axonotmesis','Neurotmesis','Neuroapraxia grado II'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Neurotmesis = corte total, peor pronóstico, requiere cirugía. Mayo 2026 la puso como respuesta directa.</p><p><span class="lbl mne">Mnemotecnia</span> <b>neuroTMESIS = TME-rminó el nervio</b>.</p><p><span class="lbl reg">Regla</span> Si veo nervio seccionado, marco <b>neurotmesis</b>.</p>'},
{q:'La degeneración del cabo DISTAL tras una lesión nerviosa se llama:',opts:['Degeneración walleriana','Apoptosis retrógrada','Desmielinización segmentaria','Atrofia neurógena'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Distal al corte, el axón muere y se limpia: degeneración walleriana. Así puede volver a crecer desde proximal.</p><p><span class="lbl reg">Regla</span> Si veo "degeneración distal del nervio", marco <b>walleriana</b>.</p>'},
{q:'Velocidad de regeneración axonal:',opts:['1 cm/día','1 mm/día','1 mm/semana','1 cm/mes'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El axón crece ~1 mm/día (~3 cm/mes). Con esto calculo cuánto tardará en llegar al músculo diana.</p><p><span class="lbl mne">Mnemotecnia</span> <b>1 milímetro por día, el nervio va a su paso de hormiga</b>.</p><p><span class="lbl reg">Regla</span> Si veo recuperación axonal, marco <b>1 mm/día</b>.</p>'},
{q:'Post-cirugía de fractura radiocubital el paciente no puede extender muñeca ni dedos. Nervio lesionado:',opts:['Interóseo anterior','Interóseo posterior (rama del radial)','Mediano','Cubital'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El interóseo posterior es la rama motora profunda del radial: mueve extensores. Lesión yatrógena clásica en cirugía de antebrazo. Conducta siguiente del banco: <b>exploración quirúrgica con injertos</b>.</p><p><span class="lbl reg">Regla</span> Si veo "no extiende tras fx/cx de antebrazo", marco <b>interóseo posterior</b>.</p>'},
{q:'Niña que se corta el dorso del antebrazo con vidrio; herida profunda y mano caída. Nervio, rama y tratamiento:',opts:['Radial · rama interósea posterior · miorrafia + neurorrafia + férula','Cubital · rama dorsal · solo cierre','Mediano · interóseo anterior · férula','Radial · rama superficial sensitiva · neurorrafia'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Dorso de antebrazo = territorio del interóseo posterior. Con sección abierta reparo TODO en orden: músculo (miorrafia), nervio (neurorrafia), cierre y férula.</p><p><span class="lbl reg">Regla</span> Si veo herida dorsal de antebrazo + mano caída, marco <b>radial/interóseo posterior + reparación completa</b>.</p>'},
{q:'¿Cuál es el nervio MÁS usado como injerto nervioso?',opts:['Safeno','Sural','Cutáneo femoral lateral','Mediano'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El sural es sensitivo, superficial, prescindible y largo: el donador ideal. El banco lo repite y Mayo 2026 lo usó en la disquinesia facial.</p><p><span class="lbl reg">Regla</span> Si veo injerto de nervio, marco <b>sural</b>.</p>'},
{q:'🔎 [Mayo 2026] ¿Qué longitud de injerto de nervio sural se puede obtener aproximadamente?',opts:['5 cm','10 cm','20 cm','40 cm'],c:2,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Mayo 2026 tuvo "20 cm" como respuesta; lo más probable es que la pregunta fuera la longitud útil del sural.</p><p><span class="lbl dis">🔎 VERIFICAR</span> La pregunta original no quedó transcrita; la reconstruí. Confírmalo con tu grupo.</p>'},
{q:'🔎 [Mayo 2026] La parálisis obstétrica de Erb-Duchenne afecta las raíces:',opts:['C5-C6','C7','C8-T1','C4-C5'],c:0,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Mayo 2026 trajo "C5-C6" como respuesta: Erb = raíces altas, brazo en "propina de mesero".</p><p><span class="lbl mne">Mnemotecnia</span> <b>ERByba = arriba</b> (raíces de arriba C5-C6); Klumpke = abajo (C8-T1).</p><p><span class="lbl dis">🔎 VERIFICAR</span> Pregunta reconstruida desde la pura respuesta "C5-C6".</p>'},
{q:'🔎 [Mayo 2026] Paciente con voz ronca tras cirugía/trauma cervical. Nervio lesionado:',opts:['Hipogloso','Laríngeo recurrente (rama del vago)','Glosofaríngeo','Facial'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> "Voz ronca" fue respuesta en Mayo 2026 dentro del bloque de lesiones nerviosas: la ronquera delata al laríngeo recurrente.</p><p><span class="lbl dis">🔎 VERIFICAR</span> Reconstruida; pudo preguntarse al revés (dato clínico de lesión del recurrente → voz ronca).</p>'},
{q:'🔎 [Mayo 2026] Nervio que inerva supraespinoso e infraespinoso (dolor/debilidad de hombro):',opts:['Axilar','Supraescapular','Torácico largo','Dorsal de la escápula'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> "Supraescapular" fue respuesta seca en Mayo 2026. Inerva supra e infraespinoso (abducción inicial y rotación externa).</p><p><span class="lbl dis">🔎 VERIFICAR</span> Pregunta reconstruida desde la respuesta.</p>'}
]},

/* ============ CASO 4 — NERVIO CUBITAL / GARRA ============ */
{
id:'cubital', fc:'mano-I', tema:'Mano · Nervio cubital', temaKey:'mano', prio:'MUY ALTA', pe:4,
resp:'Lesión del nervio cubital',
alias:['lesion del nervio cubital','nervio cubital','garra cubital','paralisis cubital','mano en garra'],
vineta:'Masculino con herida cortante en la muñeca (lado cubital). A la exploración: <b>deformidad en garra</b> de 4.° y 5.° dedos, no puede abducir ni aducir los dedos y la pinza pulgar-índice es débil.',
pistas:[
'La atrofia es de la eminencia HIPOTENAR y de los espacios interóseos.',
'Al hacer pinza con un papel, flexiona la interfalángica del pulgar para compensar (signo descrito por un francés).',
'Pierde la abducción/aducción de los dedos (interóseos) y la aducción del pulgar.',
'Los lumbricales 3.° y 4.° están denervados.',
'Cuanto más DISTAL la lesión, PEOR la garra (paradoja).'],
opciones:['Lesión del nervio cubital','Lesión del nervio mediano','Lesión del nervio radial','Lesión del interóseo posterior'],
rev:'<p><span class="lbl why">Por qué</span> Garra de 4.°-5.° + interóseos sin fuerza + Froment positivo = cubital. Es el nervio de los músculos FINOS de la mano. <b>[P.E. ×4 — Mayo 2026 preguntó directamente "Interóseos"]</b></p><p><span class="lbl dis">Distractores</span> Mediano = flexores y pinza sensitiva radial; radial = extensión; interóseo posterior = solo extensores, sin garra.</p><p><span class="lbl mne">Mnemotecnia</span> <b>CUBITAL = CUchillo fino</b>: hace los movimientos finos (abrir/cerrar dedos, aducir pulgar).</p><p><span class="lbl ana">Analogía</span> El cubital es el técnico de precisión del taller; si falta, las máquinas gruesas (flexores del mediano) siguen, pero nadie ajusta los tornillos finos.</p><p><span class="lbl key">Dato que distingue</span> Froment = cubital. Atrofia hipotenar = cubital. Garra = cubital.</p>',
anki:'mano::nervio-cubital',
subs:[
{q:'El signo de Froment explora al nervio:',opts:['Mediano','Radial','Cubital','Musculocutáneo'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Froment: pido pinza con papel; sin aductor del pulgar (cubital), el paciente trampea flexionando la IF con el flexor largo (mediano).</p><p><span class="lbl mne">Mnemotecnia</span> <b>FROMent = FROta el papel</b>... y el pulgar se dobla si el cubital falla.</p><p><span class="lbl reg">Regla</span> Si veo Froment, marco <b>cubital</b>.</p>'},
{q:'¿Cuál músculo NO es inervado por el nervio cubital?',opts:['Primer lumbrical','Cuarto lumbrical','Primer interóseo dorsal','Aductor del pulgar'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Lumbricales 1 y 2 = MEDIANO; lumbricales 3 y 4 e interóseos = cubital.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Dos y dos, mitad y mitad"</b>: los dos primeros lumbricales se los queda el mediano.</p><p><span class="lbl reg">Regla</span> Si veo "NO inervado por cubital" entre lumbricales, marco <b>1.er lumbrical</b> (o 2.°).</p>'},
{q:'¿Cuál músculo SÍ está inervado por el cubital?',opts:['Primer lumbrical','Cuarto lumbrical','Oponente del pulgar','Abductor corto del pulgar'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Misma regla al revés: 4.° lumbrical = cubital. Oponente y abductor corto del pulgar son tenares del MEDIANO (el banco también preguntó: oponente → mediano).</p><p><span class="lbl reg">Regla</span> Si veo lumbricales 3-4 o interóseos, marco <b>cubital</b>.</p>'},
{q:'Músculo de la eminencia TENAR que NO es inervado por el mediano:',opts:['Abductor corto del pulgar','Oponente del pulgar','Aductor del pulgar','Flexor corto (cabeza superficial)'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El aductor del pulgar es el infiltrado: vive en la zona tenar pero responde al cubital (por eso existe Froment).</p><p><span class="lbl mne">Mnemotecnia</span> <b>aDUctor = DUeño distinto</b>.</p><p><span class="lbl reg">Regla</span> Si veo "tenar NO mediano", marco <b>aductor del pulgar</b>.</p>'},
{q:'Sobre la garra cubital, señala la CORRECTA:',opts:['El cubital inerva los flexores profundos de todos los dedos','La paradoja cubital: lesión proximal al codo (peor pronóstico) da MENOS garra que una lesión distal en muñeca','El mediano inerva los cuatro lumbricales','La posición intrínseco-minus es flexión de MCF e IF'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Paradoja: si la lesión es alta, también se caen los flexores profundos de 4.°-5.° → no hay quién flexione las IF → menos garra visible. Lesión baja = flexores intactos jalando sin oposición = garrón.</p><p><span class="lbl ana">Analogía</span> La garra necesita que el motor flexor siga vivo; si la lesión apaga también ese motor, la deformidad se disimula.</p><p><span class="lbl reg">Regla</span> Si veo "paradoja cubital", marco <b>proximal = menos garra</b>.</p>'},
{q:'Movimientos perdidos en la lesión cubital:',opts:['Extensión de muñeca y dedos','Abducción del meñique, abducción/aducción de dedos y aducción del pulgar','Flexión de IFD de índice y medio','Oposición del pulgar'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Interóseos (abrir/cerrar dedos) + hipotenares (meñique) + aductor del pulgar: todo eso es cubital.</p><p><span class="lbl reg">Regla</span> Si veo "no puede separar/juntar los dedos", marco <b>cubital</b>.</p>'},
{q:'Herida cortante en falange proximal del anular, lado cubital, con pérdida de sensibilidad distal de ese lado. Estructura dañada:',opts:['Nervio digital cubital del anular','Tendón extensor común','Nervio mediano','Arteria digital radial'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Cada dedo lleva dos paquetes digitales (radial y cubital). Corte volar-lateral = nervio digital de ese lado.</p><p><span class="lbl reg">Regla</span> Si veo herida lateral de dedo + hipoestesia distal, marco <b>nervio digital colateral</b>.</p>'}
]},

/* ============ CASO 5 — INFECCIONES DE LA MANO ============ */
{
id:'kanavel', fc:'mano-III', tema:'Mano · Infecciones', temaKey:'mano', prio:'MUY ALTA', pe:5,
resp:'Tenosinovitis infecciosa del flexor',
alias:['tenosinovitis infecciosa del flexor','tenosinovitis infecciosa','tenosinovitis piogena','tenosinovitis septica','infeccion de la vaina flexora'],
vineta:'Masculino de 30 años con <b>herida penetrante en la cara volar</b> del tercio proximal del dedo índice hace 48 h. Hoy: dedo inflamado, en <b>semiflexión</b>, con dolor intenso a la extensión pasiva.',
pistas:[
'La tumefacción del dedo es FUSIFORME (dedo en salchicha).',
'Hay dolor a la palpación sobre todo el trayecto de la vaina flexora.',
'Cuatro signos clásicos llevan el nombre de Kanavel.',
'El germen entró por una punción volar directa a la vaina.',
'Si no se drena, la vaina se necrosa y el dedo pierde función.'],
opciones:['Tenosinovitis infecciosa del flexor','Panadizo','Paroniquia','Artritis séptica de la IFP'],
rev:'<p><span class="lbl why">Por qué</span> Herida volar + dedo en flexión + dolor a la extensión pasiva + tumefacción fusiforme = los 4 signos de Kanavel → pus dentro de la vaina flexora. Urgencia quirúrgica. <b>[P.E. ×5]</b></p><p><span class="lbl dis">Distractores</span> Panadizo = solo el PULPEJO a tensión; paroniquia = pliegue ungueal; artritis séptica = una articulación, no toda la vaina.</p><p><span class="lbl mne">Mnemotecnia</span> Kanavel = <b>"FU-DO-DO-FLE"</b>: FUsiforme, DOlor en vaina, DOlor a extensión pasiva, FLExión fija. (El ERITEMA NO es signo de Kanavel — así lo preguntó el banco.)</p><p><span class="lbl ana">Analogía</span> La vaina es una manguera cerrada: si le inyectas pus, duele al estirarla y el dedo se acomoda doblado para darle espacio.</p><p><span class="lbl key">Dato que distingue</span> Dolor a la EXTENSIÓN PASIVA es el signo más sensible.</p>',
anki:'mano::tenosinovitis-infecciosa',
subs:[
{q:'Microorganismo más frecuentemente involucrado:',opts:['Pseudomonas aeruginosa','Staphylococcus aureus','Eikenella corrodens','Streptococcus pyogenes'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> S. aureus manda en piel y heridas de la mano (también es el agente más frecuente de heridas en general según el banco).</p><p><span class="lbl reg">Regla</span> Si veo infección de mano sin mordedura, marco <b>S. aureus</b>.</p>'},
{q:'Tratamiento de la tenosinovitis infecciosa establecida:',opts:['Antibiótico oral y férula','Drenaje abierto de toda la vaina flexora + antibiótico','Esteroide intralesional','Observación 48 h'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Pus en un espacio cerrado = drenarlo. El banco fue literal: "drenaje abierto de toda la vaina flexora".</p><p><span class="lbl reg">Regla</span> Si veo Kanavel positivo, marco <b>drenaje quirúrgico de la vaina</b>.</p>'},
{q:'Son signos de Kanavel, EXCEPTO:',opts:['Tumefacción fusiforme','Dolor a la extensión pasiva','Eritema del dedo','Dedo en posición de flexión'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El eritema es inespecífico: cualquier celulitis lo da. Los 4 de Kanavel son fusiforme + dolor en vaina + dolor a extensión pasiva + flexión.</p><p><span class="lbl reg">Regla</span> Si veo "Kanavel excepto", marco <b>eritema</b>.</p>'},
{q:'[Mayo 2026] Infección del espacio profundo del PULPEJO, rojo, tenso y muy doloroso:',opts:['Paroniquia','Panadizo (felón)','Tenosinovitis','Quiste mucoso'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El pulpejo tiene tabiques fibrosos: el pus queda a presión → dolor pulsátil intenso. Es la infección más frecuente de la punta del dedo.</p><p><span class="lbl mne">Mnemotecnia</span> <b>PANadizo = PANza del dedo</b> (la yema).</p><p><span class="lbl key">Dato que distingue</span> Paroniquia = pliegue de la UÑA; panadizo = PULPEJO.</p><p><span class="lbl reg">Regla</span> Si veo pulpejo a tensión, marco <b>panadizo</b>.</p>'},
{q:'Microorganismo típico de mordedura HUMANA:',opts:['Pasteurella multocida','Eikenella corrodens','Bartonella henselae','Capnocytophaga'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Mordedura humana (o pelea con puño contra dientes) = Eikenella corrodens.</p><p><span class="lbl mne">Mnemotecnia</span> <b>EIKEnella = "Oye, qué ELLA me mordió"</b> (humana).</p><p><span class="lbl reg">Regla</span> Si veo mordedura humana, marco <b>Eikenella</b>.</p>'},
{q:'Microorganismo típico de mordedura de gato/perro:',opts:['Eikenella corrodens','S. epidermidis','Pasteurella multocida','E. coli'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Animal (sobre todo gato) = Pasteurella multocida; el banco la llamó "patognomónica de mordedura de gato".</p><p><span class="lbl mne">Mnemotecnia</span> <b>PASTEUrella = el PASTOR y su perro</b> (animales).</p><p><span class="lbl reg">Regla</span> Si veo mordedura animal, marco <b>Pasteurella</b>.</p>'},
{q:'🔎 ¿Cuál es la infección MÁS frecuente de la mano?',opts:['Panadizo','Paroniquia','Celulitis','Tenosinovitis'],c:1,pe:2,ver:true,
fb:'<p><span class="lbl why">Por qué</span> El banco se contradice: en distintos años respondieron "panadizo", "absceso subungueal" y "celulitis". La mayoría de los textos dicen <b>paroniquia/absceso subungueal</b> como la más frecuente de la mano, y panadizo como la más frecuente del PULPEJO.</p><p><span class="lbl dis">🔎 VERIFICAR</span> Memoriza el par seguro: punta del dedo→panadizo; pliegue ungueal→paroniquia. Si la pregunta es "de la mano" a secas, mi apuesta es paroniquia/subungueal.</p>'},
{q:'Anomalía congénita MÁS común de la mano:',opts:['Polidactilia','Sindactilia','Clinodactilia','Bandas amnióticas'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El banco la repite todos los años: sindactilia (dedos fusionados) es la más común. La desviación del 5.° dedo = clinodactilia.</p><p><span class="lbl mne">Mnemotecnia</span> <b>SIN-dactilia = SIN separación</b>.</p><p><span class="lbl reg">Regla</span> Si veo anomalía congénita más común de mano, marco <b>sindactilia</b>.</p>'},
{q:'🔎 Patología congénita con brotes embrionarios que puede extirparse ambulatoriamente:',opts:['Duplicación del pulgar','Polidactilia (dedo supernumerario rudimentario)','Sindactilia','Bandas amnióticas'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> El banco dejó esta con "??" entre duplicación de pulgar y polidactilia. El concepto "brote embrionario rudimentario pediculado que se liga/extirpa en consultorio" corresponde a la <b>polidactilia ulnar rudimentaria</b>; la duplicación verdadera del pulgar requiere reconstrucción formal.</p><p><span class="lbl dis">🔎 VERIFICAR</span> Respuesta inferida — el banco original no la marcó. Confírmala.</p>'}
]},

/* ============ CASO 6 — TRAUMA DE MANO: ESCAFOIDES Y AMIGOS ============ */
{
id:'escafoides', fc:'mano-III', tema:'Mano · Trauma y tumores', temaKey:'mano', prio:'MUY ALTA', pe:5,
resp:'Fractura de escafoides',
alias:['fractura de escafoides','fractura del escafoides','escafoides','fx de escafoides'],
vineta:'Masculino joven que cae sobre la mano extendida. Dolor en la muñeca, en una zona dorso-radial muy concreta que se hunde entre dos tendones cuando extiende el pulgar.',
pistas:[
'El dolor máximo está en la TABAQUERA ANATÓMICA.',
'Es la fractura más frecuente de los huesos del carpo. [P.E. ×4 — cayó en Mayo 2026]',
'La radiografía inicial puede ser NORMAL; se inmoviliza igual.',
'Su irrigación es retrógrada → riesgo de necrosis avascular del polo proximal.',
'El piso de la tabaquera anatómica es este hueso.'],
opciones:['Fractura de escafoides','Fractura del semilunar','Fractura de Bennett','Esguince radiocarpiano'],
rev:'<p><span class="lbl why">Por qué</span> Caída + dolor en tabaquera = escafoides hasta demostrar lo contrario. Mayo 2026 lo preguntó directo. La irrigación entra distal y viaja al revés → el polo proximal puede quedarse sin sangre. <b>[P.E. ×4]</b></p><p><span class="lbl dis">Distractores</span> Semilunar se asocia a luxaciones (y a Kienböck); Bennett es base del PRIMER metacarpiano; un esguince no da dolor selectivo en tabaquera.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"El tabaco cae al piso"</b>: el piso de la tabaquera es el escafoides, y el que CAE se lo fractura.</p><p><span class="lbl ana">Analogía</span> El escafoides cobra el peaje de todas las caídas con la mano abierta.</p><p><span class="lbl key">Dato que distingue</span> Rx normal NO descarta: férula y repetir en 2 semanas.</p>',
anki:'mano::fractura-escafoides',
subs:[
{q:'El piso de la tabaquera anatómica es:',opts:['Trapecio','Escafoides','Semilunar','Estiloides radial'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Entre el EPL y el APL/EPB, el piso óseo es el escafoides: por eso ahí duele su fractura.</p><p><span class="lbl reg">Regla</span> Si veo "piso de la tabaquera", marco <b>escafoides</b>.</p>'},
{q:'La necrosis avascular del ESCAFOIDES se llama:',opts:['Enfermedad de Kienböck','Enfermedad de Preiser','Enfermedad de Ollier','Enfermedad de Madelung'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Preiser = escafoides; Kienböck = semilunar. El banco juega con este par cada año.</p><p><span class="lbl mne">Mnemotecnia</span> <b>PreiSER = eScafoidES</b> (las S) · <b>KienbÖck = lunÖta</b> (semiLUNAR, la O rara para el hueso de la luna).</p><p><span class="lbl reg">Regla</span> Si veo necrosis del escafoides, marco <b>Preiser</b>; del semilunar, <b>Kienböck</b>.</p>'},
{q:'La necrosis avascular del SEMILUNAR se llama:',opts:['Preiser','Kienböck','Sudeck','Dupuytren'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Kienböck = semilunar (lunatomalacia). Complicación de la fractura-luxación del semilunar: además puede lesionar al nervio MEDIANO (también lo preguntó el banco).</p><p><span class="lbl reg">Regla</span> Si veo semilunar, marco <b>Kienböck</b> (y pienso en mediano si hay luxación).</p>'},
{q:'Tratamiento de la fractura de escafoides no desplazada:',opts:['Férula/yeso por 6 semanas (incluye pulgar)','Vendaje blando 1 semana','Fijación externa','Movilización temprana'],c:0,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Inmovilización prolongada (6 semanas o más) porque su irrigación pobre hace lenta la consolidación.</p><p><span class="lbl reg">Regla</span> Si veo escafoides no desplazado, marco <b>férula 6 semanas</b>.</p>'},
{q:'Tras una riña, dolor y desviación cubital del meñique con depresión del nudillo. Diagnóstico:',opts:['Fractura de Bennett','Fractura del cuello del 5.° metacarpiano (boxeador)','Luxación MCF','Fractura de Rolando'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Puñetazo = el cuello del 5.° MCP se dobla. Es LA fractura del boxeador y la fractura más común de la mano (cuello de metacarpianos).</p><p><span class="lbl mne">Mnemotecnia</span> <b>5.° = el del golpe</b>: el meñique paga la riña.</p><p><span class="lbl reg">Regla</span> Si veo riña + nudillo hundido, marco <b>cuello del 5.° MCP</b>.</p>'},
{q:'Sobre el tratamiento de la fractura del 5.° metacarpiano, lo CORRECTO es:',opts:['Ferulización inmediata sin reducir','Agujas de Kirschner si es inestable','Siempre placa y tornillos','No requiere tratamiento'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco lo marcó así: correcto = agujas de Kirschner; incorrecto = "ferulización inmediata" (primero se reduce).</p><p><span class="lbl reg">Regla</span> Si veo fx de boxeador inestable, marco <b>Kirschner</b>.</p>'},
{q:'🔎 La fractura de la base del 1.er metacarpiano EN UN SOLO trazo intraarticular (luxofractura) se llama:',opts:['Rolando','Bennett','Boxeador','Barton'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Bennett = un fragmento (luxofractura de la base del pulgar); Rolando = conminuta en 3 fragmentos (en Y/T). El banco transcribió Bennett con errores ("astilla debajo del 5to MCP"), así que te la dejo corregida.</p><p><span class="lbl mne">Mnemotecnia</span> <b>Bennett = "BEN, uno"</b> (1 fragmento); <b>RoLANdo = "se ROmpió en LANdas"</b> (3 pedazos).</p><p><span class="lbl dis">🔎 VERIFICAR</span> La transcripción del banco era confusa; este es el dato estándar.</p>'},
{q:'Caída con golpe directo: la falange DISTAL queda caída y no la puede extender. Diagnóstico y causa:',opts:['Dedo en martillo · avulsión del extensor en la base de la falange DISTAL','Dedo en martillo · desinserción en falange MEDIA','Jersey finger · avulsión del flexor profundo','Boutonnière'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Martillo = extensor arrancado de la falange DISTAL (con o sin fragmento óseo). El banco puso como INCORRECTA la opción "falange media" — esa es la trampa.</p><p><span class="lbl key">Dato que distingue</span> Sin tratamiento → deformidad en cuello de cisne. Tx: férula de Stack en extensión.</p><p><span class="lbl reg">Regla</span> Si veo punta del dedo caída tras golpe, marco <b>martillo/avulsión del extensor distal</b>.</p>'},
{q:'En una amputación digital, ¿cómo se transporta el segmento?',opts:['Directo en hielo','En gasas húmedas con suero, dentro de bolsa de plástico, y la bolsa sobre hielo','En alcohol','En agua tibia'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Frío indirecto: gasa húmeda → bolsa → hielo. Nunca hielo directo (quema el tejido). Y en amputación INCOMPLETA: enfriar el segmento antes de verificar perfusión (así lo marcó el banco).</p><p><span class="lbl reg">Regla</span> Si veo amputación, marco <b>gasa húmeda + bolsa + hielo</b> (y ATLS primero).</p>'},
{q:'[Mayo 2026] Lesión de dedo (machucón) sin fractura expuesta: conducta inicial:',opts:['Cirugía urgente','Inmovilización y analgesia','Antibiótico IV','Tracción'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Mayo 2026: "Inmovilización y analgesia" para la lesión simple de dedo. No todo machucón se opera.</p><p><span class="lbl reg">Regla</span> Si veo trauma digital cerrado simple, marco <b>inmovilizar + analgesia</b>.</p>'},
{q:'[Mayo 2026] Tumoración subungueal pequeña, dolor intensísimo al frío y a la presión puntual en pulpejo/yema:',opts:['Ganglión','Tumor glómico','Quiste mucoso','Encondroma'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Tríada del glómico: dolor paroxístico + sensibilidad al frío + dolor puntual exquisito, típicamente subungueal. Mayo 2026 lo trajo junto con "pulpejo y yema del dedo".</p><p><span class="lbl dis">Distractores</span> Ganglión = tumor #1 de la mano pero indoloro en dorso de muñeca; quiste mucoso = punta del dedo PERO sin dolor al frío; encondroma = tumor óseo (Ollier si son múltiples).</p><p><span class="lbl reg">Regla</span> Si veo dolor subungueal al frío, marco <b>tumor glómico</b>.</p>'},
{q:'El tumor MÁS frecuente de la mano es:',opts:['Tumor glómico','Ganglión','Xantoma/tumor de células gigantes','Lipoma'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> 1.° ganglión; 2.° xantoma (tumor de células gigantes de la vaina) según el banco.</p><p><span class="lbl reg">Regla</span> Si veo tumor más frecuente de mano, marco <b>ganglión</b>.</p>'},
{q:'Proceso degenerativo retráctil de la fascia palmar:',opts:['De Quervain','Contractura de Dupuytren','Síndrome compartimental','Camptodactilia'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Dupuytren = fibrosis en cuerdas de la fascia palmar que flexiona 4.°-5.° dedos.</p><p><span class="lbl mne">Mnemotecnia</span> <b>DUPUYtren = el PUÑo que no abre</b>.</p><p><span class="lbl reg">Regla</span> Si veo fascia palmar engrosada, marco <b>Dupuytren</b>.</p>'}
]},
/* ============ CASO 7 — GRAN QUEMADO / PARKLAND ============ */
{
id:'parkland', fc:'quemaduras', tema:'Quemaduras · Reanimación', temaKey:'quemaduras', prio:'MUY ALTA', pe:8,
resp:'Reanimación hídrica con fórmula de Parkland',
alias:['reanimacion hidrica con formula de parkland','formula de parkland','parkland','reanimacion hidrica','reposicion hidrica con hartmann','gran quemado'],
vineta:'Masculino de 35 años, 90 kg, llega a urgencias 1 h después de sufrir quemaduras de 2.° y 3.er grado en el <b>40% de SCT</b>. Signos vitales estables. ¿Cuál es la conducta prioritaria inmediata?',
pistas:[
'Con >20% de SCT ya es GRAN QUEMADO [P.E. — Mayo 2026: "20% gran quemado"].',
'La pérdida masiva es de líquidos al espacio intersticial: la primera causa de muerte en fase aguda es el desequilibrio hidroelectrolítico.',
'La fórmula lleva el nombre de un hospital de Dallas.',
'Se calcula con 4 ml × kg × %SCQ, la mitad en las primeras 8 h.',
'Mayo 2026 la pidió literal: "4 cc Hartmann/kg/%SCQ".'],
opciones:['Reanimación hídrica con fórmula de Parkland','Escarotomía inmediata','Desbridación e injertos en el momento','Antibiótico profiláctico IV'],
rev:'<p><span class="lbl why">Por qué</span> Quemado extenso = primero LÍQUIDOS. Parkland: <b>4 ml de Hartmann × kg × %SCQ</b>; 50% en las primeras 8 h (desde la HORA DE LA QUEMADURA, no de la llegada) y 50% en las 16 h siguientes. Aquí: 4×90×40 = 14,400 ml → 7,200 en 8 h. <b>[P.E. ×8 — Mayo 2026 incluyó la fórmula y "20% gran quemado"]</b></p><p><span class="lbl dis">Distractores</span> Escarotomía solo si hay quemadura circunferencial con compromiso; injertar se hace tras estabilizar; el antibiótico profiláctico sistémico NO se da de rutina.</p><p><span class="lbl mne">Mnemotecnia</span> <b>PARKland = PARtir en dos</b>: mitad en 8 h, mitad en 16 h. Y <b>4×kg×%</b>: "4 patas tiene la mesa del quemado".</p><p><span class="lbl ana">Analogía</span> El quemado es una cubeta agujereada: primero la relleno (líquidos) antes de pintarla (injertos).</p><p><span class="lbl key">Dato que distingue</span> Si en el traslado ya le pasaron líquidos, se RESTAN de lo calculado para las primeras 8 h (así lo tomaron en el examen de Junio 2023).</p>',
anki:'quemaduras::parkland',
subs:[
{q:'[Mayo 2026] La fórmula de reanimación del quemado adulto es:',opts:['2 cc salina/kg/%SCQ','4 cc Hartmann/kg/%SCQ','4 cc glucosado/kg/%SCQ','6 cc coloide/kg/%SCQ'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> 4 ml de Ringer lactato (Hartmann) por kg por %SCQ. SIN dextrosa y SIN coloides al inicio.</p><p><span class="lbl reg">Regla</span> Si veo fórmula del quemado, marco <b>4 × kg × % con Hartmann</b>.</p>'},
{q:'¿Con qué solución se inicia la reanimación?',opts:['Glucosado 5%','Salina 4.5%','Hartmann / Ringer lactato (sin dextrosa)','GlucoHartmann'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Cristaloide balanceado: Ringer lactato. La glucosa no expande y provoca hiperglucemia/diuresis osmótica.</p><p><span class="lbl reg">Regla</span> Si veo solución inicial del quemado, marco <b>Hartmann</b>.</p>'},
{q:'Px de 90 kg con 40% SCQ: ¿cuánto esperas que orine para saber que hidratas bien?',opts:['10–20 cc/h','45–90 cc/h','150–200 cc/h','200–300 cc/h'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Meta en adulto: 0.5–1 ml/kg/h → en 90 kg ≈ 45–90 cc/h. En 60 kg sería 30–60 cc/h (también cayó así).</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Medio a uno por kilo"</b>.</p><p><span class="lbl reg">Regla</span> Si veo diuresis meta de adulto quemado, marco <b>0.5–1 ml/kg/h</b>.</p>'},
{q:'Parámetro PRINCIPAL para evaluar la reanimación del quemado:',opts:['Presión venosa central','Gases arteriales','Diuresis','Presión arterial'],c:2,pe:5,
fb:'<p><span class="lbl why">Por qué</span> La diuresis horaria es el monitor estrella: riñón perfundido = paciente bien reanimado. El banco la repite cada año.</p><p><span class="lbl reg">Regla</span> Si veo "parámetro principal de hidratación", marco <b>diuresis</b>.</p>'},
{q:'Quemadura de cabeza completa + ambas extremidades superiores. %SCQ por regla de los 9:',opts:['18%','27%','36%','45%'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Cabeza 9 + brazo 9 + brazo 9 = 27%. Otra del banco: tronco anterior 18 + posterior 18 + parte de ext. sup. = 45%.</p><p><span class="lbl mne">Mnemotecnia</span> <b>9: cabeza y cada brazo · 18: cada pierna, tronco ant. y post. · 1: genitales</b>.</p><p><span class="lbl reg">Regla</span> Si veo %SCQ, sumo nueves con calma — es puntería gratis.</p>'},
{q:'Quemadura de 2.° grado SUPERFICIAL: ¿hasta dónde llega y en cuánto epiteliza?',opts:['Epidermis y dermis papilar · 7–14 días','Dermis reticular · 21 días','Epidermis · 4 semanas','Hipodermis · no epiteliza'],c:0,pe:5,
fb:'<p><span class="lbl why">Por qué</span> Rosada, húmeda, MUY dolorosa, flictenas, folículos preservados → dermis papilar → epiteliza en 7–14 días. Mayo 2026 abrió con "7-14 días".</p><p><span class="lbl key">Dato que distingue</span> 2.° profundo = dermis RETICULAR, dolor variable, hasta 21 días y riesgo de cicatriz patológica.</p><p><span class="lbl reg">Regla</span> Si veo 2.° superficial, marco <b>7–14 días</b>; profundo, <b>21 días</b>.</p>'},
{q:'Sobre la quemadura de 3.er grado, lo correcto:',opts:['Es la más dolorosa','Es INDOLORA y abarca todo el espesor de la piel','Epiteliza sola en 3 semanas','Solo afecta epidermis'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Quema las terminaciones nerviosas → no duele. Blanca/acartonada, no epiteliza: necesita injerto.</p><p><span class="lbl ana">Analogía</span> El cable quemado ya no transmite: por eso el silencio del dolor es mala señal.</p><p><span class="lbl reg">Regla</span> Si veo quemadura sin dolor, marco <b>3.er grado</b>.</p>'},
{q:'Tratamiento ideal de quemaduras de 3.er grado del 30–35% SCT:',opts:['Esperar epitelización espontánea','Curaciones cada tercer día','Escisión (desbridación) temprana + injertos de piel','Parches hidrocoloides'],c:2,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El 3.er grado no epiteliza: se desbrida temprano y se injerta (incluso en el mismo tiempo quirúrgico).</p><p><span class="lbl reg">Regla</span> Si veo 3.er grado extenso, marco <b>escisión temprana + injertos</b>.</p>'},
{q:'Zonas de Jackson: la zona INTERMEDIA con perfusión disminuida y daño potencialmente reversible es:',opts:['Coagulación','Estasis','Hiperemia','Necrosis'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Centro = coagulación (muerta); medio = ESTASIS (salvable con buena reanimación); fuera = hiperemia.</p><p><span class="lbl mne">Mnemotecnia</span> <b>C-E-H del centro afuera: "Casi Está Hecha"</b>.</p><p><span class="lbl reg">Regla</span> Si veo zona intermedia/salvable, marco <b>estasis</b>; la más interna, <b>coagulación</b>.</p>'},
{q:'Indicaciones de internamiento/referencia a centro de quemados:',opts:['Solo quemaduras >50%','Quemaduras de 3.er grado; de mano, pies, cara o genitales; vía aérea; eléctricas; adultos mayores >20% — todas las anteriores','Solo quemaduras eléctricas','Solo si hay inhalación'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Áreas especiales + profundidad + extensión + inhalación + eléctricas: el banco siempre lo resuelve con "todas las anteriores". Mano con 2.°-3.er grado se refiere SIEMPRE.</p><p><span class="lbl reg">Regla</span> Si veo criterios de referencia con lista razonable + "todas", marco <b>todas</b>.</p>'},
{q:'Gold standard para confirmar quemadura por inhalación:',opts:['Saturación de O2','Radiografía de tórax','Broncoscopía','Gasometría'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Ver la mucosa directamente: broncoscopía. Sospecha con: lugar cerrado, esputo carbonáceo, vibrisas quemadas.</p><p><span class="lbl key">Dato que distingue</span> El factor que OBSTRUYE la vía aérea quemada es el ESFACELO de la mucosa [P.E. ×3]. Px quemado de cara se interna por riesgo de vía aérea superior.</p><p><span class="lbl reg">Regla</span> Si veo confirmar inhalación, marco <b>broncoscopía</b>.</p>'},
{q:'Fórmula de reposición hídrica en NIÑOS quemados:',opts:['Parkland sin cambios','Galveston (Carvajal)','Brooke','Evans'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> En pediatría se usa Galveston-Carvajal (por superficie corporal, con glucosa de mantenimiento). Diuresis pediátrica meta: 1–1.5 ml/kg/h.</p><p><span class="lbl reg">Regla</span> Si veo niño quemado + fórmula, marco <b>Galveston-Carvajal</b>.</p>'},
{q:'Complicaciones y datos finos del gran quemado — señala lo CORRECTO:',opts:['La gravedad depende de la profundidad','La complicación GI típica es el íleo paralítico y la respuesta sistémica es hiperadrenérgica','La profundidad depende de la extensión','La colonización aguda es por Pseudomonas'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Pares del banco: GRAVEDAD↔EXTENSIÓN · PROFUNDIDAD↔TIEMPO de exposición · respuesta hiperadrenérgica = signos del quemado grave · íleo paralítico = complicación · colonización AGUDA = Staphylococcus spp (no Pseudomonas, esa es tardía).</p><p><span class="lbl mne">Mnemotecnia</span> <b>"GRave-EXtenso, PROfundo-TIEMpo"</b>.</p><p><span class="lbl reg">Regla</span> Si veo gravedad, marco <b>extensión</b>; si veo profundidad, marco <b>tiempo de exposición</b>.</p>'}
]},

/* ============ CASO 8 — QUEMADURA ELÉCTRICA Y QUÍMICA ============ */
{
id:'electrica', fc:'quemaduras', tema:'Quemaduras · Eléctricas y químicas', temaKey:'quemaduras', prio:'MUY ALTA', pe:6,
resp:'Rabdomiólisis por quemadura eléctrica',
alias:['rabdomiolisis por quemadura electrica','rabdomiolisis','mioglobinuria','quemadura electrica','lesion electrica con rabdomiolisis'],
vineta:'Electricista que recibe descarga de alta tensión. Tiene heridas de entrada y salida pequeñas, pero está obnubilado. Al colocar la sonda Foley la <b>orina sale oscura</b>, color refresco de cola.',
pistas:[
'La lesión eléctrica es un iceberg: poca piel, mucho músculo destruido por dentro.',
'El músculo destruido libera un pigmento que tapa los túbulos renales.',
'Mayo 2026 trajo la respuesta directa: "Rabdomiólisis".',
'La meta de diuresis aquí es MÁS ALTA que en el quemado térmico.',
'La corriente viaja por los tejidos con más agua (vasos y nervios).'],
opciones:['Rabdomiólisis por quemadura eléctrica','Hemólisis intravascular','Insuficiencia renal prerrenal simple','Síndrome nefrítico'],
rev:'<p><span class="lbl why">Por qué</span> Orina oscura tras electricidad = mioglobinuria por destrucción muscular masiva (rabdomiólisis). Riesgo: necrosis tubular aguda. Por eso fuerzo diuresis ALTA (~100 cc/h). <b>[P.E. ×6 — Mayo 2026: "Rabdomiólisis"]</b></p><p><span class="lbl dis">Distractores</span> Hemólisis da hemoglobinuria (puede coexistir pero el dato del banco es daño MUSCULAR); prerrenal no pinta la orina; nefrítico no viene al caso.</p><p><span class="lbl mne">Mnemotecnia</span> <b>RABDO = RABO de músculo en la orina</b>.</p><p><span class="lbl ana">Analogía</span> La electricidad es un inquilino que destroza el interior del edificio sin romper la fachada.</p><p><span class="lbl key">Dato que distingue</span> Térmico: diuresis 0.5–1 ml/kg/h. Eléctrico con mioglobinuria: ~100 cc/h.</p>',
anki:'quemaduras::electrica-rabdomiolisis',
subs:[
{q:'En quemadura eléctrica, vigilas la orina con Foley y encuentras:',opts:['Hematuria franca','Mioglobinuria (orina oscura por daño muscular)','Glucosuria','Piuria'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> El pigmento es MIOGLOBINA del músculo electrocutado. El banco lo pregunta doble: qué es y por qué (daño muscular).</p><p><span class="lbl reg">Regla</span> Si veo orina oscura + electricidad, marco <b>mioglobinuria</b>.</p>'},
{q:'Diuresis esperada/meta en el quemado ELÉCTRICO:',opts:['30 cc/h','50 cc/h','100 cc/h','10 cc/h'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Hay que "lavar" la mioglobina: meta ~100 cc/h (1.5–2 ml/kg/h).</p><p><span class="lbl reg">Regla</span> Si veo diuresis en eléctrica, marco <b>100 cc/h</b>.</p>'},
{q:'La corriente ALTERNA se caracteriza por:',opts:['Ser la de las baterías de coche','Ocasionar TETANIA (el músculo no se suelta); es la doméstica y más peligrosa que la continua','Ser inofensiva a bajo voltaje','No producir paro cardiaco'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La alterna ciclo a ciclo recontrae el músculo → la víctima queda pegada. Alta tensión = >1000 volts. La directa/continua es la de baterías.</p><p><span class="lbl mne">Mnemotecnia</span> <b>ALTERNA = ATERRA y ATRAPA</b>.</p><p><span class="lbl reg">Regla</span> Si veo tetania, marco <b>corriente alterna</b>.</p>'},
{q:'La resistencia de los tejidos al paso de la corriente depende de:',opts:['La edad','La cantidad de AGUA que contienen','El grosor de la piel únicamente','La temperatura ambiente'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Más agua = mejor conductor = menos resistencia: vasos y nervios sufren primero; el hueso (seco) resiste más pero se calienta como resistencia eléctrica.</p><p><span class="lbl key">Dato que distingue</span> Menor resistencia: vasos/nervios. Tejido más dañado en eléctrica (Junio 2023): NERVIOS.</p><p><span class="lbl reg">Regla</span> Si veo resistencia a la corriente, marco <b>cantidad de agua</b>.</p>'},
{q:'Complicación OCULAR clásica de la quemadura eléctrica:',opts:['Glaucoma','Catarata','Desprendimiento de retina','Uveítis'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La eléctrica es la quemadura con mayor incidencia de CATARATAS (pueden aparecer meses después).</p><p><span class="lbl reg">Regla</span> Si veo ojo + quemadura eléctrica, marco <b>catarata</b>.</p>'},
{q:'Quemadura eléctrica en menores de 2 años: localización típica:',opts:['Manos','Boca (morder cables)','Pies','Tórax'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> El bebé muerde el cable: quemadura de comisura oral.</p><p><span class="lbl reg">Regla</span> Si veo eléctrica en <2 años, marco <b>boca</b>.</p>'},
{q:'Quemadura por hidróxido de sodio (sosa): ¿qué es y cuál es su mecanismo?',opts:['Ácido · necrosis coagulativa','Álcali · necrosis por LICUEFACCIÓN (saponificación de las grasas)','Álcali · necrosis coagulativa','Ácido · saponificación'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> NaOH = ÁLCALI → licuefacción/saponificación: se "come" la grasa y sigue penetrando. Mayo 2026: "saponificación de las grasas". Los ÁCIDOS = necrosis COAGULATIVA de proteínas (forma costra que limita).</p><p><span class="lbl mne">Mnemotecnia</span> <b>áLCali = LiCuefacción · áCIdo = Coagula</b>. El álcali es peor porque no se autodetiene.</p><p><span class="lbl reg">Regla</span> Si veo sosa/NaOH, marco <b>álcali + saponificación</b>; si veo ácido, <b>coagulativa</b>.</p>'},
{q:'Tratamiento inicial de la quemadura por álcali (NaOH):',opts:['Neutralizar con vinagre','Irrigación abundante con agua','Cubrir y no tocar','Aplicar gluconato de calcio'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Lavar y lavar con agua (diluye y arrastra). NUNCA neutralizar: la reacción exotérmica quema más. Excepción del banco: el ÓXALATO está contraindicado lavar con agua.</p><p><span class="lbl reg">Regla</span> Si veo química por álcali/ácido, marco <b>irrigación con agua</b>.</p>'},
{q:'¿Con qué se neutraliza/trata la quemadura por ÁCIDO FLUORHÍDRICO?',opts:['Bicarbonato','Gluconato de calcio al 10%','Sulfato de magnesio','Agua oxigenada'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El flúor secuestra calcio (riesgo de arritmias): se quela con gluconato de calcio tópico/intralesional.</p><p><span class="lbl mne">Mnemotecnia</span> <b>Flúor roba CAlcio → yo le doy CAlcio</b>.</p><p><span class="lbl reg">Regla</span> Si veo fluorhídrico, marco <b>gluconato de calcio</b>.</p>'},
{q:'Datos sueltos de quemaduras que el banco repite — señala lo CORRECTO:',opts:['La temperatura sin lesión es <40 °C; inmersión típica: 65 °C por 5 s; escaldadura = causa #1 en niños y ocurre en el hogar; en ancianos predomina el fuego directo','La escaldadura es más común en la industria','Los niños se queman más por electricidad','A 30 °C ya hay quemadura'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Combo de perlas del banco: <40 °C no lesiona · 65 °C/5 s = inmersión · escaldadura: niños, en casa · ancianos: fuego directo · cataratas: eléctricas · furacín = bacteriostático y secante · argentafil (plata) = bactericida + bacteriostático · método expositivo: cara y periné.</p><p><span class="lbl reg">Regla</span> Si veo causa de quemadura en niños, marco <b>escaldadura en el hogar</b>.</p>'}
]},

/* ============ CASO 9 — INJERTOS ============ */
{
id:'injertos', fc:'injertos-colgajos', tema:'Injertos cutáneos', temaKey:'injertos', prio:'ALTA', pe:8,
resp:'Injerto de espesor parcial',
alias:['injerto de espesor parcial','injerto cutaneo de espesor parcial','injerto de piel parcial','injerto dermoepidermico'],
vineta:'Masculino de 26 años con avulsión de tejidos en antebrazo tras accidente. Se desbridó y se manejó con sistema VAC. Ya con tejido de granulación limpio y <b>sin exposición de tendón ni hueso</b>, se decide la cobertura cutánea tomada del muslo con dermatomo.',
pistas:[
'El lecho tiene buena vascularidad: no se necesita traer circulación propia.',
'Se toma con dermatomo eléctrico y la zona donadora reepiteliza sola.',
'Puede mallarse para cubrir más superficie.',
'Incluye epidermis y SOLO PARTE de la dermis.',
'Su contracción secundaria es MAYOR que la del espesor total.'],
opciones:['Injerto de espesor parcial','Injerto de espesor total','Colgajo radial libre','Colgajo local de transposición'],
