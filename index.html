rev:'<p><span class="lbl why">Por qué</span> Cara palmar + no flexiona IFP ni IFD a nivel de falange proximal = zona II flexora ("tierra de nadie"), donde superficial y profundo comparten vaina y las adherencias arruinan el resultado. <b>[P.E. — Mano II]</b></p><p><span class="lbl dis">Distractores</span> Martillo y extensor zona I son del DORSO (no flexionan = falla extensión). De Quervain es dorsal-radial, no flexor.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Tierra de nadie = zona 2, donde nadie quiere operar"</b>.</p><p><span class="lbl ana">Analogía</span> Dos cuerdas en un tubo angosto: si las cortas y reparas, tienden a pegarse a la pared (adherencias).</p><p><span class="lbl key">Dato que distingue</span> Pierde flexión = FLEXOR (volar); pierde extensión = EXTENSOR (dorsal).</p>',
anki:'mano-II::tendones-flexores',
subs:[
{q:'Las zonas flexoras de Verdan van de:',opts:['I a V','I a VIII','A a E','1 a 3'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Flexores = 5 zonas (I–V); extensores = 8 zonas (I–VIII). La II es "tierra de nadie".</p><p><span class="lbl mne">Mnemotecnia</span> <b>Flexor 5 dedos = 5 zonas · Extensor llega hasta VIII</b>.</p><p><span class="lbl reg">Regla</span> Si veo zonas flexoras, marco <b>I–V</b>; extensoras, <b>I–VIII</b>.</p>'},
{q:'Las poleas anulares MÁS importantes para evitar la "cuerda de arco" son:',opts:['A1 y A3','A2 y A4','A5 y C1','Solo A1'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> A2 (sobre falange proximal) y A4 (sobre falange media) mantienen el tendón pegado al hueso. Si se pierden, el tendón "salta" (bowstringing).</p><p><span class="lbl mne">Mnemotecnia</span> <b>"2 y 4, no las cortes"</b>. La A1 es la del dedo en gatillo.</p><p><span class="lbl reg">Regla</span> Si veo poleas críticas, marco <b>A2 y A4</b>.</p>'},
{q:'Falange distal caída, no la extiende, tras golpe axial (pelota). Diagnóstico:',opts:['Jersey finger','Dedo en martillo (avulsión del extensor en falange distal)','Boutonnière','Cuello de cisne'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Martillo = el EXTENSOR se arranca de la base de la falange DISTAL. Tx: férula de Stack en extensión. Sin tx → cuello de cisne.</p><p><span class="lbl dis">Distractores</span> El banco usa "desinserción en falange MEDIA" como la opción INCORRECTA: ¡es distal!</p><p><span class="lbl reg">Regla</span> Si veo punta caída tras golpe axial, marco <b>dedo en martillo</b>.</p>'},
{q:'No flexiona la IFD del anular al jalar una camiseta (avulsión del flexor profundo). Diagnóstico:',opts:['Dedo en martillo','Jersey finger','De Quervain','Boutonnière'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Jersey finger = avulsión del flexor PROFUNDO (no flexiona la IFD). Clásico al agarrar la camiseta del rival. Es el "espejo flexor" del martillo.</p><p><span class="lbl reg">Regla</span> Si veo "no flexiona la IFD", marco <b>Jersey finger</b>.</p>'},
{q:'Deformidad en BOUTONNIÈRE (ojal) se debe a lesión de:',opts:['Bandeleta central del extensor (IFP en flexión, IFD en extensión)','Flexor profundo','Polea A1','Ligamento colateral'],c:0,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Se rompe la bandeleta central → la cabeza de la falange "se asoma por el ojal": IFP flexionada, IFD hiperextendida. El cuello de cisne es el patrón opuesto (IFP hiperext, IFD flex).</p><p><span class="lbl mne">Mnemotecnia</span> <b>Boutonnière = botón que se asoma (IFP flexionada)</b>.</p><p><span class="lbl reg">Regla</span> Si veo IFP flexionada + IFD extendida, marco <b>boutonnière</b>.</p>'},
{q:'Posición correcta de la férula tras reparar un flexor del pulgar:',opts:['MCF en extensión, IF en extensión','MCF en flexión e IF en flexión','Muñeca en extensión máxima','Pulgar en abducción total'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Se feruliza en flexión para relajar la sutura del flexor (protege la reparación). El banco lo preguntó así para el flexor largo del pulgar.</p><p><span class="lbl reg">Regla</span> Si veo férula tras reparar flexor, marco <b>MCF e IF en flexión</b>.</p>'},
{q:'Herida en cara palmar del pulgar con pérdida de flexión interfalángica. Tendón lesionado:',opts:['Flexor superficial','Flexor largo del pulgar','Extensor largo del pulgar','Abductor largo'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El pulgar solo tiene UN flexor largo (no tiene superficial propio): su corte borra la flexión de la IF.</p><p><span class="lbl reg">Regla</span> Si veo pulgar que no flexiona la IF, marco <b>flexor largo del pulgar</b>.</p>'},
{q:'Herida del dorso del dedo a nivel medio: ¿qué se daña?',opts:['Bandeleta lateral solamente','La porción media (central) del aparato extensor','El flexor profundo','La polea A2'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> En el dorso del dedo, una herida media lesiona la bandeleta central del extensor (camino a boutonnière). El banco: "lesión del dorso del dedo → parte media del extensor".</p><p><span class="lbl reg">Regla</span> Si veo herida dorsal media del dedo, marco <b>bandeleta central del extensor</b>.</p>'}
]},

/* ============ CASO 21 — QUEMADURAS · ESCAROTOMÍA / SD COMPARTIMENTAL ============ */
{
id:'escarotomia', tema:'Quemaduras · Escarotomía', temaKey:'quemaduras', prio:'MUY ALTA', pe:5, fc:'quemaduras',
resp:'Escarotomía',
alias:['escarotomia','escarotomia urgente','escarotomia descompresiva'],
vineta:'Quemadura de 3.er grado <b>circunferencial</b> en el antebrazo. La escara está acartonada y rígida; a las horas el paciente tiene dolor creciente, frialdad distal y el <b>llenado capilar se enlentece</b>. El pulso por Doppler se va apagando.',
pistas:[
'La escara dura no se expande: actúa como un torniquete al edematizarse el miembro.',
'El compromiso es de PERFUSIÓN distal por presión, no infección.',
'El corte se hace sobre la escara/piel, no sobre la fascia.',
'Es una urgencia para salvar la extremidad.',
'Distínguela de la fasciotomía (esa abre la fascia en el síndrome compartimental real).'],
opciones:['Escarotomía','Fasciotomía','Amputación','Injerto inmediato'],
rev:'<p><span class="lbl why">Por qué</span> Quemadura CIRCUNFERENCIAL + escara rígida + perfusión que cae = la escara estrangula el miembro → ESCAROTOMÍA: corto la escara/piel y la presión cede. <b>[P.E. — discriminación que cae seguro]</b></p><p><span class="lbl dis">Distractores</span> La FASCIOTOMÍA abre la fascia y es para el síndrome compartimental verdadero (músculo, eléctricas, aplastamiento). Amputar es el último recurso; injertar viene después.</p><p><span class="lbl mne">Mnemotecnia</span> <b>esCAROtomía corta la esCARA · FASCIotomía abre la FASCIA</b>.</p><p><span class="lbl ana">Analogía</span> La escara es un yeso apretado que no creció con la hinchazón: lo abres y el brazo respira.</p><p><span class="lbl key">Dato que distingue</span> Escara superficial circunferencial → escarotomía (piel). Presión profunda muscular (eléctrica) → fasciotomía (fascia).</p>',
anki:'quemaduras::escarotomia',
subs:[
{q:'La escarotomía secciona:',opts:['La fascia muscular','La escara y la piel (plano superficial)','El periostio','El tendón'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Corta solo escara/piel para liberar la constricción. No entra a la fascia (eso es fasciotomía).</p><p><span class="lbl reg">Regla</span> Si veo "corta escara/piel", marco <b>escarotomía</b>.</p>'},
{q:'Indicación típica de FASCIOTOMÍA (no escarotomía):',opts:['Quemadura dérmica superficial','Síndrome compartimental real (quemadura eléctrica, aplastamiento, músculo)','Escara seca sin edema','Quemadura solar'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> La fasciotomía libera la PRESIÓN dentro del compartimento muscular: eléctricas, aplastamientos. La eléctrica destruye músculo (rabdomiólisis) → ojo con compartimental.</p><p><span class="lbl reg">Regla</span> Si veo músculo/eléctrica con presión, marco <b>fasciotomía</b>.</p>'},
{q:'Primer signo que te haría sospechar síndrome compartimental:',opts:['Ausencia de pulso (tardío)','Dolor desproporcionado y a la extensión pasiva','Fiebre','Eritema'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El dolor desproporcionado y a la extensión pasiva es PRECOZ; la ausencia de pulso es TARDÍA (cuando ya hay daño). El banco anotó que el doc quería "dolor" aunque redactó mal con "doppler venoso".</p><p><span class="lbl mne">Mnemotecnia</span> <b>5 P (Pain, Pallor, Paresthesia, Pulselessness, Paralysis); el primero es Pain</b>.</p><p><span class="lbl reg">Regla</span> Si veo signo PRECOZ de compartimental, marco <b>dolor a la extensión pasiva</b>.</p>'},
{q:'Quemadura química por ÓXALATO: ¿qué está contraindicado?',opts:['Irrigar con agua','Aplicar gluconato de calcio','Cubrir la herida','Desbridar'],c:0,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El óxalato es la excepción del banco: NO se lava con agua (reacciona). En la mayoría de químicas SÍ se irriga con agua abundante.</p><p><span class="lbl reg">Regla</span> Si veo óxalato, marco <b>NO agua</b>; otras químicas, <b>sí agua</b>.</p>'},
{q:'La zona MÁS interna del daño térmico (Jackson), irrecuperable, es:',opts:['Hiperemia','Estasis','Coagulación','Necrosis húmeda'],c:2,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Centro = coagulación (muerta); medio = estasis (salvable); periferia = hiperemia. Una buena reanimación rescata la ESTASIS.</p><p><span class="lbl reg">Regla</span> Si veo zona central, marco <b>coagulación</b>; intermedia salvable, <b>estasis</b>.</p>'},
{q:'Complicación intraabdominal de una reanimación hídrica EXCESIVA del quemado:',opts:['Insuficiencia renal','Síndrome compartimental intraabdominal','Alcalosis','Hipernatremia'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Sobre-reanimar (over-resuscitation / "fluid creep") edematiza el abdomen → síndrome compartimental abdominal. Por eso la diuresis guía: ni poco ni demasiado.</p><p><span class="lbl reg">Regla</span> Si veo exceso de líquidos en quemado, marco <b>compartimental abdominal</b>.</p>'},
{q:'Indicación de referir a centro de quemados por quemadura de MANO:',opts:['Solo si es >50% SCT','Quemadura de 2.° y 3.er grado de la mano (área especial)','Solo si hay fractura','Nunca se refiere'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Manos, cara, pies, genitales y pliegues son ÁREAS ESPECIALES: se refieren siempre por riesgo funcional/contractura.</p><p><span class="lbl reg">Regla</span> Si veo quemadura de mano 2.°-3.er grado, marco <b>referir a centro de quemados</b>.</p>'}
]},

/* ============ CASO 22 — CICATRIZACIÓN · MANEJO DE HERIDAS / CIERRE ============ */
{
id:'heridas', tema:'Cicatrización · Heridas y cierre', temaKey:'cicatrizacion', prio:'MUY ALTA', pe:5, fc:'cicatrizacion',
resp:'Terapia de presión negativa (VAC)',
alias:['terapia de presion negativa','vac','sistema vac','presion negativa','terapia vac'],
vineta:'Femenina de 55 años, post-bypass coronario, con <b>dehiscencia esternal</b> progresiva. La herida está sucia pero <b>no hay exposición de vísceras torácicas</b>. ¿Cuál es la mejor conducta tras desbridar hasta tejido viable?',
pistas:[
'Primero hay que limpiar: desbridar hasta encontrar tejido sano.',
'Se busca preparar el lecho (granulación) antes de cubrir definitivo.',
'El sistema aplica succión controlada sobre la herida.',
'Acelera la granulación y reduce el edema/exudado.',
'Solo si NO hay exposición de vísceras (si las hubiera, cobertura inmediata).'],
opciones:['Terapia de presión negativa (VAC)','Colgajo inmediato','Injerto inmediato','Cerrar con gasas furacinadas y esperar'],
rev:'<p><span class="lbl why">Por qué</span> Herida sucia pero sin vísceras expuestas → desbrido y pongo VAC para preparar el lecho; luego cobertura (p. ej. colgajo de pectoral). <b>[P.E. ×2]</b></p><p><span class="lbl dis">Distractores</span> Colgajo/injerto YA, sin lecho preparado, fracasan; las gasas con furacín solo no resuelven una dehiscencia profunda.</p><p><span class="lbl mne">Mnemotecnia</span> <b>VAC = "aspira y granula"</b>.</p><p><span class="lbl ana">Analogía</span> Antes de pintar la pared (cobertura), lijas y limpias (desbridar + VAC).</p><p><span class="lbl key">Dato que distingue</span> Sin vísceras expuestas → desbridar + VAC; CON vísceras expuestas → cobertura inmediata.</p>',
anki:'cicatrizacion::manejo-heridas',
subs:[
{q:'Una herida injertada/cerrada activamente DESPUÉS de prepararla días después se llama cierre por:',opts:['Primera intención','Segunda intención','Tercera intención (primario diferido)','Cuarta intención'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Se dejó abierta, se preparó y luego se cerró/injertó = tercera intención (cierre primario diferido).</p><p><span class="lbl mne">Mnemotecnia</span> <b>1.ª=ya · 2.ª=sola · 3.ª=después</b>.</p><p><span class="lbl reg">Regla</span> Si veo "se preparó y luego se cerró", marco <b>tercera intención</b>.</p>'},
{q:'Una herida se considera CONTAMINADA después de:',opts:['1 hora','3–6 horas','12 horas','24 horas'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Tras ~6 h la carga bacteriana cambia el manejo (no cierre primario directo). La cavidad ORAL se considera contaminada de entrada.</p><p><span class="lbl reg">Regla</span> Si veo herida contaminada, marco <b>3–6 h</b>.</p>'},
{q:'Orden de las fases de la cicatrización:',opts:['Inflamatoria → proliferativa → remodelación','Proliferativa → inflamatoria → remodelación','Remodelación → inflamatoria → proliferativa','Hemostasia → remodelación → proliferativa'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Hemostasia (vasoconstricción, primera respuesta) → inflamatoria (limpia, 0–4 d) → proliferativa (fibroblastos/colágeno, 4–21 d) → remodelación (semanas-años).</p><p><span class="lbl reg">Regla</span> Si veo orden de fases, marco <b>inflamatoria → proliferativa → remodelación</b>.</p>'},
{q:'Célula predominante de la fase PROLIFERATIVA:',opts:['Neutrófilo','Fibroblasto (y células endoteliales)','Macrófago','Mastocito'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Fibroblastos fabrican colágeno + endotelio hace angiogénesis. El crecimiento de matriz de colágeno ocurre aquí.</p><p><span class="lbl reg">Regla</span> Si veo fase proliferativa, marco <b>fibroblasto</b>.</p>'},
{q:'Primera respuesta vascular ante la lesión:',opts:['Vasodilatación','Vasoconstricción','Trombosis','Angiogénesis'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Vasoconstricción inmediata (hemostasia) y luego vasodilatación inflamatoria. El banco lo preguntó directo.</p><p><span class="lbl reg">Regla</span> Si veo primera respuesta vascular, marco <b>vasoconstricción</b>.</p>'},
{q:'Factor que más influye en que una cicatriz quede estética:',opts:['El color del hilo','Afrontar los bordes SIN tensión','Usar antibiótico','Retirar puntos tarde'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La tensión es enemiga de la cicatriz: bordes afrontados sin tensión = mejor resultado. La tensión también favorece queloide/hipertrófica.</p><p><span class="lbl reg">Regla</span> Si veo estética de la herida, marco <b>sin tensión</b>.</p>'},
{q:'Vitamina cuya carencia altera la síntesis de colágeno:',opts:['Vitamina A','Vitamina C','Vitamina K','Vitamina E'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Sin vitamina C no se hidroxilan prolina/lisina (escorbuto) → colágeno débil.</p><p><span class="lbl reg">Regla</span> Si veo cicatrización y vitamina, marco <b>C</b>.</p>'},
{q:'Herida con tejido necrótico y restos de tierra: conducta inicial básica:',opts:['Cerrar de primera intención','Desbridar/limpiar antes de cualquier cobertura','Injertar de inmediato','Solo antibiótico'],c:1,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Tejido desvitalizado y suciedad = fuente de infección: desbridar y limpiar primero. Manejo de herida profunda: explorar, limpiar, cerrar por planos.</p><p><span class="lbl reg">Regla</span> Si veo herida sucia/necrótica, marco <b>desbridar primero</b>.</p>'}
]},

/* ============ CASO 23 — RECONSTRUCCIÓN DE CARA · ESCALERA RECONSTRUCTIVA ============ */
{
id:'reconcara', tema:'Reconstrucción de cara', temaKey:'injertos', prio:'ALTA', pe:4, fc:'injertos-colgajos',
resp:'Escalera reconstructiva',
alias:['escalera reconstructiva','principio de la escalera reconstructiva','escalera de reconstruccion'],
vineta:'Tras resecar un tumor en la mejilla queda un defecto. Debes decidir cómo cubrirlo: ¿qué <b>principio</b> guía la elección entre cierre directo, injerto o colgajo, de lo más simple a lo más complejo?',
pistas:[
'Es un algoritmo de "peldaños": de lo simple a lo complejo.',
'Subes un escalón solo si el anterior no alcanza para cubrir bien.',
'Empieza por el cierre directo y termina en el colgajo libre.',
'Respeta las unidades estéticas de la cara.',
'El objetivo: cubrir con el mínimo costo funcional y mejor estética.'],
opciones:['Escalera reconstructiva','Regla de los 9','Clasificación de Le Fort','Fórmula de Parkland'],
rev:'<p><span class="lbl why">Por qué</span> La escalera reconstructiva ordena las opciones de menor a mayor complejidad: cierre directo → injerto → colgajo local → colgajo a distancia/libre. Subo de peldaño solo cuando el anterior no basta. <b>[P.E. — bases de la reconstrucción]</b></p><p><span class="lbl dis">Distractores</span> Regla de los 9 (SCQ), Le Fort (fracturas) y Parkland (líquidos) son de otros temas.</p><p><span class="lbl mne">Mnemotecnia</span> <b>"Cierro, Injerto, Colgajo": de abajo hacia arriba la escalera"</b>.</p><p><span class="lbl ana">Analogía</span> No usas grúa (colgajo libre) para subir un escalón que puedes con la mano (cierre directo).</p><p><span class="lbl key">Dato que distingue</span> Lecho vascularizado y defecto pequeño → injerto; hueso/cartílago expuesto o defecto complejo → colgajo.</p>',
anki:'injertos::escalera-reconstructiva',
subs:[
{q:'Defecto nasal con CARTÍLAGO expuesto: ¿injerto o colgajo?',opts:['Injerto de espesor parcial','Colgajo (local o frontal)','Cierre por segunda intención','Injerto de espesor total'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> El cartílago/hueso sin pericondrio no nutre un injerto → necesita colgajo (vascularidad propia). Sin cartílago expuesto, un injerto de espesor total basta.</p><p><span class="lbl reg">Regla</span> Si veo estructura noble expuesta, marco <b>colgajo</b>.</p>'},
{q:'Defecto del dorso nasal SIN exposición de cartílago en paciente frágil: mejor opción:',opts:['Colgajo libre','Injerto de espesor TOTAL (mejor color, menos contracción)','Injerto de espesor parcial','Segunda intención'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> En cara, el injerto de espesor total da mejor color y se contrae menos; ideal si el lecho nutre y la paciente no tolera cirugía mayor.</p><p><span class="lbl reg">Regla</span> Si veo defecto facial superficial en paciente de riesgo, marco <b>injerto de espesor total</b>.</p>'},
{q:'El colgajo frontal (paramediano) para nariz se basa en la arteria:',opts:['Facial','Supratroclear (y supraorbitaria)','Angular','Temporal media'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Vive de la supratroclear (rama de la oftálmica → carótida interna). Es el colgajo clásico para nariz desde Sushruta.</p><p><span class="lbl reg">Regla</span> Si veo colgajo frontal para nariz, marco <b>supratroclear/supraorbitaria</b>.</p>'},
{q:'Según su MOVIMIENTO, un colgajo que gira sobre su base hacia el defecto es de:',opts:['Avance','Rotación','Transposición','Interpolación'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Rotación = pivota sobre su base. Avance = se desliza recto (V-Y). Transposición = salta sobre piel sana (Limberg, Z). Interpolación = pasa por encima de un puente (frontal).</p><p><span class="lbl reg">Regla</span> Si veo "gira sobre su base", marco <b>rotación</b>.</p>'},
{q:'Colgajo más utilizado para reconstruir la MANDÍBULA:',opts:['Dorsal ancho','Peroné (fíbula)','Recto del abdomen','Pectoral'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El colgajo libre de peroné aporta hueso vascularizado largo: ideal para reconstruir mandíbula.</p><p><span class="lbl reg">Regla</span> Si veo reconstrucción mandibular, marco <b>peroné</b>.</p>'},
{q:'La irrigación de la cara proviene de:',opts:['Solo carótida externa','Ramas de la carótida EXTERNA e INTERNA','Solo carótida interna','Arterias vertebrales'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Externa (facial, temporal superficial, maxilar) + interna (oftálmica → supratroclear/supraorbitaria). Por eso el colgajo frontal vive de la interna.</p><p><span class="lbl reg">Regla</span> Si veo irrigación facial, marco <b>ambas carótidas</b>.</p>'},
{q:'Reconstrucción de un defecto que respeta los límites cosméticos de la cara usa el concepto de:',opts:['Unidades (subunidades) estéticas','Líneas de Langer únicamente','Triángulo de Burow','Regla de los tercios faciales'],c:0,pe:1,
fb:'<p><span class="lbl why">Por qué</span> Reconstruir por SUBUNIDADES estéticas (frente, nariz, mejilla, labio...) esconde cicatrices en los límites naturales y mejora el resultado.</p><p><span class="lbl reg">Regla</span> Si veo "respetar límites cosméticos", marco <b>unidades estéticas</b>.</p>'}
]},

/* ============ CASO 24 — ONCO PIEL · MELANOMA ============ */
{
id:'melanoma', tema:'Onco piel · Melanoma', temaKey:'oncopiel', prio:'ALTA', pe:3,
resp:'Melanoma',
alias:['melanoma','melanoma maligno','melanoma cutaneo'],
vineta:'Lesión <b>pigmentada</b> en la espalda que en meses cambió: ahora es asimétrica, de <b>bordes irregulares</b>, con <b>varios colores</b> y mide más de 7 mm. Sangra ocasionalmente.',
pistas:[
'Es PIGMENTADA y cambió con el tiempo (evolución).',
'Hay asimetría, bordes irregulares y policromía.',
'Se evalúa con una regla de letras (A-B-C-D-E).',
'El pronóstico depende del ESPESOR de la lesión.',
'Es el cáncer de piel que más metastatiza.'],
opciones:['Melanoma','Carcinoma basocelular','Carcinoma espinocelular','Queratosis seborreica'],
rev:'<p><span class="lbl why">Por qué</span> Lesión pigmentada + ABCDE (asimetría, bordes irregulares, color múltiple, diámetro >6 mm, evolución) = melanoma. Mayo 2026 lo describió como "bordes irregulares, colores múltiples". <b>[P.E. ×3]</b></p><p><span class="lbl dis">Distractores</span> Basocelular = perlado, lento, casi nunca metastatiza. Espinocelular = ulcerado sobre queratosis/úlcera crónica. Queratosis seborreica = benigna, "pegada como cera".</p><p><span class="lbl mne">Mnemotecnia</span> <b>ABCDE: Asimetría, Bordes, Color, Diámetro, Evolución</b>.</p><p><span class="lbl ana">Analogía</span> El melanoma es el ladrón que sí toma carretera (metástasis); el baso se queda en el barrio.</p><p><span class="lbl key">Dato que distingue</span> Pigmentada + cambiante + ABCDE = melanoma. Su pronóstico lo manda el ESPESOR (Breslow).</p>',
anki:'oncopiel::melanoma',
subs:[
{q:'Los criterios clínicos del melanoma se resumen en:',opts:['Regla de los 9','ABCDE','Clasificación de Gleason','Escala de Glasgow'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> ABCDE: Asimetría, Bordes irregulares, Color múltiple, Diámetro >6 mm, Evolución. Gleason es de próstata.</p><p><span class="lbl reg">Regla</span> Si veo lesión pigmentada sospechosa, marco <b>ABCDE</b>.</p>'},
{q:'🔎 El factor pronóstico MÁS importante del melanoma es:',opts:['El diámetro en superficie','El espesor de la lesión (índice de Breslow)','El color','La localización'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> Breslow (mm de profundidad) es el pronóstico clave y guía los márgenes quirúrgicos; Clark mide por niveles dérmicos.</p><p><span class="lbl dis">🔎 VERIFICAR</span> Breslow/Clark son estándar pero no aparecen explícitos en tu banco — confírmalo con tu material de clase.</p>'},
{q:'Lesión de crecimiento LENTO, perlada, con telangiectasias, que casi nunca da metástasis:',opts:['Melanoma','Carcinoma basocelular','Carcinoma espinocelular','Queratoacantoma'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Basocelular = el más FRECUENTE, perlado, años de evolución, local. El banco: lesión de 8 años, no fija = basocelular.</p><p><span class="lbl reg">Regla</span> Si veo lesión perlada de años, marco <b>basocelular</b>.</p>'},
{q:'Lesión ulcerada de crecimiento RÁPIDO sobre una queratosis actínica o úlcera crónica:',opts:['Basocelular','Espinocelular (epidermoide)','Melanoma','Nevo'],c:1,pe:4,
fb:'<p><span class="lbl why">Por qué</span> Espinocelular nace de precursores (queratosis actínica, úlcera de Marjolin, arsénico, radioterapia) y puede dar metástasis ganglionares. La úlcera crónica tiende a malignizar a epidermoide.</p><p><span class="lbl reg">Regla</span> Si veo rápido + ulcerado + sobre lesión previa, marco <b>espinocelular</b>.</p>'},
{q:'Mejor método quirúrgico para resecar un cáncer de piel facial con control de márgenes:',opts:['Electrodesecación','Cirugía de Mohs','Curetaje','Crioterapia'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Mohs mapea cada margen al microscopio en el momento: máximo control, mínimo tejido sano sacrificado (ideal en cara).</p><p><span class="lbl reg">Regla</span> Si veo CA de piel facial + mejor técnica, marco <b>Mohs</b>.</p>'},
{q:'Abordaje diagnóstico inicial de una lesión pigmentada sospechosa de melanoma:',opts:['Biopsia incisional pequeña de una esquina','Biopsia EXCISIONAL (extirpar toda la lesión con margen)','Solo observación','Crioterapia empírica'],c:1,pe:1,ver:true,
fb:'<p><span class="lbl why">Por qué</span> En melanoma se prefiere biopsia EXCISIONAL (toda la lesión) para medir bien el Breslow; la incisional puede subestimar el espesor. (En espinocelular grande el banco aceptó incisional con margen sano.)</p><p><span class="lbl dis">🔎 VERIFICAR</span> Tu banco favorece "biopsia incisional con margen" para CA de piel en general; para MELANOMA el estándar es excisional. Confirma cómo lo enseña tu profe.</p><p><span class="lbl reg">Regla</span> Si veo melanoma, marco <b>biopsia excisional</b>.</p>'}
]},

/* ============ CASO 25 — CRANEOFACIAL · ORTODONCIA / ORTOGNÁTICA ============ */
{
id:'ortognatica', tema:'Ortodoncia · Ortognática', temaKey:'craneofacial', prio:'MEDIA', pe:2,
resp:'Cirugía ortognática',
alias:['cirugia ortognatica','ortognatica','cirugia ortognatica bimaxilar','tratamiento ortognatico'],
vineta:'Adulto joven con <b>maloclusión severa</b> esquelética (clase III, mentón prominente) que no se corrige solo con brackets. El plan combina ortodoncia con cirugía de los maxilares.',
pistas:[
'El problema es ÓSEO (esquelético), no solo de los dientes.',
'La ortodoncia sola no alcanza: hay que mover los huesos maxilares.',
'Se planea en tres tiempos: ortodoncia pre-quirúrgica, cirugía y ortodoncia final.',
'Corrige la oclusión y el perfil facial.',
'Es el puente entre la ortodoncia y la cirugía plástica facial.'],
opciones:['Cirugía ortognática','Distracción osteogénica','Solo ortodoncia con brackets','Mentoplastia aislada'],
rev:'<p><span class="lbl why">Por qué</span> Maloclusión ESQUELÉTICA que los brackets solos no corrigen → cirugía ortognática: se reposicionan los maxilares (osteotomías) junto a ortodoncia. <b>[P.E. — rol de la ortodoncia]</b></p><p><span class="lbl dis">Distractores</span> La distracción osteogénica alarga hueso hipoplásico gradualmente (microsomía/Pierre Robin), no reposiciona una oclusión adulta. Brackets solos = problema dental leve. Mentoplastia solo retoca el mentón.</p><p><span class="lbl mne">Mnemotecnia</span> <b>ORTO-GNÁTICA = enderezar la mandíbula (gnathos)</b>.</p><p><span class="lbl key">Dato que distingue</span> Maloclusión dental → ortodoncia; maloclusión esquelética → ortognática; hueso corto en niño → distracción.</p>',
anki:'craneofacial::ortognatica',
subs:[
{q:'La distracción osteogénica mandibular (DOM) consta de las etapas:',opts:['Latencia → distracción → consolidación','Activación → reposo → cierre','Incisión → injerto → sutura','Solo distracción'],c:0,pe:3,
fb:'<p><span class="lbl why">Por qué</span> 3 etapas: LATENCIA (esperar callo) → DISTRACCIÓN/activación (1 mm/día) → CONSOLIDACIÓN (distractores 2–4 meses).</p><p><span class="lbl mne">Mnemotecnia</span> <b>LA-DI-CO</b>.</p><p><span class="lbl reg">Regla</span> Si veo etapas de DOM, marco <b>latencia → distracción → consolidación</b>.</p>'},
{q:'El intervalo entre la corticotomía y el inicio de la distracción se llama:',opts:['Consolidación','Latencia','Activación','Retención'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Latencia = esperar el callo blando antes de empezar a separar. La etapa donde se dejan los distractores 2–4 meses hasta la simetría es la consolidación.</p><p><span class="lbl reg">Regla</span> Si veo "antes de distraer", marco <b>latencia</b>.</p>'},
{q:'La distracción osteogénica "superaguda" se refiere a:',opts:['1 mm','5 mm','10 mm','0.5 mm'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Superaguda = 5 mm (ritmo acelerado). Cayó varias veces y volvió en Mayo 2026.</p><p><span class="lbl reg">Regla</span> Si veo DOM superaguda, marco <b>5 mm</b>.</p>'},
{q:'Edad recomendada para iniciar la DOM en hipoplasia mandibular:',opts:['Recién nacido','4–6 años','12 años','Adultez'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El banco la fija en 4–6 años (también aceptó "4 años").</p><p><span class="lbl reg">Regla</span> Si veo edad de DOM, marco <b>4–6 años</b>.</p>'},
{q:'Diagnóstico del niño con asimetría facial, maloclusión e hipoplasia de mandíbula/mejilla unilateral:',opts:['Síndrome de Crouzon','Microsomía hemifacial','Treacher Collins','Secuencia de Pierre Robin'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Microsomía hemifacial = 2.ª anomalía craneofacial más frecuente, afecta hueso Y tejidos blandos de UN lado. Se trata con DOM.</p><p><span class="lbl reg">Regla</span> Si veo asimetría facial unilateral en niño, marco <b>microsomía hemifacial</b>.</p>'},
{q:'Edad promedio para realizar una faringoplastia (insuficiencia velofaríngea):',opts:['3 meses','3–5 años','10 años','Adultez'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Se evalúa el habla primero: 3–5 años (el banco también aceptó "4 años"). El músculo clave del cierre velofaríngeo es el elevador del velo.</p><p><span class="lbl reg">Regla</span> Si veo faringoplastia, marco <b>3–5 años</b>.</p>'}
]},

/* ============ CASO 26 — MAMA · IMPLANTES Y AUMENTO ============ */
{
id:'implantes', tema:'Mama · Implantes', temaKey:'mama', prio:'ALTA', pe:3,
resp:'Contractura capsular',
alias:['contractura capsular','contractura periprotesica','capsula periprotesica','contractura de la capsula'],
vineta:'Paciente con prótesis mamarias de hace años que nota una mama <b>endurecida, elevada y dolorosa</b>, con cambio de forma. ¿Cuál es la complicación más frecuente de los implantes que explica el cuadro?',
pistas:[
'Es la complicación MÁS frecuente del implante mamario.',
'El cuerpo forma una cápsula fibrosa que se contrae alrededor de la prótesis.',
'La mama se siente dura, sube y duele (escala de Baker).',
'El implante LISO se asocia más a esta complicación.',
'No es ruptura ni infección: es fibrosis perica psular.'],
opciones:['Contractura capsular','Ruptura del implante','Infección periprotésica','Linfoma anaplásico (BIA-ALCL)'],
rev:'<p><span class="lbl why">Por qué</span> Mama dura, elevada y dolorosa con prótesis antigua = contractura capsular: la cápsula fibrosa se contrae y comprime el implante. Es la complicación #1. <b>[P.E. ×3]</b></p><p><span class="lbl dis">Distractores</span> Ruptura = cambio de forma/silicón libre pero no necesariamente dureza. Infección = aguda, roja, febril. BIA-ALCL = seroma tardío asociado a implantes MACROtexturizados.</p><p><span class="lbl mne">Mnemotecnia</span> <b>CÁPSULA que se contrae = CONTRACTURA</b>.</p><p><span class="lbl key">Dato que distingue</span> Implante LISO → más contractura; implante MACROtexturizado → más linfoma; POLIURETANO → mayor fijación.</p>',
anki:'mama::contractura-capsular',
subs:[
{q:'El tipo de implante asociado a mayor riesgo de LINFOMA (BIA-ALCL) es:',opts:['Liso','Macrotexturizado','De solución salina','Subglandular'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El macrotexturizado se asocia al linfoma anaplásico de células grandes asociado a implante (seroma tardío). El liso, en cambio, a la contractura.</p><p><span class="lbl reg">Regla</span> Si veo implante + linfoma, marco <b>macrotexturizado</b>.</p>'},
{q:'La superficie de implante con MAYOR fijación a los tejidos es:',opts:['Lisa','Poliuretano','Salina','Subpectoral'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El poliuretano se "ancla" al tejido y reduce el desplazamiento/contractura, a costa de mayor dificultad de retiro.</p><p><span class="lbl reg">Regla</span> Si veo mayor fijación, marco <b>poliuretano</b>.</p>'},
{q:'Vía de colocación de implantes de silicón que NO se usa (era para salinos en desuso):',opts:['Submamaria','Periareolar','Transaxilar','Transumbilical'],c:3,pe:2,
fb:'<p><span class="lbl why">Por qué</span> La transumbilical (TUBA) solo servía para implantes salinos (ya en desuso). Para mastopexia el abordaje que NO se usa es el axilar.</p><p><span class="lbl reg">Regla</span> Si veo vía de silicón "excepto", marco <b>transumbilical</b>.</p>'},
{q:'Reconstrucción mamaria en paciente DELGADA, sin tejido abdominal, tras radioterapia:',opts:['DIEP','TRAM','Colgajo dorsal ancho + expansor/implante','Solo implante'],c:2,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Sin abdomen disponible se descartan DIEP y TRAM → dorsal ancho (arteria toracodorsal) con expansor/implante. La radioterapia previa pide tejido autólogo, no implante solo.</p><p><span class="lbl reg">Regla</span> Si veo paciente delgada radiada, marco <b>dorsal ancho + implante</b>.</p>'},
{q:'El colgajo DIEP se basa en:',opts:['Arteria toracodorsal','Perforantes de la epigástrica inferior profunda','Epigástrica superior','Mamaria interna'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> DIEP = Deep Inferior Epigastric Perforator: lleva piel y grasa SIN sacrificar el músculo recto (a diferencia del TRAM).</p><p><span class="lbl reg">Regla</span> Si veo DIEP, marco <b>perforantes de la epigástrica inferior profunda</b>.</p>'},
{q:'Reconstrucción del complejo areola-pezón:',opts:['No se reconstruye','Injerto del pezón contralateral (o colgajos locales + tatuaje)','Siempre con prótesis','Trasplante desde el abdomen'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Se reconstruye compartiendo el pezón contralateral (injerto) y/o con colgajos locales + tatuaje de la areola.</p><p><span class="lbl reg">Regla</span> Si veo areola-pezón, marco <b>injerto contralateral</b>.</p>'}
]},

alias:['colgajo libre','transferencia microquirurgica','colgajo libre microquirurgico','microcirugia con colgajo libre'],
vineta:'Defecto extenso de una extremidad con hueso expuesto, sin tejido local suficiente. Se planea trasladar tejido de otra región del cuerpo y <b>reconectar su arteria y vena</b> bajo microscopio.',

'Requiere anastomosis vascular bajo magnificación (microscopio).',
'Es el peldaño más alto de la escalera reconstructiva.',
'El padre de la microcirugía describió las primeras anastomosis vasculares.',
'Lleva su propio pedículo: arteria y vena.'],
opciones:['Colgajo libre (transferencia microquirúrgica)','Injerto de espesor total','Colgajo local de avance','Cierre por segunda intención'],
rev:'<p><span class="lbl why">Por qué</span> Defecto grande sin tejido local + hueso expuesto = colgajo libre: traslado tejido a distancia y reconecto arteria/vena con microcirugía. Es el escalón más alto de la escalera. <b>[P.E. — microcirugía]</b></p><p><span class="lbl dis">Distractores</span> Injerto necesita lecho vascular (hueso pelado no sirve); avance local no alcanza para defecto extenso; segunda intención dejaría hueso expuesto.</p><p><span class="lbl mne">Mnemotecnia</span> <b>LIBRE = se libera y viaja con su tubería</b>.</p><p><span class="lbl ana">Analogía</span> Mudas una casa entera con todo y su toma de agua, y la conectas a la red del barrio nuevo.</p><p><span class="lbl key">Dato que distingue</span> Colgajo libre = anastomosis microquirúrgica; colgajo pediculado = sigue unido a su pedículo original.</p>',
anki:'injertos::colgajo-libre',
subs:[
{q:'Considerado el PADRE de la microcirugía (primeras anastomosis vasculares):',opts:['Sushruta','Alexis Carrel','Joseph Murray','Harold Gillies'],c:1,pe:3,
fb:'<p><span class="lbl why">Por qué</span> Alexis Carrel describió la técnica de anastomosis vascular (Nobel). El banco lo repite.</p><p><span class="lbl reg">Regla</span> Si veo padre de la microcirugía, marco <b>Carrel</b>.</p>'},
{q:'Animales más usados para practicar microcirugía:',opts:['Conejos','Ratas','Cerdos','Perros'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Las ratas (vasos femorales/carotídeos finos) son el modelo estándar de entrenamiento.</p><p><span class="lbl reg">Regla</span> Si veo práctica de microcirugía, marco <b>ratas</b>.</p>'},
{q:'Fármaco/coloide usado en el postoperatorio para evitar coágulos/agregación:',opts:['Heparina oral','Dextrán','Vitamina K','Protamina'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El Dextrán disminuye viscosidad y agregación plaquetaria, aumentando el tiempo de sangrado (protege la anastomosis).</p><p><span class="lbl reg">Regla</span> Si veo antiagregante post-microcirugía, marco <b>Dextrán</b>.</p>'},
{q:'Lo que IMPIDE una microcirugía/anastomosis adecuada:',opts:['Buen flujo','Hematoma','Tejido sano','Vasos amplios'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> El hematoma comprime y trombosa la anastomosis: es el enemigo (igual que en injertos).</p><p><span class="lbl reg">Regla</span> Si veo qué arruina la anastomosis, marco <b>hematoma</b>.</p>'},
{q:'Hilo ideal para una anastomosis VASCULAR:',opts:['Multifilamento absorbible','Monofilamento no absorbible con aguja ahusada (punta roma)','Catgut con aguja cortante','Seda trenzada'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> Monofilamento no absorbible (prolene) con aguja ahusada/roma: no desgarra el vaso ni deja superficie trombogénica.</p><p><span class="lbl reg">Regla</span> Si veo sutura vascular, marco <b>monofilamento no absorbible</b>.</p>'},
{q:'Tiempo que tarda un colgajo en formar circulación propia con el lecho (autonomía / delay):',opts:['3–5 días','18–21 días','48 horas','3 meses'],c:1,pe:2,
fb:'<p><span class="lbl why">Por qué</span> ~18–21 días para que el colgajo desarrolle neovascularización con el lecho; el fenómeno de delay también ronda los 21 días.</p><p><span class="lbl reg">Regla</span> Si veo autonomía del colgajo / delay, marco <b>~21 días</b>.</p>'}
]},

{q:'Mujer con piel abdominal colgante que rebasa la cicatriz de cesárea + diástasis. Tratamiento:',opts:['Liposucción sola','Abdominoplastía (+ malla si hay debilidad de pared)','Solo dieta','Mastopexia'],c:1,pe:2,

let S = load();
function load(){
  try{ const raw = localStorage.getItem('plastidle_v2'); if(raw) return JSON.parse(raw); }catch(e){}
  return {cases:{}, streak:0, best:0, fTema:'todos', fPrio:'Todas'};
}
function save(){ try{ localStorage.setItem('plastidle_v2', JSON.stringify(S)); }catch(e){} }

function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('Copiado ✓')).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta = document.createElement('textarea'); ta.value = txt;
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('Copiado ✓'); }catch(e){ toast('No se pudo copiar'); }
  document.body.removeChild(ta);
}
function peBadge(n){ return n>0 ? '<span class="pill pe">P.E.'+(n>1?' ×'+n:'')+'</span>' : ''; }
function verBadge(v){ return v ? '<span class="pill ver">🔎 verificar</span>' : ''; }
function lagBadge(l){ return l ? '<span class="pill warn">⚠️ laguna</span>' : ''; }
function prioClass(p){ return p==='MUY ALTA'?'prio-muyalta':(p==='ALTA'?'prio-alta':'prio-media'); }

/* ================= FX: confeti, racha, count-up ================= */
const REDUCED = (typeof matchMedia==='function') && matchMedia('(prefers-reduced-motion: reduce)').matches;
const HAS_RAF = (typeof requestAnimationFrame==='function');
function confetti(opts){
  try{
    if(REDUCED || !HAS_RAF) return;
    opts = opts || {};
    const cv = document.createElement('canvas');
    cv.className = 'confetti-cv';
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    const ctx = cv.getContext ? cv.getContext('2d') : null;
    if(!ctx) return;
    document.body.appendChild(cv);
    const colors = ['#2E6BFF','#8B5CF6','#4F8DFF','#F0C4A8','#7BE8A6','#FFFFFF'];
    const N = opts.n || 120;
    const cx = (opts.x!=null) ? opts.x : cv.width/2;
    const cy = (opts.y!=null) ? opts.y : cv.height*0.28;
    const spread = opts.spread || Math.PI*0.9;
    const parts = [];
    for(let i=0;i<N;i++){
      const a = -Math.PI/2 + (Math.random()-.5)*spread;
      const v = (opts.v||9)*(.45+Math.random());
      parts.push({x:cx, y:cy, vx:Math.cos(a)*v, vy:Math.sin(a)*v,
        g:.16+Math.random()*.14, s:4+Math.random()*5,
        c:colors[i%colors.length], r:Math.random()*Math.PI,
        vr:(Math.random()-.5)*.3, life:60+Math.random()*45});
    }
    let frames = 0;
    (function tick(){
      frames++;
      ctx.clearRect(0,0,cv.width,cv.height);
      let alive = 0;
      for(const p of parts){
        if(p.life<=0) continue;
        alive++;
        p.life--; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life/28));
        ctx.translate(p.x,p.y); ctx.rotate(p.r);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.62);
        ctx.restore();
      }
      if(alive>0 && frames<240) requestAnimationFrame(tick);
      else if(cv.parentNode) cv.parentNode.removeChild(cv);
    })();
  }catch(e){}
}
function burstAt(el, n){
  try{
    if(!el || !el.getBoundingClientRect) return;
    const r = el.getBoundingClientRect();
    confetti({n:n||26, x:r.left+r.width/2, y:r.top+r.height/2, spread:Math.PI*2, v:5.5});
  }catch(e){}
}
function streakFx(up){

  if(up){
    el.innerHTML = '<span class="fl">🔥</span> racha: <b>'+S.streak+'</b>';

function countUp(el, target, total){
  if(REDUCED || !HAS_RAF){ el.textContent = target+'/'+total; return; }
  const t0 = Date.now(), dur = 850;
  (function step(){
    const p = Math.min(1, (Date.now()-t0)/dur);
    const e = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(target*e)+'/'+total;
    if(p<1) requestAnimationFrame(step);
  })();
}
function scoreMsg(got, total){
  const pct = total ? got/total : 0;
  if(pct>=1)   return 'Nivel: adscrita 🏆 Mañana las notas las firmas tú.';
  if(pct>=.8)  return 'Casi quirúrgico. El R5 ya te tiene envidia 😎';
  if(pct>=.6)  return 'Aprobada… pero el banco te vio dudar 👀';
  if(pct>=.4)  return 'Media tabla. Otra vuelta y lo bordas 💪';
  return 'El banco te espera otra vuelta 😤';
}

function mapPick(k){
  openBank(k); return;
  S.fTema = k; save();
  home();

}

function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function materialRow(c){
  let r = '<div class="matrow">';
  if(c.fc && FCDATA[c.fc]){
    r += '<button class="matbtn fc" id="fcbtn" onclick="toggleMaterial(\'fc\',\''+c.fc+'\')">📓 Flashcards · '+FCLABEL[c.fc]+'</button>';
  }
  if(c.fc && NOTESDATA[c.fc]){
    r += '<button class="matbtn nt" id="ntbtn" onclick="toggleMaterial(\'note\',\''+c.fc+'\')">📄 Notas · '+FCLABEL[c.fc]+'</button>';
  }
  r += '<button class="matbtn bank" onclick="openBank(\''+c.temaKey+'\')">📋 Banco del tema · '+(TEMAS[c.temaKey]||'')+'</button>';
  r += '</div><div class="matpanel" id="matpanel"></div>';
  return r;
}
function _openEmbedded(dataUri){
  try{
    const m=/^data:([^;]+);[^,]*base64,(.*)$/.exec(dataUri||'');
    const mime=m?m[1]:'text/html'; const b64=m?m[2]:(dataUri||'');
    const bin=atob(b64); const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:mime}));
    window.open(url,'_blank');
  }catch(e){ toast('No pude abrir el material'); }
}
function openMaterial(fc){ if(typeof FCDATA!=='undefined' && FCDATA[fc]) _openEmbedded(FCDATA[fc]); }
function openNote(fc){ if(typeof NOTESDATA!=='undefined' && NOTESDATA[fc]) _openEmbedded(NOTESDATA[fc]); }

  p.setAttribute('data-fc',fc); p.setAttribute('data-kind',kind);

  const isFc = kind==='fc';
  const icon = isFc?'📓':'📄';

  const openFn = isFc?('openMaterial(\''+fc+'\')'):('openNote(\''+fc+'\')');
  const src = isFc? FCDATA[fc] : NOTESDATA[fc];
  p.innerHTML='<div class="fchead"><span class="fctitle">'+icon+' '+lbl+'</span>'+
    '<span class="fcacts"><button class="fcx" onclick="'+openFn+'" title="Abrir en pestaña">⤢</button>'+
    '<button class="fcx" onclick="toggleMaterial(\''+kind+'\',\''+fc+'\')" title="Cerrar">✕</button></span></div>'+

}

function bankLabel(t){ const g=BANK.find(x=>x.tema===t); return g?g.label:'Todos'; }

function openBank(tema){ BANKFILTER=tema||'todos'; BANKSEARCH=''; renderBank(); }
function setBankFilter(t){ BANKFILTER=t; renderBank(); }
function bankSearch(v){

  const had = document.activeElement && document.activeElement.id==='banksearch';

  if(had){ const el=document.getElementById('banksearch'); if(el){ el.focus(); try{el.setSelectionRange(el.value.length,el.value.length);}catch(e){} } }

function bankItemsHTML(){
  const q = norm(BANKSEARCH);
  let total=0, h='';
  BANK.forEach(g=>{

    let items = g.items;

    if(!items.length) return;

    h += '<div class="banksec"><div class="banksechd"><h2>'+g.label+'</h2><span class="cnt">'+items.length+'</span></div>';
    items.forEach(it=>{

        '<div class="bq">'+it.q+'</div>'+
        '<div class="ba">→ '+it.a+(it.inf?' <span class="pill ver">🔎 inferida</span>':'')+'</div>'+
        '<div class="bsrc">'+((it.pe&&it.pe>1)?'<span class="pill pe">P.E. ×'+it.pe+'</span>':'')+'<span class="srcname">📄 '+it.src+'</span></div>'+
      '</div>';
    });
    h += '</div>';
  });
  if(!total) h='<p class="notice">Sin resultados para “'+escAttr(BANKSEARCH)+'”.</p>';
  return h;
}
function renderBankList(){ const el=document.getElementById('banklist'); if(el) el.innerHTML=bankItemsHTML(); }
function renderBank(){

      (st&&st.done?'<span class="checkmark">✓</span>':'')+

function setTema(k){ S.fTema=k; save(); home(); }
function setPrio(p){ S.fPrio=p; save(); home(); }
function resetAll(){ if(confirm('¿Borrar todo el progreso?')){ S={cases:{},streak:0,best:0,fTema:'todos',fPrio:'Todas'}; save(); home(); } }
function randomCase(){
  const pend = CASES.filter(c=>!(S.cases[c.id]&&S.cases[c.id].done));
  const pool = pend.length? pend : CASES;
  openCase(pool[Math.floor(Math.random()*pool.length)].id);
}

/* ================= ESTADO DE PARTIDA ================= */
let G = null; // {c, attempts, hints, solvedMain, mainFirstTry, usedOptions, subIdx, grid, answeredCur}
function openCase(id){
  const c = CASES.find(x=>x.id===id);
  G = {c, attempts:0, hints:0, solvedMain:false, mainFirstTry:true, usedOptions:false,
       subIdx:0, grid:[], score:0, answeredCur:false, phase:'guess'};
  renderCase();
}

function caseHeader(c){
  return '<span class="backlink" onclick="home()">← Volver</span>'+
  '<div class="casehead"><span class="pill '+prioClass(c.prio)+'">'+c.prio+'</span>'+
  '<span class="pill">'+c.tema+'</span>'+peBadge(c.pe)+verBadge(c.ver)+lagBadge(c.lag)+'</div>';
}

/* ================= FASE 1: ADIVINAR ================= */
function renderCase(){
  const c = G.c;
  let h = caseHeader(c);
  h += '<div class="card"><div class="vineta">'+c.vineta+'</div>';
  for(let i=0;i<G.hints;i++){
    const fresh = (i===G.hints-1);
    h += '<div class="hint'+(fresh?' fresh':'')+'"><span class="lockic">🔓</span><b>Pista '+(i+1)+':</b> '+c.pistas[i]+'</div>';
  }
  h += '</div>';

  if(G.phase==='guess'){
    h += '<div class="card"><b>¿Cuál es el diagnóstico o la conducta principal?</b>'+
    '<div class="guessrow"><input class="guessinput" id="guess" autocomplete="off" placeholder="Escribe tu respuesta…" oninput="suggest()" onkeydown="keyGuess(event)"><div class="suggest" id="sug" style="display:none"></div></div>'+
    '<div class="guessbtns"><button class="bigbtn" onclick="tryGuess()">Probar</button>'+
    '<button class="ghostbtn" onclick="showOptions()">Ver opciones</button></div>'+
    '<div class="attempts" id="att">'+attemptsDots()+'</div>'+
    '<div id="wrongmsg"></div></div>';
  } else if(G.phase==='options'){
    h += '<div class="card"><b>Elige la respuesta principal:</b><div class="optlist" id="mainopts">';
    G.optOrder.forEach((o,i)=>{
      h += '<button class="optbtn" id="mo'+i+'" style="--d:'+(i*0.06).toFixed(2)+'s" onclick="pickMainOption('+i+')">'+o+'</button>';
    });
    h += '</div><div class="attempts">'+attemptsDots()+'</div></div>';
  }
  $app.innerHTML = h;
  window.scrollTo(0,0);
  const g = document.getElementById('guess'); if(g) g.focus();
}
function attemptsDots(){
  let d='Intentos: ';
  for(let i=0;i<5;i++) d += '<span class="dot'+(i<G.attempts?' used':'')+'"></span>';
  return d;
}
function suggest(){
  const inp = document.getElementById('guess');
  const box = document.getElementById('sug');
  const v = norm(inp.value);
  if(v.length<2){ box.style.display='none'; return; }
  const matches = POOL.filter(p=> norm(p).includes(v)).slice(0,8);
  if(!matches.length){ box.style.display='none'; return; }
  box.innerHTML = matches.map(m=>'<div onclick="pickSug(this)">'+m+'</div>').join('');
  box.style.display='block';
}
function pickSug(el){
  document.getElementById('guess').value = el.textContent;
  document.getElementById('sug').style.display='none';
  document.getElementById('guess').focus();
}
function keyGuess(ev){ if(ev.key==='Enter'){ ev.preventDefault(); tryGuess(); } }
function tryGuess(){
  const inp = document.getElementById('guess');
  const v = norm(inp.value);
  if(!v) return;
  const c = G.c;
  const hit = norm(c.resp)===v || c.alias.some(a=> norm(a)===v) ||
              (v.length>=6 && c.alias.some(a=> norm(a).includes(v) || v.includes(norm(a))));
  if(hit){
    if(inp){ inp.classList.remove('shake'); inp.classList.add('glowok'); }
    burstAt(inp, 20);
    setTimeout(solveMain, 420);
    return;
  }
  G.attempts++; G.mainFirstTry=false;
  if(G.hints < Math.min(5, c.pistas.length)) G.hints++;
  if(G.attempts>=5){
    G.phase='options'; prepOptions(); renderCase();
    toast('Sin intentos: elige entre opciones');
    return;
  }
  renderCase();
  const gi = document.getElementById('guess');
  if(gi) gi.classList.add('shake');
  const wm = document.getElementById('wrongmsg');
  if(wm) wm.innerHTML = '<div class="wrongflash">✗ No es eso — nueva pista desbloqueada 🔓</div>';
}
function showOptions(){ G.mainFirstTry=false; G.usedOptions=true; G.phase='options'; prepOptions(); renderCase(); }
function prepOptions(){
  if(!G.optOrder){ G.optOrder = [...G.c.opciones].sort(()=>Math.random()-0.5); }
}
function pickMainOption(i){
  const o = G.optOrder[i];
  if(norm(o)===norm(G.c.resp) || G.c.alias.some(a=>norm(a)===norm(o))){
    document.getElementById('mo'+i).classList.add('ok');
    setTimeout(solveMain, 350);
  } else {
    const b = document.getElementById('mo'+i); b.classList.add('bad'); b.disabled=true;
    G.attempts = Math.min(5, G.attempts+1); G.mainFirstTry=false;
  }
}
function solveMain(){
  G.solvedMain = true;
  G.grid.push(G.mainFirstTry?1:0);
  const prevStreak = S.streak;
  if(G.mainFirstTry){ S.streak++; } else { S.streak=0; }
  if(S.streak>S.best) S.best=S.streak;
  save();
  G.phase='reveal';
  renderReveal();
  confetti({n: G.mainFirstTry?150:70, v: G.mainFirstTry?10:8});
  if(G.mainFirstTry) streakFx(true);
  else if(prevStreak>0) streakFx(false);
}

/* ================= FASE 2: REVELACIÓN ================= */
function renderReveal(){
  const c = G.c;
  let h = caseHeader(c);
  h += '<div class="card"><div class="vineta">'+c.vineta+'</div></div>';
  h += '<div class="card reveal"><h3>'+(G.mainFirstTry?'✓ ':'')+'Respuesta: <span class="grad">'+c.resp+'</span></h3>'+
  '<div class="fb">'+c.rev+'</div>'+
  '<div class="regla">⚡ '+reglaFromRev(c)+'</div>'+
  '<div class="guessbtns" style="margin-top:14px">'+
  '<button class="bigbtn" onclick="startSubs()">Sub-preguntas del tema ('+c.subs.length+') →</button>'+
  '<button class="ghostbtn" onclick="copyText(\''+c.anki+'\')">Copiar tag de Anki</button>'+
  '</div>'+materialRow(c)+'</div>';
  $app.innerHTML = h; window.scrollTo(0,0);
}
function reglaFromRev(c){
  if(c.regla) return c.regla;
  return 'Si veo esta viñeta en el examen, marco <span class="grad">'+c.resp+'</span>.';
}
function startSubs(){ G.phase='subs'; G.subIdx=0; G.answeredCur=false; renderSub(); }

/* ================= FASE 3: SUB-PREGUNTAS ================= */
function renderSub(){
  const c = G.c;
  const i = G.subIdx;
  const s = c.subs[i];
  let h = caseHeader(c);
  h += '<div class="card subcard"><div class="subhead"><b>'+c.resp+'</b><span class="subcount">Sub-pregunta '+(i+1)+' / '+c.subs.length+'</span></div>';
  const answered = G.answeredCur ? i+1 : i;
  h += '<div class="progressbar" style="margin:12px 0 2px"><i id="subbarfill" style="width:'+Math.round(100*answered/c.subs.length)+'%"></i></div>';
  h += '<div class="subprog">';
  c.subs.forEach((x,j)=>{
    let cls='';
    if(j<G.grid.length-1) cls = G.grid[j+1]? ' ok':' bad';
    if(j===i && !G.answeredCur) cls=' cur';
    h += '<i class="'+cls.trim()+'"></i>';
  });
  h += '</div>';
  h += '<div class="meta" style="display:flex;gap:6px;flex-wrap:wrap">'+peBadge(s.pe)+verBadge(s.ver)+lagBadge(s.lag)+'</div>';
  h += '<div class="subq">'+s.q+'</div><div class="optlist" id="subopts">';
  if(!G.subOrder || G.subOrderIdx!==i){
    G.subOrder = s.opts.map((o,k)=>k).sort(()=>Math.random()-0.5);
    G.subOrderIdx = i;
  }
  G.subOrder.forEach((k,pos)=>{
    h += '<button class="optbtn" id="so'+pos+'" style="--d:'+(pos*0.06).toFixed(2)+'s" onclick="pickSub('+pos+','+k+')" '+(G.answeredCur?'disabled':'')+'>'+s.opts[k]+'</button>';
  });
  h += '</div><div id="subfb"></div></div>';
  $app.innerHTML = h; window.scrollTo(0,0);
  if(G.answeredCur) paintSubResult();
}
function pickSub(pos,k){
  if(G.answeredCur) return;
  const s = G.c.subs[G.subIdx];
  const correct = (k===s.c);
  G.answeredCur = true;
  G.lastCorrect = correct;
  G.grid.push(correct?1:0);
  const prevStreak = S.streak;
  if(correct){ G.score++; S.streak++; if(S.streak>S.best) S.best=S.streak; }
  else { S.streak=0; }
  save();
  paintSubResult(pos,k);
  const fill = document.getElementById('subbarfill');
  if(fill) fill.style.width = Math.round(100*(G.subIdx+1)/G.c.subs.length)+'%';
  if(correct){
    burstAt(document.getElementById('so'+pos), 24);
    streakFx(true);
  } else if(prevStreak>0){
    streakFx(false);
  }
}
function paintSubResult(pos,k){
  const s = G.c.subs[G.subIdx];
  G.subOrder.forEach((kk,pp)=>{
    const b = document.getElementById('so'+pp);
    if(!b) return;
    b.disabled = true;
    if(kk===s.c) b.classList.add('ok');
    else if(pp===pos && kk===k) b.classList.add('bad');
  });
  const last = G.subIdx===G.c.subs.length-1;
  const fbDiv = document.getElementById('subfb');
  if(fbDiv) fbDiv.innerHTML =
    '<div class="fb subfbwrap" style="margin-top:14px">'+(G.lastCorrect?'<b style="color:var(--ok)">✓ Correcto</b>':'<b style="color:var(--bad)">✗ La correcta era: '+s.opts[s.c]+'</b>')+
    s.fb+'</div>'+
    '<div class="guessbtns" style="margin-top:12px">'+
    '<button class="bigbtn" onclick="nextSub()">'+(last?'Ver resumen →':'Siguiente →')+'</button>'+
    '<button class="ghostbtn" onclick="copyText(\''+G.c.anki+'\')">Copiar tag de Anki</button></div>'+materialRow(G.c);
}
function nextSub(){
  if(G.subIdx >= G.c.subs.length-1){ finishCase(); return; }
  G.subIdx++; G.answeredCur=false; renderSub();
}

/* ================= FASE 4: RESUMEN ================= */
function finishCase(){
  const c = G.c;
  const total = c.subs.length + 1;
  const got = G.grid.reduce((a,b)=>a+b,0);
  S.cases[c.id] = {done:true, score:got, total:total, grid:G.grid};
  save();
  const squares = G.grid.map(x=> x? '🟦':'⬜').join('');
  const shareTxt = 'Plastidle · '+c.tema+' — '+got+'/'+total+'\n'+squares;
  const cells = G.grid.map((x,i)=>
    '<span class="cell" style="--d:'+(0.25+i*0.07).toFixed(2)+'s">'+(x?'🟦':'⬜')+'</span>').join('');
  let h = caseHeader(c);
  h += '<div class="card summary center">'+
  '<h2>Caso completado</h2>'+
  '<div class="scorebig" id="scorebig">0/'+total+'</div>'+
  '<p class="scoremsg">'+scoreMsg(got,total)+'</p>'+
  '<p style="color:var(--sec);margin-bottom:10px">'+c.resp+' · racha actual: '+S.streak+(S.streak>0?' 🔥':'')+' · mejor: '+S.best+'</p>'+
  '<div class="sharegrid">'+cells+'</div>'+
  '<div class="guessbtns" style="justify-content:center;margin-top:16px">'+
  '<button class="bigbtn" onclick="randomCase()">🎲 Otro caso</button>'+
  '<button class="ghostbtn" id="sharebtn">Compartir 🟦</button>'+
  '<button class="ghostbtn" onclick="copyText(\''+c.anki+'\')">Tag de Anki</button>'+
  '<button class="ghostbtn" onclick="home()">Inicio</button>'+
  '</div></div>';
  $app.innerHTML = h; window.scrollTo(0,0);
  document.getElementById('sharebtn').onclick = ()=>copyText(shareTxt);
  const sb = document.getElementById('scorebig');
  if(sb) countUp(sb, got, total);
  if(total && got/total>=0.8) setTimeout(()=>confetti({n:170, v:11}), 280);
}


/* ===== TEMA CLARO/OSCURO ===== */
function applyTheme(){
  document.body.classList.toggle('light', S.theme!=='dark');
  var tb=document.getElementById('themebtn');
  if(tb) tb.textContent=(S.theme==='dark')?'☀️':'🌙';
}
function toggleTheme(){
  S.theme=(S.theme==='dark')?'light':'dark'; save(); applyTheme();
  toast(S.theme==='dark'?'Tema oscuro 🌙':'Tema claro ☀️');
}
if(!S.theme) S.theme='light';
applyTheme();
home();
</script>
